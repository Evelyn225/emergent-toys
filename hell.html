            if (cache.length === 0) return Array(cols).fill(null);
            let seeded = [...cache];
            let seed = rowIndex * 2654435761;
            function seededRand(max) {
                seed = (seed ^ (seed << 13)) >>> 0;
                seed = (seed ^ (seed >> 7)) >>> 0;
                seed = (seed ^ (seed << 17)) >>> 0;
                return seed % max;
            }
            for (let i = seeded.length - 1; i > 0; i--) {
                const j = seededRand(i + 1);
                [seeded[i], seeded[j]] = [seeded[j], seeded[i]];
            }
            return Array.from({ length: cols }, (_, i) => seeded[i % seeded.length]);
        }

            cols: 0,

            tileH: 0,
            rowOffset: 0, // The virtual row offset (how far we've scrolled)
            images: [],
            allUsedImages: [],
            lastBatch: [],

            sub: '',
        };

        function getRandomFrom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        async function fetchImages(cat, sub, count, excludeArr) {
            const apiUrl = `https://api.waifu.pics/many/${cat}/${sub}`;
            let uniqueImages = new Set(excludeArr || []);
            let tries = 0;
            let maxTries = 8;
            let lastBatch = [];
            let noMoreUniques = false;
            while (uniqueImages.size < count && tries < maxTries && !noMoreUniques) {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                let files = data.files || [];

                for (let url of files) {

                }
                // If the API returns fewer than 30, assume no more unique images are available
                if (files.length < 30) {
                    noMoreUniques = true;
                }
                tries++;

            let images = Array.from(uniqueImages);

            // If no more uniques, fill with random from cache, shuffle cache for randomness
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];

                return arr;

                    }
                }
            } else {
                while (images.length < count && allUsedImages.length > 0) {
                    images.push(getRandomFrom(allUsedImages));
                }
            }
            return { images, allUsedImages, lastBatch };
        }

            virtualGrid.rows = rows;
            virtualGrid.tileW = tileW;

            wrapper.style.height = ((rows + 1) * tileH) + 'px';
            wrapper.style.transform = `translateY(${-slide * tileH}px)`;
            wrapper.style.transition = 'transform 0.15s linear(0, 0.009,0.035 2.1%, 0.141, 0.723 12.9%, 0.938 16.7%, 1.017,1.077, 1.121, 1.149 24.3%, 1.159,1.163,1.161,1.154 29.9%,1.129 32.8%,1.051 39.6%,1.017 43.1%,0.991,0.977 51%,0.974 53.8%,0.975 57.1%,0.997 69.8%,1.003 76.9%,1.004 83.8%, 1)';
            for (let r = 0; r < rows + 1; r++) {
                const rowImages = getRowImages(baseRow + r, cols, allUsedImages);
                for (let c = 0; c < cols; c++) {
                    const url = rowImages[c];
                    let el;
                    if (url) {
                        el = document.createElement('img');
                        el.src = url;
                        el.style.width = tileW + 'px';
                        el.style.height = tileH + 'px';
                        el.style.objectFit = 'cover';
                        el.style.display = 'block';
                        el.draggable = false;
                        el.onerror = function () {
                            const available = allUsedImages.filter(u => u !== url);
                            if (available.length > 0) el.src = getRandomFrom(available);
                            else el.style.display = 'none';
                        };
                    } else {
                        el = document.createElement('div');
                        el.style.cssText = `width:${tileW}px;height:${tileH}px;background:#000;display:block`;
                    }
                    wrapper.appendChild(el);
                }
            }

            gridDiv.style.overflow = 'hidden';
            gridDiv.appendChild(wrapper);
        }

        // Infinite scroll logic
        let isScrolling = false;
        let lastY = null;
        let scrollRemainder = 0;
        // Smooth scrolling state
        let smoothRowOffset = 0;
        let targetRowOffset = 0;
        let isAnimatingScroll = false;
        function animateVirtualScroll() {
            if (!isAnimatingScroll) return;
            const speed = 0.18; // Animation speed (0.0-1.0)
            let diff = targetRowOffset - smoothRowOffset;
            if (Math.abs(diff) < 0.01) {
                smoothRowOffset = targetRowOffset;
                isAnimatingScroll = false;
                renderVirtualGrid();
                return;
            }
            smoothRowOffset += diff * speed;
            renderVirtualGrid();
            requestAnimationFrame(animateVirtualScroll);
        }
        function handleVirtualScroll(deltaRows) {
            targetRowOffset = Math.max(0, targetRowOffset + deltaRows);
            if (!isAnimatingScroll) {
                isAnimatingScroll = true;
                requestAnimationFrame(animateVirtualScroll);
            }
        }

        async function fetchMoreRows(minRowsNeeded = null) {
            if (virtualGrid.fetching) return;
            virtualGrid.fetching = true;
            // Calculate how many images are needed for the requested rows
            let neededRows = minRowsNeeded ? minRowsNeeded : (virtualGrid.rowOffset + virtualGrid.rows);
            let neededImages = neededRows * virtualGrid.cols;
            let missing = neededImages - virtualGrid.images.length;
            // Only fetch one row at a time if scrolling
            if (missing > 0) {
                missing = Math.min(missing, virtualGrid.cols); // fetch only one row
                // Only use cache if noMoreUniques is true
                let useCache = false;
                if (virtualGrid.noMoreUniques === undefined) virtualGrid.noMoreUniques = false;
                let fetchResult = await fetchImages(virtualGrid.cat, virtualGrid.sub, missing, virtualGrid.images);
                // Track if noMoreUniques is true
                if (fetchResult.noMoreUniques) virtualGrid.noMoreUniques = true;
                let imagesToAdd = [];
                if (virtualGrid.noMoreUniques && virtualGrid.allUsedImages.length > 0) {
                    // Always use the largest cache for random selection
                    if (fetchResult.allUsedImages.length > virtualGrid.allUsedImages.length) {
                        virtualGrid.allUsedImages = fetchResult.allUsedImages.slice();
                    }
                    let cache = virtualGrid.allUsedImages;
                    let row = [];
                    for (let j = 0; j < virtualGrid.cols; j++) {
                        let idx = Math.floor(Math.random() * cache.length);
                        row.push(cache[idx]);
                    }
                    imagesToAdd = row;
                } else {
                    imagesToAdd = fetchResult.images;
                }
                virtualGrid.images = virtualGrid.images.concat(imagesToAdd);
                for (let url of fetchResult.allUsedImages) {
                    if (!virtualGrid.allUsedImages.includes(url)) virtualGrid.allUsedImages.push(url);
                }
                for (let url of fetchResult.lastBatch) {
                    if (!virtualGrid.lastBatch.includes(url)) virtualGrid.lastBatch.push(url);
                }
            }
            virtualGrid.fetching = false;
            renderVirtualGrid(); // Re-render after fetching
        }

        // Mouse wheel scroll
        function enableGridScrollEvents() {
            // Scroll only one row per event, smooth animation
            function scrollByRow(rowDelta) {
                if (rowDelta === 0) return;
                handleVirtualScroll(rowDelta > 0 ? 1 : -1);
            }
            gridDiv.addEventListener('wheel', function (e) {
                e.preventDefault();
                let delta = e.deltaY;
                let pxPerRow = virtualGrid.tileH || 100;
                let rowDelta = Math.sign(delta); // Only scroll one row per event
                scrollByRow(rowDelta);
            }, { passive: false });

            // Touch scroll
            let touchAccum = 0;
            gridDiv.addEventListener('touchstart', function (e) {
                if (e.touches.length === 1) {
                    lastY = e.touches[0].clientY;
                    touchAccum = 0;
                }
            });
            gridDiv.addEventListener('touchmove', function (e) {
                if (e.touches.length === 1 && lastY !== null) {
                    let newY = e.touches[0].clientY;
                    let deltaY = lastY - newY;
                    let pxPerRow = virtualGrid.tileH || 100;
                    touchAccum += deltaY;
                    if (Math.abs(touchAccum) >= pxPerRow) {
                        let rowDelta = Math.sign(touchAccum);
                        scrollByRow(rowDelta);
                        touchAccum = 0;
                    }
                    lastY = newY;
                }
                e.preventDefault();
            }, { passive: false });
            gridDiv.addEventListener('touchend', function () {
                lastY = null;
                touchAccum = 0;
            });
        }

        // Enable scroll events after DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', enableGridScrollEvents);
        } else {
            enableGridScrollEvents();
        }

        // Update grid on resize
        window.addEventListener('resize', function () {
            updateVirtualGrid(false);
        });

        // Update grid on tile size change
        if (tileSizeSlider) {
            tileSizeSlider.addEventListener('input', function () {
                updateVirtualGrid(false);
            });
            tileSizeSlider.addEventListener('change', function () {
                updateVirtualGrid(false);
            });
        }

        // Update grid on subcategory/category change
        subcategorySelect.addEventListener('change', function () {
            if (subcategorySelect.value === '') {
                subcategorySelect.selectedIndex = 0;
                return;
            }
            updateVirtualGrid(true);
        });

        // Initial grid setup
        // Do not call updateGrid() on load; wait for user to select a subcategory
    </script>
</body>
