<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Internet Weather Map</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
	<style>
		body { margin: 0; background: #111; }
		canvas { display: block; margin: 0 auto; }
	</style>
</head>
<body>
<script>
// --- CONFIG ---
const GRID_SIZE = 100;
let CELL_SIZE = 7; // Will be recalculated
const FETCH_INTERVAL = 10000; // 10s for more frequent updates
let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;

// --- DATA ---


let grid = [];
let storms = [];
let lastTraffic = 50; // Initial guess
let currentTraffic = 50;
let windSpeed = 0;
let windAngle = 0;

let countryGridMap = null;
let countryTraffic = null;

let worldMapImg;

// --- SETUP ---

function preload() {
	// Use a public domain world map (equirectangular projection)
	worldMapImg = loadImage('https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg');
}

async function setup() {
	WIDTH = window.innerWidth;
	HEIGHT = window.innerHeight;
	CELL_SIZE = Math.floor(Math.min(WIDTH, HEIGHT) / GRID_SIZE);
	createCanvas(WIDTH, HEIGHT);
	pixelDensity(1);
	// Load country grid map from GitHub raw URL
	const countryGridUrl = 'https://raw.githubusercontent.com/evelyn225/emergent-toys/main/api/country-grid-map.json';
	countryGridMap = await fetch(countryGridUrl).then(r => r.json());
	// Initialize grid
	grid = [];
	for (let x = 0; x < GRID_SIZE; x++) {
		grid[x] = [];
		for (let y = 0; y < GRID_SIZE; y++) {
			grid[x][y] = {
				temp: 50, // neutral
				velocityX: 0,
				velocityY: 0
			};
		}
	}
	fetchData();
	setInterval(fetchData, FETCH_INTERVAL);
}

// --- DRAW LOOP ---

function draw() {
	// Draw the world map as background, stretched to fit
	if (worldMapImg) {
		image(worldMapImg, 0, 0, WIDTH, HEIGHT);
	} else {
		background(10);
	}
	updateWind();
	updateHeat();
	updateStorms();
	drawPixels();
}
function movePixelsByWind() {
	// Move temperature field by wind (wrap around edges)
	let newGrid = [];
	for (let x = 0; x < GRID_SIZE; x++) {
		newGrid[x] = [];
		for (let y = 0; y < GRID_SIZE; y++) {
			// Calculate source position
			let srcX = (x - grid[x][y].velocityX + GRID_SIZE) % GRID_SIZE;
			let srcY = (y - grid[x][y].velocityY + GRID_SIZE) % GRID_SIZE;
			let sx0 = floor(srcX), sy0 = floor(srcY);
			let sx1 = (sx0 + 1) % GRID_SIZE, sy1 = (sy0 + 1) % GRID_SIZE;
			let fx = srcX - sx0, fy = srcY - sy0;
			// Bilinear interpolation for smoothness
			let t00 = grid[sx0][sy0].temp;
			let t10 = grid[sx1][sy0].temp;
			let t01 = grid[sx0][sy1].temp;
			let t11 = grid[sx1][sy1].temp;
			let temp = lerp(lerp(t00, t10, fx), lerp(t01, t11, fx), fy);
			newGrid[x][y] = {
				temp: temp,
				velocityX: grid[x][y].velocityX,
				velocityY: grid[x][y].velocityY
			};
		}
	}
	grid = newGrid;
}
function windowResized() {
	WIDTH = window.innerWidth;
	HEIGHT = window.innerHeight;
	CELL_SIZE = Math.floor(Math.min(WIDTH, HEIGHT) / GRID_SIZE);
	resizeCanvas(WIDTH, HEIGHT);
}

// --- API FETCHING ---
async function fetchData() {
	// --- Cloudflare Radar by Country ---
	try {
		const cfRes = await fetch('/api/radar-countries');
		const cfData = await cfRes.json();
		// cfData.result is an array of { country: 'US', pct: 12.3 }
		countryTraffic = {};
		if (cfData.result && Array.isArray(cfData.result)) {
			for (const entry of cfData.result) {
				countryTraffic[entry.country] = entry.pct;
			}
		}
		// For fallback global temp
		let total = 0, weighted = 0;
		for (const pct of Object.values(countryTraffic)) {
			weighted += pct;
			total += 1;
		}
		lastTraffic = currentTraffic;
		currentTraffic = total > 0 ? Math.min(100, Math.max(0, weighted / total)) : 50;
	} catch (e) {
		// fallback: random walk
		lastTraffic = currentTraffic;
		currentTraffic += random(-2, 2);
		currentTraffic = constrain(currentTraffic, 0, 100);
	}

	// --- Wikipedia Recent Changes ---
	try {
		const wikiRes = await fetch('https://wikimedia.org/api/rest_v1/metrics/edited-pages/top/en.wikipedia/all-access/1-day');
		const wikiData = await wikiRes.json();
		// If spike, create a storm
		if (wikiData.items && wikiData.items[0] && wikiData.items[0].results) {
			let top = wikiData.items[0].results[0].edits;
			if (top > 1000) { // arbitrary spike threshold
				createStorm();
			}
		}
	} catch (e) {
		console.error('Wikipedia API error:', e);
	}
}

// --- SIMULATION LOGIC ---
function updateWind() {
	windSpeed = abs(currentTraffic - lastTraffic) * 0.5;
	windAngle = random(TWO_PI);
	// Apply wind to grid
	for (let x = 0; x < GRID_SIZE; x++) {
		for (let y = 0; y < GRID_SIZE; y++) {
			grid[x][y].velocityX = windSpeed * cos(windAngle) * random(0.9, 1.1);
			grid[x][y].velocityY = windSpeed * sin(windAngle) * random(0.9, 1.1);
		}
	}
}

function updateHeat() {
	// Map regional traffic to temp
	for (let x = 0; x < GRID_SIZE; x++) {
		for (let y = 0; y < GRID_SIZE; y++) {
			// Diffuse heat
			let t = grid[x][y].temp;
			let neighbors = 0, sum = 0;
			for (let dx = -1; dx <= 1; dx++) {
				for (let dy = -1; dy <= 1; dy++) {
					if (dx === 0 && dy === 0) continue;
					let nx = x + dx, ny = y + dy;
					if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
						sum += grid[nx][ny].temp;
						neighbors++;
					}
				}
			}
			// Pull toward country temp if available, else global
			let countryCode = countryGridMap ? countryGridMap[`${x},${y}`] : null;
			let countryPct = (countryCode && countryTraffic && countryTraffic[countryCode]) ? countryTraffic[countryCode] : currentTraffic;
			let cellTemp = map(countryPct, 0, 100, 0, 100);
			grid[x][y].temp = lerp(t, (sum / max(1, neighbors)), 0.05);
			grid[x][y].temp = lerp(grid[x][y].temp, cellTemp, 0.01);
		}
	}
}

function updateStorms() {
	for (let i = storms.length - 1; i >= 0; i--) {
		let s = storms[i];
		s.strength *= 0.98;
		s.age = (s.age || 0) + 1;
		if (s.strength < 0.1) storms.splice(i, 1);
		// Swirl grid and add pulse/flash
		for (let dx = -s.radius; dx <= s.radius; dx++) {
			for (let dy = -s.radius; dy <= s.radius; dy++) {
				let x = floor(s.x + dx);
				let y = floor(s.y + dy);
				if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
					let dist = sqrt(dx*dx + dy*dy);
					if (dist < s.radius) {
						// Swirl effect
						let angle = atan2(dy, dx) + s.strength * 0.2 + sin(s.age * 0.2) * 0.5;
						let r = dist;
						let sx = floor(s.x + cos(angle) * r);
						let sy = floor(s.y + sin(angle) * r);
						if (sx >= 0 && sx < GRID_SIZE && sy >= 0 && sy < GRID_SIZE) {
							// brighten and swirl, add pulse
							let pulse = 2 + 2 * sin(s.age * 0.5 + dist * 0.5);
							grid[sx][sy].temp = min(100, grid[sx][sy].temp + s.strength * 2 + pulse);
						}
					}
				}
			}
		}
	}
}

function createStorm() {
	storms.push({
		x: random(GRID_SIZE),
		y: random(GRID_SIZE),
		strength: random(2, 5),
		radius: random(8, 18),
		age: 0
	});
}


function drawPixels() {
	noStroke();
	for (let gx = 0; gx < GRID_SIZE; gx++) {
		for (let gy = 0; gy < GRID_SIZE; gy++) {
			let t = grid[gx][gy].temp;
			// Color: blue (cold) → cyan → yellow → red (hot)
			let c;
			if (t < 30) c = lerpColor(color(10,20,80,70), color(0,200,255,70), map(t,0,30,0,1));
			else if (t < 60) c = lerpColor(color(0,200,255,70), color(255,255,0,70), map(t,30,60,0,1));
			else c = lerpColor(color(255,255,0,70), color(255,40,0,70), map(t,60,100,0,1));
			fill(c);
			// Map grid to lat/lon
			// Longitude: -180 (left) to +180 (right)
			// Latitude: +90 (top) to -90 (bottom)
			let lon = map(gx, 0, GRID_SIZE, -180, 180);
			let lat = map(gy, 0, GRID_SIZE, 90, -90);
			// Map lat/lon to pixel
			let px = map(lon, -180, 180, 0, WIDTH);
			let py = map(lat, 90, -90, 0, HEIGHT);
			rect(px, py, CELL_SIZE, CELL_SIZE);
		}
	}
}
</script>
</body>
</html>
