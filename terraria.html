<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
  <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
  <title>Terraria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>

<!-- Home button -->
<a href="index.html"
  style="position: fixed; top: 10px; right: 10px; z-index: 1000;
         padding: 8px; background: rgba(0,0,0,0.8); color: white;
         border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
         text-decoration: none; font-family: sans-serif; font-size: 18px;
         transition: all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
         line-height: 1; display: flex; align-items: center; justify-content: center;"
  onmouseover="this.style.transform='scale(1.2) rotate(5deg)';this.style.background='rgba(90,158,58,0.8)';this.style.borderColor='rgba(255,255,255,0.6)'"
  onmouseout="this.style.transform='scale(1) rotate(0deg)';this.style.background='rgba(0,0,0,0.8)';this.style.borderColor='rgba(255,255,255,0.3)'"
  onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'"
  onmouseup="this.style.transform='scale(1.2) rotate(5deg)'">
  <img src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png"
       alt="home" style="width: 18px; height: 18px; object-fit: contain;">
</a>

<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let skyGradient = null;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Note: setting canvas.width/height clears the canvas and resets all ctx state.
  skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGradient.addColorStop(0, '#1a6fa8');
  skyGradient.addColorStop(1, '#5ba3d9');
  // Note: cam repositioning on resize is handled by player-follow logic in the game loop (Task 4+)
}
resize();
window.addEventListener('resize', resize);

// constants
const TILE = 16;          // px per block
const WORLD_W = 400;      // blocks wide
const WORLD_H = 150;      // blocks tall

// Block types
const AIR    = 0;
const GRASS  = 1;
const DIRT   = 2;
const STONE  = 3;
const DSTONE = 4; // deep stone

// World is a flat Uint8Array [col + row * WORLD_W]
const world = new Uint8Array(WORLD_W * WORLD_H);

function getBlock(x, y) {
  if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return STONE; // all borders are solid
  return world[x + y * WORLD_W];
}
function setBlock(x, y, type) {
  if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return;
  world[x + y * WORLD_W] = type;
}

// Simple value noise via hashed sine
function hash(n) {
  return Math.abs((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1);
}
function smoothNoise(x) {
  const i = Math.floor(x);
  const f = x - i;
  const u = f * f * (3 - 2 * f); // smoothstep
  return hash(i) * (1 - u) + hash(i + 1) * u;
}
function octaveNoise(x, octaves, persistence) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let o = 0; o < octaves; o++) {
    val += smoothNoise(x * freq) * amp;
    max += amp;
    amp *= persistence;
    freq *= 2;
  }
  return val / max;
}

function generateWorld() {
  const SEA_LEVEL = 60; // surface row index around here
  for (let x = 0; x < WORLD_W; x++) {
    // surface height: varies between rows 45 and 75
    const n = octaveNoise(x / 60, 4, 0.5);
    const surfaceY = Math.floor(SEA_LEVEL - 15 + n * 30);

    for (let y = 0; y < WORLD_H; y++) {
      if (y < surfaceY) {
        setBlock(x, y, AIR);
      } else if (y === surfaceY) {
        setBlock(x, y, GRASS);
      } else if (y < surfaceY + 5) {
        setBlock(x, y, DIRT);
      } else if (y < surfaceY + 50) {
        setBlock(x, y, STONE);
      } else {
        setBlock(x, y, DSTONE);
      }
    }
  }
}
generateWorld();

// Camera position in world-pixels (top-left corner of viewport)
const cam = { x: 0, y: 0 };
// Temporary camera position — requires resize() to have run above (canvas must be sized)
cam.x = WORLD_W * TILE / 2 - canvas.width / 2;
cam.y = 50 * TILE - canvas.height / 2;

// Find spawn point: center of world, surface level
function findSpawnY() {
  const cx = Math.floor(WORLD_W / 2);
  for (let y = 0; y < WORLD_H; y++) {
    if (getBlock(cx, y) !== AIR) return y * TILE - 58; // 58 = player hitbox height
  }
  return 10 * TILE;
}

const player = {
  x: WORLD_W * TILE / 2 - 16,  // world-pixel x (left edge)
  y: findSpawnY(),
  w: 28,   // hitbox width
  h: 58,   // hitbox height
  vy: 0,
  onGround: false,
  blockedX: false,
  facing: 1,   // 1 = right, -1 = left
};

const GRAVITY    = 0.5;
const MAX_FALL   = TILE - 1; // prevents tunneling through 1-tile-thick floors
const JUMP_VEL   = -11;
const WALK_SPEED = 2.5;
const RUN_SPEED  = 5.0;

// Check if a world-pixel rect overlaps any solid block
function collidesWithWorld(px, py, pw, ph) {
  const left   = Math.floor(px / TILE);
  const right  = Math.floor((px + pw - 1) / TILE);
  const top    = Math.floor(py / TILE);
  const bottom = Math.floor((py + ph - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (getBlock(tx, ty) !== AIR) return true;
    }
  }
  return false;
}

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function updatePlayer() {
  // Fixed-step physics (tied to frame rate, not ts). Works correctly at 60fps.
  // Horizontal movement
  let speed = keys['ShiftLeft'] || keys['ShiftRight'] ? RUN_SPEED : WALK_SPEED;
  let moveX = 0;
  if (keys['KeyA'] || keys['ArrowLeft'])  { moveX = -speed; player.facing = -1; }
  if (keys['KeyD'] || keys['ArrowRight']) { moveX =  speed; player.facing =  1; }

  // Apply horizontal, resolve collision
  player.x += moveX;
  if (collidesWithWorld(player.x, player.y, player.w, player.h)) {
    player.x -= moveX;
    player.blockedX = true;
  } else {
    player.blockedX = false;
  }

  // Gravity
  player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);

  // Apply vertical, resolve collision
  player.y += player.vy;
  if (collidesWithWorld(player.x, player.y, player.w, player.h)) {
    if (player.vy > 0) {
      // landing: snap to top of block
      player.y = Math.floor((player.y + player.h) / TILE) * TILE - player.h;
      player.onGround = true;
    } else {
      // hit ceiling
      player.y = Math.ceil(player.y / TILE) * TILE;
    }
    player.vy = 0;
  } else {
    player.onGround = false;
  }

  // Jump
  if ((keys['Space'] || keys['KeyW']) && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  // Clamp to world bounds
  player.x = Math.max(0, Math.min(player.x, WORLD_W * TILE - player.w));
  player.y = Math.max(0, Math.min(player.y, WORLD_H * TILE - player.h));
}

function updateCamera() {
  // Center player horizontally, 40% from top vertically
  const targetX = player.x + player.w / 2 - canvas.width / 2;
  const targetY = player.y + player.h / 2 - canvas.height * 0.4;
  // Smooth follow (lerp)
  cam.x += (targetX - cam.x) * 0.1;
  cam.y += (targetY - cam.y) * 0.1;
  // Clamp to world
  cam.x = Math.max(0, Math.min(cam.x, WORLD_W * TILE - canvas.width));
  cam.y = Math.max(0, Math.min(cam.y, WORLD_H * TILE - canvas.height));
}

const BLOCK_COLORS = {
  [GRASS]:  '#5a9e3a',
  [DIRT]:   '#8B6914',
  [STONE]:  '#7a7a8a',
  [DSTONE]: '#5a5a6a',
};
const BLOCK_DARK = {
  [GRASS]:  '#3d7228',
  [DIRT]:   '#6b5010',
  [STONE]:  '#5a5a68',
  [DSTONE]: '#3e3e50',
};

function drawSky() {
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawWorld() {
  // Visible tile range
  const startX = Math.max(0, Math.floor(cam.x / TILE));
  const endX   = Math.min(WORLD_W, Math.ceil((cam.x + canvas.width) / TILE) + 1);
  const startY = Math.max(0, Math.floor(cam.y / TILE));
  const endY   = Math.min(WORLD_H, Math.ceil((cam.y + canvas.height) / TILE) + 1);

  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      const type = getBlock(x, y);
      if (type === AIR) continue;
      const sx = x * TILE - cam.x;
      const sy = y * TILE - cam.y;
      ctx.fillStyle = BLOCK_DARK[type];
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = BLOCK_COLORS[type];
      ctx.fillRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    }
  }
}

let rafId;
function loop(ts) {
  updatePlayer();
  updateCamera();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSky();
  drawWorld();
  rafId = requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
