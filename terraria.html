<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
  <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
  <title>Terraria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>

<!-- Home button -->
<a href="index.html"
  style="position: fixed; top: 10px; right: 10px; z-index: 1000;
         padding: 8px; background: rgba(0,0,0,0.8); color: white;
         border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
         text-decoration: none; font-family: sans-serif; font-size: 18px;
         transition: all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
         line-height: 1; display: flex; align-items: center; justify-content: center;"
  onmouseover="this.style.transform='scale(1.2) rotate(5deg)';this.style.background='rgba(90,158,58,0.8)';this.style.borderColor='rgba(255,255,255,0.6)'"
  onmouseout="this.style.transform='scale(1) rotate(0deg)';this.style.background='rgba(0,0,0,0.8)';this.style.borderColor='rgba(255,255,255,0.3)'"
  onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'"
  onmouseup="this.style.transform='scale(1.2) rotate(5deg)'">
  <img src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png"
       alt="home" style="width: 18px; height: 18px; object-fit: contain;">
</a>

<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let skyGradient = null;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Note: setting canvas.width/height clears the canvas and resets all ctx state.
  skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGradient.addColorStop(0, '#1a6fa8');
  skyGradient.addColorStop(1, '#5ba3d9');
  // Note: cam repositioning on resize is handled by player-follow logic in the game loop (Task 4+)
}
resize();
window.addEventListener('resize', resize);

// constants
const TILE = 16;          // px per block
const WORLD_W = 400;      // blocks wide
const WORLD_H = 150;      // blocks tall

// Block types
const AIR    = 0;
const GRASS  = 1;
const DIRT   = 2;
const STONE  = 3;
const DSTONE = 4; // deep stone

// World is a flat Uint8Array [col + row * WORLD_W]
const world = new Uint8Array(WORLD_W * WORLD_H);
// Surface Y per column (filled by generateWorld, used for cave background rendering)
const surfaceYs = new Int16Array(WORLD_W);

function getBlock(x, y) {
  if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return STONE; // all borders are solid
  return world[x + y * WORLD_W];
}
function setBlock(x, y, type) {
  if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return;
  world[x + y * WORLD_W] = type;
}

// Simple value noise via hashed sine
function hash(n) {
  return Math.abs((Math.sin(n * 127.1 + 311.7) * 43758.5453) % 1);
}
function smoothNoise(x) {
  const i = Math.floor(x);
  const f = x - i;
  const u = f * f * (3 - 2 * f); // smoothstep
  return hash(i) * (1 - u) + hash(i + 1) * u;
}
function octaveNoise(x, octaves, persistence) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let o = 0; o < octaves; o++) {
    val += smoothNoise(x * freq) * amp;
    max += amp;
    amp *= persistence;
    freq *= 2;
  }
  return val / max;
}

function generateWorld() {
  const SEA_LEVEL = 60;

  // Pass 1: fill terrain layers, record surface heights
  for (let x = 0; x < WORLD_W; x++) {
    const n = octaveNoise(x / 60, 4, 0.5);
    const sy = Math.floor(SEA_LEVEL - 15 + n * 30);
    surfaceYs[x] = sy;
    for (let y = 0; y < WORLD_H; y++) {
      if      (y < sy)       setBlock(x, y, AIR);
      else if (y === sy)     setBlock(x, y, GRASS);
      else if (y < sy + 5)   setBlock(x, y, DIRT);
      else if (y < sy + 50)  setBlock(x, y, STONE);
      else                   setBlock(x, y, DSTONE);
    }
  }

  // Pass 2: worm-carved caves (Terraria-style)
  // Each worm starts at a position, then walks with random angle changes,
  // carving a circular cross-section as it goes.
  function digWorm(startX, startY, length, radius, angle, depthGuard = 4) {
    let wx = startX, wy = startY;
    for (let i = 0; i < length; i++) {
      const r = Math.ceil(radius);
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx * dx + dy * dy <= radius * radius) {
            const bx = Math.round(wx + dx);
            const by = Math.round(wy + dy);
            const minY = surfaceYs[Math.max(0, Math.min(WORLD_W - 1, bx))];
            if (by >= minY + depthGuard && by < WORLD_H - 3) setBlock(bx, by, AIR);
          }
        }
      }
      // Random walk with slight horizontal bias
      angle += (Math.random() - 0.5) * 0.45;
      wx += Math.cos(angle) * 1.5;
      wy += Math.sin(angle) * 0.65;
      if (wx < 2 || wx > WORLD_W - 3 || wy < 5 || wy > WORLD_H - 5) break;
    }
  }

  // Surface-connected shafts — depthGuard=0 so they can open at the surface
  for (let i = 0; i < 8; i++) {
    const sx = 5 + Math.floor(Math.random() * (WORLD_W - 10));
    const sy = surfaceYs[sx];
    const angle = Math.PI / 2 + (Math.random() - 0.5) * 0.5; // mostly downward
    digWorm(sx, sy, 60 + Math.floor(Math.random() * 60), 1 + Math.random() * 1, angle, 0);
  }

  // Mid-depth horizontal cave networks
  for (let i = 0; i < 18; i++) {
    const sx = 5 + Math.floor(Math.random() * (WORLD_W - 10));
    const baseSY = surfaceYs[sx];
    const sy = baseSY + 12 + Math.floor(Math.random() * 50);
    const angle = Math.random() * Math.PI * 2;
    digWorm(sx, sy, 100 + Math.floor(Math.random() * 120), 1.5 + Math.random() * 1.5, angle);
  }

  // Deep large caverns
  for (let i = 0; i < 7; i++) {
    const sx = 5 + Math.floor(Math.random() * (WORLD_W - 10));
    const baseSY = surfaceYs[sx];
    const sy = baseSY + 55 + Math.floor(Math.random() * 30);
    const angle = Math.random() * Math.PI * 2;
    digWorm(sx, sy, 80 + Math.floor(Math.random() * 80), 2.5 + Math.random() * 1.5, angle);
  }

}
generateWorld();

// Camera position in world-pixels (top-left corner of viewport)
const cam = { x: 0, y: 0 };
// Temporary camera position — requires resize() to have run above (canvas must be sized)
cam.x = WORLD_W * TILE / 2 - canvas.width / 2;
cam.y = 50 * TILE - canvas.height / 2;

// Find spawn point: center of world, surface level
function findSpawnY() {
  const cx = Math.floor(WORLD_W / 2);
  for (let y = 0; y < WORLD_H; y++) {
    if (getBlock(cx, y) !== AIR) return y * TILE - 58; // 58 = player hitbox height
  }
  return 10 * TILE;
}

const player = {
  x: WORLD_W * TILE / 2 - 16,  // world-pixel x (left edge)
  y: findSpawnY(),
  w: 28,   // hitbox width
  h: 58,   // hitbox height
  vy: 0,
  onGround: false,
  blockedX: false,
  facing: 1,   // 1 = right, -1 = left
  animState:  'stand',
  animFrame:  0,
  animTick:   0,
};

const GRAVITY    = 0.5;
const MAX_FALL   = TILE - 1; // prevents tunneling through 1-tile-thick floors
const JUMP_VEL   = -11;
const WALK_SPEED = 2.5;
const RUN_SPEED  = 5.0;

let lastTime = 0;
const TARGET_DT = 1000 / 60; // 16.67ms — reference frame duration

const spritesheet = new Image();
spritesheet.src = 'images/platformer_sprites_pixelized_0.png';

const FRAME_SIZE  = 64;  // px per sprite frame (sheet is SHEET_COLS × FRAME_SIZE wide)
const SHEET_COLS  = 8;   // columns in the spritesheet

const ANIM = {
  stand: { row: 8, colStart: 0 },
  walk:  { row: 4, colStart: 0 },
  // Run spans row 0 col 4-7 then row 1 col 0-3 — handled in drawPlayer
  run:   null,
  jump:  { row: 5, colStart: 2 },
};

// Check if a world-pixel rect overlaps any solid block
function collidesWithWorld(px, py, pw, ph) {
  const left   = Math.floor(px / TILE);
  const right  = Math.floor((px + pw - 1) / TILE);
  const top    = Math.floor(py / TILE);
  const bottom = Math.floor((py + ph - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (getBlock(tx, ty) !== AIR) return true;
    }
  }
  return false;
}

// Check if player is resting on solid ground (checks 1px below feet)
function checkOnGround(px, py, pw, ph) {
  const feetTile = Math.floor((py + ph) / TILE);
  const left     = Math.floor(px / TILE);
  const right    = Math.floor((px + pw - 1) / TILE);
  for (let tx = left; tx <= right; tx++) {
    if (getBlock(tx, feetTile) !== AIR) return true;
  }
  return false;
}

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function updatePlayer(scale = 1) {
  // Delta-time scaled physics. scale ~1.0 at 60fps, ~0.5 at 120fps.
  // Horizontal movement
  let speed = keys['ShiftLeft'] || keys['ShiftRight'] ? RUN_SPEED : WALK_SPEED;
  let moveX = 0;
  if (keys['KeyA'] || keys['ArrowLeft'])  { moveX = -speed * scale; player.facing = -1; }
  if (keys['KeyD'] || keys['ArrowRight']) { moveX =  speed * scale; player.facing =  1; }

  // Apply horizontal, resolve collision
  player.x += moveX;
  if (collidesWithWorld(player.x, player.y, player.w, player.h)) {
    player.x -= moveX;
    player.blockedX = true;
  } else {
    player.blockedX = false;
  }

  // Gravity
  player.vy = Math.min(player.vy + GRAVITY * scale, MAX_FALL);

  // Apply vertical, resolve collision
  player.y += player.vy;
  if (collidesWithWorld(player.x, player.y, player.w, player.h)) {
    if (player.vy > 0) {
      // landing: snap to top of block
      player.y = Math.floor((player.y + player.h) / TILE) * TILE - player.h;
      player.vy = 0;
    } else {
      // hit ceiling
      player.y = Math.ceil(player.y / TILE) * TILE;
      player.vy = 0;
    }
  }
  // Use dedicated ground check — reliable even when feet are exactly on tile boundary
  player.onGround = checkOnGround(player.x, player.y, player.w, player.h);

  // Jump
  if ((keys['Space'] || keys['KeyW']) && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  // Clamp to world bounds
  player.x = Math.max(0, Math.min(player.x, WORLD_W * TILE - player.w));
  player.y = Math.max(0, Math.min(player.y, WORLD_H * TILE - player.h));
}

function updateCamera(scale = 1) {
  // Center player horizontally, 40% from top vertically
  const targetX = player.x + player.w / 2 - canvas.width / 2;
  const targetY = player.y + player.h / 2 - canvas.height * 0.4;
  // Smooth follow (lerp), scaled by dt so speed is frame-rate independent
  cam.x += (targetX - cam.x) * 0.1 * scale;
  cam.y += (targetY - cam.y) * 0.1 * scale;
  // Clamp to world
  cam.x = Math.max(0, Math.min(cam.x, WORLD_W * TILE - canvas.width));
  cam.y = Math.max(0, Math.min(cam.y, WORLD_H * TILE - canvas.height));
}

const BLOCK_COLORS = {
  [GRASS]:  '#5a9e3a',
  [DIRT]:   '#8B6914',
  [STONE]:  '#7a7a8a',
  [DSTONE]: '#5a5a6a',
};
const CAVE_BG = '#1a100a'; // dark earthy background shown behind underground air

function drawSky() {
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawWorld() {
  // Snap camera to integers to prevent sub-pixel gaps between tiles
  const camX = Math.round(cam.x);
  const camY = Math.round(cam.y);
  const startX = Math.max(0, Math.floor(camX / TILE));
  const endX   = Math.min(WORLD_W, Math.ceil((camX + canvas.width) / TILE) + 1);
  const startY = Math.max(0, Math.floor(camY / TILE));
  const endY   = Math.min(WORLD_H, Math.ceil((camY + canvas.height) / TILE) + 1);

  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      const type = getBlock(x, y);
      const sx = (x * TILE - camX) | 0;  // integer via bitwise OR — fast floor for positive nums
      const sy = (y * TILE - camY) | 0;
      if (type === AIR) {
        // Show cave background for underground air pockets
        if (y > surfaceYs[x]) {
          ctx.fillStyle = CAVE_BG;
          ctx.fillRect(sx, sy, TILE, TILE);
        }
        continue;
      }
      // Solid block — no border, just flush fill for seamless look
      ctx.fillStyle = BLOCK_COLORS[type];
      ctx.fillRect(sx, sy, TILE, TILE);
    }
  }
}

function updateAnimation() {
  // Determine state
  let newState = 'stand';
  const moving = (keys['KeyA'] || keys['KeyD'] || keys['ArrowLeft'] || keys['ArrowRight']) && !player.blockedX;
  const running = keys['ShiftLeft'] || keys['ShiftRight'];

  if (!player.onGround) {
    newState = 'jump';
  } else if (moving && running) {
    newState = 'run';
  } else if (moving) {
    newState = 'walk';
  }

  if (newState !== player.animState) {
    player.animState = newState;
    player.animFrame = 0;
    player.animTick  = 0;
  }

  // Advance frame
  const FPS = { stand: 4, walk: 10, run: 12, jump: 8 };
  const FRAME_COUNTS = { stand: 1, walk: 8, run: 8, jump: 6 };

  const fps = FPS[newState] || 4;
  const ticksPerFrame = Math.round(60 / fps);

  player.animTick++;
  if (player.animTick >= ticksPerFrame) {
    player.animTick = 0;
    const frameCount = FRAME_COUNTS[newState] || 1;
    player.animFrame = (player.animFrame + 1) % frameCount;
  }
}

function drawPlayer() {
  if (!spritesheet.complete || spritesheet.naturalWidth === 0) {
    // Fallback: draw a yellow placeholder rectangle while the sheet loads
    ctx.fillStyle = 'rgba(255,200,0,0.9)';
    ctx.fillRect(player.x - cam.x, player.y - cam.y, player.w, player.h);
    return;
  }

  let srcX, srcY;

  if (player.animState === 'run') {
    // Run: frames 4-11 in the sheet (row 0 col 4-7, row 1 col 0-3)
    const globalFrame = player.animFrame + 4;
    const col = globalFrame % SHEET_COLS;
    const row = Math.floor(globalFrame / SHEET_COLS);
    srcX = col * FRAME_SIZE;
    srcY = row * FRAME_SIZE;
  } else {
    const anim = ANIM[player.animState];
    if (!anim) return;
    srcX = (anim.colStart + player.animFrame) * FRAME_SIZE;
    srcY = anim.row * FRAME_SIZE;
  }

  // Screen position: sprite is 64px wide, hitbox is 28px wide — center sprite on hitbox
  const offsetX = (player.w - FRAME_SIZE) / 2; // will be negative (sprite wider than hitbox)
  const screenX = player.x - cam.x + offsetX;
  // Align bottom of sprite with bottom of hitbox
  const screenY = player.y - cam.y + (player.h - FRAME_SIZE);

  ctx.save();
  if (player.facing === -1) {
    ctx.translate(screenX + FRAME_SIZE / 2, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(spritesheet, srcX, srcY, FRAME_SIZE, FRAME_SIZE,
                  -FRAME_SIZE / 2, screenY, FRAME_SIZE, FRAME_SIZE);
  } else {
    ctx.drawImage(spritesheet, srcX, srcY, FRAME_SIZE, FRAME_SIZE,
                  screenX, screenY, FRAME_SIZE, FRAME_SIZE);
  }
  ctx.restore();
}

let rafId;
function loop(ts) {
  const dt = ts ? Math.min(ts - lastTime, TARGET_DT * 3) : TARGET_DT;
  lastTime = ts || 0;
  const scale = dt / TARGET_DT; // ~1.0 at 60fps, ~0.5 at 120fps

  updatePlayer(scale);
  updateAnimation();
  updateCamera(scale);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSky();
  drawWorld();
  drawPlayer();
  rafId = requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
