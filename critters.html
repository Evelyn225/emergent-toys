<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
    <title>Bug Hotline - Live Bug Communication Service</title>
    <style>
        :root {
            --neon-green: #0f0;
            --dark-green: #003300;
            --darker-green: #001100;
            --bg-color: #2b413a;
            --glow: 0 0 10px rgba(0, 255, 0, 0.5), 0 0 20px rgba(0, 255, 0, 0.3);
            --border-glow: 0 0 10px rgba(0, 255, 0, 0.2);
            --panel-bg: rgba(0, 15, 5, 0.85);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                url('https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/tree_bg.jpg');
            background-size: 30px 30px, 30px 30px, cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            color: var(--neon-green);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CRT Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .chat-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            height: calc(90dvh - 85px);
            max-height: calc(90dvh - 85px);
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            box-shadow: var(--border-glow), inset 0 0 20px rgba(0, 255, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 25px;
            backdrop-filter: blur(5px);
            overflow: hidden;
        }

        @media (max-height: 900px) and (min-width: 801px) {
            .chat-container {
                padding: 20px;
                gap: 16px;
            }

            .right-panel {
                gap: 12px;
            }

            .chat-box {
                padding: 14px;
            }
        }

        /* Glitch effect decorative lines */
        .chat-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--neon-green);
            box-shadow: var(--glow);
            opacity: 0.5;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(0, 255, 0, 0.3);
            padding-bottom: 15px;
            margin-bottom: 5px;
        }

        .header-title h1 {
            color: #fff;
            text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green);
            font-size: 32px;
            margin: 0;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .header-title p {
            color: var(--neon-green);
            opacity: 0.8;
            margin: 5px 0 0;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .header-system-info {
            text-align: right;
            font-size: 12px;
            opacity: 0.7;
            text-shadow: 0 0 2px var(--neon-green);
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px dashed rgba(0, 255, 0, 0.3);
            padding-right: 25px;
            position: relative;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            left: -18px;
            bottom: -50px;
            width: 60px;
            height: 44px;
            background: url('https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/bughotline.png') center / contain no-repeat;
            opacity: 0.9;
            pointer-events: none;
            z-index: 1;
        }

        .status-module {
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid rgba(0, 255, 0, 0.2);
            padding: 15px;
            position: relative;
        }

        .status-module::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 10px;
            height: 10px;
            border-top: 1px solid var(--neon-green);
            border-left: 1px solid var(--neon-green);
        }

        .status-module::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 10px;
            height: 10px;
            border-bottom: 1px solid var(--neon-green);
            border-right: 1px solid var(--neon-green);
        }

        .status-bar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .connection-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .connection-status {
            color: var(--neon-green);
            text-shadow: var(--glow);
        }

        .connection-status::before {
            content: "●";
            margin-right: 8px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        #bugName {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px var(--neon-green);
            word-break: break-all;
            margin-top: 5px;
            display: block;
        }

        .network-status {
            font-size: 10px;
            color: var(--neon-green);
            opacity: 0.8;
            margin-top: 15px;
            border-top: 1px dashed rgba(0, 255, 0, 0.2);
            padding-top: 10px;
        }

        .bug-display {
            position: relative;
            background: #000;
            border: 1px solid var(--neon-green);
            padding: 5px;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.15) inset;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 220px;
            overflow: hidden;
        }

        .bug-display::after {
            content: "LIVE_FEED_ACTV";
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 15, 0, 0.8);
            color: var(--neon-green);
            font-size: 10px;
            padding: 2px 6px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
            animation: blink 2s infinite;
        }

        /* Radar scanning line overlay */
        .bug-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 15px var(--neon-green);
            animation: radar 3s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes radar {
            0% {
                top: -10%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 110%;
                opacity: 0;
            }
        }

        .bug-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0.85;
            transition: filter 0.3s;
        }

        .bug-image:hover {
            filter: contrast(1.4) sepia(1) hue-rotate(60deg);
            opacity: 1;
        }

        .scanning {
            animation: scan 1.5s ease-in-out;
        }

        @keyframes scan {
            0% {
                filter: contrast(1.2) sepia(1) hue-rotate(60deg) saturate(3) brightness(1);
            }

            50% {
                filter: contrast(1.5) sepia(1) hue-rotate(180deg) saturate(5) brightness(1.5);
            }

            100% {
                filter: contrast(1.2) sepia(1) hue-rotate(60deg) saturate(3) brightness(1);
            }
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            min-height: 0;
        }

        .chat-box {
            flex-grow: 1;
            min-height: 0;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.3);
            background: rgba(0, 5, 0, 0.7);
            padding: 20px;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-green) transparent;
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.05);
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background-color: var(--neon-green);
        }

        .chat-box::-webkit-scrollbar-track {
            background-color: rgba(0, 20, 0, 0.5);
        }

        .chat-box::before {
            content: 'SECURE_COMM_CHANNEL // ENCRYPTED';
            position: sticky;
            top: -10px;
            background: var(--bg-color);
            padding: 5px 10px;
            font-size: 10px;
            opacity: 0.5;
            display: block;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            z-index: 10;
        }

        .message {
            margin: 15px 0;
            padding: 12px 15px;
            font-size: 14px;
            position: relative;
            line-height: 1.4;
            overflow-wrap: anywhere;
            animation: slide-up 0.3s ease-out forwards;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: rgba(0, 51, 0, 0.4);
            border-left: 3px solid var(--neon-green);
            margin-left: 20%;
            color: #d4ffd4;
            box-shadow: 2px 2px 10px rgba(0, 255, 0, 0.05);
        }

        .user-message::before {
            content: 'USER_OP >';
            position: absolute;
            top: -8px;
            left: -3px;
            font-size: 10px;
            background: var(--bg-color);
            padding: 0 5px;
            color: var(--neon-green);
        }

        .bug-message {
            background: rgba(0, 17, 0, 0.6);
            border-right: 3px solid var(--neon-green);
            margin-right: 20%;
            box-shadow: -2px 2px 10px rgba(0, 255, 0, 0.05);
            color: #b0ffb0;
        }

        .bug-message::before {
            content: '< INCOMING_TRANS';
            position: absolute;
            top: -8px;
            right: -3px;
            font-size: 10px;
            background: var(--bg-color);
            padding: 0 5px;
            color: var(--neon-green);
        }

        .translation-process {
            display: flex;
            flex-direction: column;
        }

        .raw-message {
            font-size: 11px;
            color: rgba(0, 180, 0, 0.6);
            font-family: monospace;
            margin-bottom: 6px;
            display: block;
            word-break: break-all;
            position: relative;
        }

        .raw-message::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(0, 255, 0, 0.3);
        }

        .translated-message {
            font-size: 15px;
            color: #fff;
            display: block;
            text-shadow: 0 0 2px var(--neon-green);
        }

        .input-container {
            display: flex;
            gap: 15px;
            position: relative;
        }

        .input-container::before {
            content: '>';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px 15px 15px 35px;
            background: rgba(0, 20, 0, 0.6);
            border: 1px solid rgba(0, 255, 0, 0.5);
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2) inset, 0 0 5px rgba(0, 255, 0, 0.3);
            background: rgba(0, 30, 0, 0.8);
        }

        input[type="text"]::placeholder {
            color: rgba(0, 255, 0, 0.4);
            font-style: italic;
        }

        button {
            padding: 0 30px;
            background: rgba(0, 30, 0, 0.5);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.4), transparent);
            transition: all 0.4s;
        }

        button:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        button:hover::before {
            left: 100%;
            transition: all 0.5s;
        }

        button:active {
            transform: scale(0.95);
        }

        .signal-strength {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 16px;
        }

        .signal-dot {
            width: 5px;
            background-color: var(--neon-green);
            opacity: 0.2;
            transition: all 0.3s;
            box-shadow: 0 0 2px var(--neon-green);
        }

        .signal-dot:nth-child(1) {
            height: 6px;
        }

        .signal-dot:nth-child(2) {
            height: 10px;
        }

        .signal-dot:nth-child(3) {
            height: 14px;
        }

        .signal-dot:nth-child(4) {
            height: 18px;
        }

        .signal-dot.active {
            opacity: 1;
            box-shadow: 0 0 8px var(--neon-green);
        }

        .typing-indicator span {
            width: 8px;
            height: 12px;
            background-color: var(--neon-green);
            display: inline-block;
            margin-right: 4px;
            animation: type-pulse 1s infinite alternate;
            box-shadow: 0 0 5px var(--neon-green);
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes type-pulse {
            0% {
                opacity: 0.3;
                transform: scaleY(0.8);
            }

            100% {
                opacity: 1;
                transform: scaleY(1.2);
            }
        }

        /* Dark tint overlay remains */
        #dark-tint {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-color: rgba(4, 12, 10, 0.85);
            mix-blend-mode: multiply;
        }

        #dark-tint::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 8px 8px;
            opacity: 0.3;
            mix-blend-mode: overlay;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {
            0% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-1px, 1px);
            }

            40% {
                transform: translate(1px, -1px);
            }

            60% {
                transform: translate(-2px, 0);
            }

            80% {
                transform: translate(1px, 2px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        /* Cursor particles */
        .cursor-particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(0, 255, 0, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            will-change: transform, opacity;
            opacity: 1;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
            filter: blur(0.5px);
        }

        @media (max-width: 800px) {
            body {
                padding: 12px 8px;
                min-height: 100dvh;
                overflow-y: auto;
                overflow-x: hidden;
                align-items: flex-start;
            }

            .chat-container {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
                height: auto;
                max-height: none;
                overflow: visible;
            }

            .header {
                padding-bottom: 10px;
                margin-bottom: 2px;
            }

            .header-title h1 {
                font-size: clamp(24px, 8vw, 30px);
                letter-spacing: 2px;
            }

            .header-title p {
                font-size: 10px;
                letter-spacing: 1px;
            }

            .header-system-info {
                font-size: 10px;
                line-height: 1.2;
            }

            .left-panel {
                gap: 12px;
                border-right: none;
                border-bottom: 1px dashed rgba(0, 255, 0, 0.3);
                padding-right: 0;
                padding-bottom: 12px;
            }

            .left-panel::after {
                display: none;
            }

            .status-module {
                padding: 10px;
            }

            .connection-row {
                font-size: 11px;
            }

            #bugName {
                font-size: 12px;
            }

            .network-status {
                font-size: 9px;
                margin-top: 10px;
                padding-top: 8px;
            }

            .bug-display {
                height: 170px;
            }

            .right-panel {
                gap: 10px;
            }

            .chat-box {
                height: 220px;
                min-height: 220px;
                padding: 12px;
            }

            .chat-box::before {
                font-size: 9px;
                margin-bottom: 12px;
                padding: 4px 6px;
            }

            .message {
                margin: 10px 0;
                padding: 9px 10px;
                font-size: 12px;
            }

            .user-message {
                margin-left: 8%;
            }

            .bug-message {
                margin-right: 8%;
            }

            .raw-message {
                font-size: 10px;
            }

            .translated-message {
                font-size: 13px;
            }

            .input-container {
                gap: 8px;
            }

            .input-container::before {
                left: 10px;
                font-size: 12px;
            }

            input[type="text"] {
                font-size: 14px;
                padding: 10px 10px 10px 26px;
            }

            button {
                padding: 0 14px;
                font-size: 12px;
                letter-spacing: 1px;
            }

            body>a[href="index.html"] {
                top: 8px !important;
                right: 8px !important;
                padding: 6px !important;
            }

            body>a[href="index.html"] img {
                width: 14px !important;
                height: 14px !important;
            }
        }

        @media (max-width: 420px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            .header-system-info {
                align-self: flex-end;
                font-size: 9px;
            }

            .bug-display {
                height: 150px;
            }

            .chat-box {
                height: 190px;
                min-height: 190px;
            }
        }

        @media (max-height: 700px) {
            .left-panel::after {
                display: none;
            }
        }
    </style>
</head>

<body>
    <a href="index.html"
        style="position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 8px 8px; background: rgba(0, 0, 0, 0.8); color: #00ff00; border: 1px solid #1f8b1f; border-radius: 4px; text-decoration: none; font-family: 'Courier New', monospace; font-size: 18px; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); line-height: 1; display: flex; align-items: center; justify-content: center;"
        onmouseover="this.style.transform='scale(1.2) rotate(5deg)'; this.style.background='rgba(31, 139, 31, 0.8)'; this.style.borderColor='#00ff00'; this.style.boxShadow='0 0 20px #00ff00'"
        onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.background='rgba(0, 0, 0, 0.8)'; this.style.borderColor='#1f8b1f'; this.style.boxShadow='none'"
        onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'"
        onmouseup="this.style.transform='scale(1.2) rotate(5deg)'"><img
            src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png" alt="home"
            style="width: 18px; height: 18px; object-fit: contain; filter: invert(1) saturate(3) hue-rotate(120deg);"></a>
    <div id="dark-tint" aria-hidden="true"></div>
    <div class="chat-container">
        <div class="header">
            <div class="header-title">
                <h1>BUG_HOTLINE</h1>
                <p>LIVE INSECTOID COMMUNICATION PROTOCOL v2.0</p>
            </div>
            <div class="header-system-info">
                <div>SYS.STAT: ONLINE</div>
                <div>EST. 2025</div>
            </div>
        </div>

        <div class="left-panel">
            <div class="status-module">
                <div class="status-bar">
                    <div class="connection-row">
                        <span class="connection-status">UPLINK ESTABLISHED</span>
                        <div class="signal-strength" id="signalStrength"></div>
                    </div>
                    <div>
                        <span style="font-size: 10px; opacity: 0.7; color: var(--neon-green);">TARGET SPECIMEN:</span>
                        <span id="bugName"></span>
                    </div>
                </div>
                <div class="network-status" id="networkStatus"></div>
            </div>

            <div class="bug-display">
                <img id="bugImage" class="bug-image" src="" alt="Live Bug Feed">
            </div>

            <div
                style="font-size: 10px; opacity: 0.5; font-family: monospace; display: flex; justify-content: space-between; color: var(--neon-green);">
                <span>LATENCY: 24ms</span>
                <span>ENC: AES-256</span>
            </div>
        </div>

        <div class="right-panel">
            <div class="chat-box" id="chatBox"></div>
            <div class="input-container">
                <input type="text" id="userInput" placeholder="ENTER TRANSMISSION DATA..." autocomplete="off">
                <button onclick="sendMessage()">TRANSMIT</button>
            </div>
        </div>
    </div>

    <script>
        const bugs = [
            { name: "Ladybug", searchTerm: "ladybug insect" },
            { name: "Butterfly", searchTerm: "butterfly insect" },
            { name: "Dragonfly", searchTerm: "dragonfly insect" },
            { name: "Ant", searchTerm: "ant insect" },
            { name: "Bee", searchTerm: "bee insect" },
            { name: "Praying Mantis", searchTerm: "praying mantis insect" },
            { name: "Firefly", searchTerm: "firefly insect" },
            { name: "Stick Insect", searchTerm: "stick insect" },
            { name: "Cricket", searchTerm: "cricket insect" },
            { name: "Grasshopper", searchTerm: "grasshopper insect" },
            { name: "Moth", searchTerm: "moth insect" },
            { name: "Beetle", searchTerm: "beetle insect" },
            { name: "Spider", searchTerm: "spider insect" },
            { name: "Cicada", searchTerm: "cicada insect" },
            { name: "Centipede", searchTerm: "centipede insect" }
        ];

        let currentBug = null;
        const bugMemory = new Map();
        let isTyping = false;

        async function getRandomBugImage(searchTerm) {
            try {
                const resp = await fetch(`/api/unsplash.js?query=${encodeURIComponent(searchTerm)}`);
                if (!resp.ok) {
                    // no image available or server error
                    return null;
                }
                const data = await resp.json();
                return data && data.url ? data.url : null;
            } catch (error) {
                console.error('Error fetching image:', error);
                return null;
            }
        }

        async function getRandomBug() {
            const bug = bugs[Math.floor(Math.random() * bugs.length)];
            const imageUrl = await getRandomBugImage(bug.searchTerm);
            return { ...bug, image: imageUrl };
        }

        function updateSignalStrength() {
            const strength = Math.floor(Math.random() * 4) + 1;
            const signalStrength = document.getElementById('signalStrength');
            signalStrength.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const dot = document.createElement('span');
                dot.className = `signal-dot${i < strength ? ' active' : ''}`;
                signalStrength.appendChild(dot);
            }
        }

        function updateNetworkStatus() {
            const onlineBugs = bugs.filter(() => Math.random() > 0.7);
            document.getElementById('networkStatus').textContent =
                `NETWORK STATUS: ${onlineBugs.length} BUGS ONLINE`;
        }

        function showTypingIndicator() {
            if (isTyping) return;
            isTyping = true;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bug-message typing-indicator';
            typingDiv.innerHTML = '<span>.</span><span>.</span><span>.</span>';
            document.getElementById('chatBox').appendChild(typingDiv);
        }

        function removeTypingIndicator() {
            const typingIndicator = document.querySelector('.typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
            isTyping = false;
        }

        function addScanningEffect() {
            const bugImage = document.getElementById('bugImage');
            bugImage.classList.add('scanning');
            setTimeout(() => {
                bugImage.classList.remove('scanning');
            }, 1000);
        }

        function showRawBugMessage(message) {
            const rawMessage = message.split('').map(char =>
                String.fromCharCode(char.charCodeAt(0) + 1)
            ).join('');
            return rawMessage;
        }

        async function typeRawMessage(element, rawText, translatedElement, originalText, speed = 30) {
            const rawPrefix = '[RAW TRANSMISSION: ';
            element.textContent = rawPrefix;

            for (let i = 0; i < rawText.length; i++) {
                // Type raw character
                element.textContent = rawPrefix + rawText.substring(0, i + 1);

                // Show translated character
                translatedElement.textContent = originalText.substring(0, i + 1);

                // Wait a short time
                await new Promise(resolve => setTimeout(resolve, speed));
            }

            // Add closing bracket
            element.textContent = rawPrefix + rawText + ']';
        }

        async function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;

            if (sender === 'bug') {
                // Create container for translation process
                const translationContainer = document.createElement('div');
                translationContainer.className = 'translation-process';

                // Create raw message element
                const rawMessage = document.createElement('div');
                rawMessage.className = 'raw-message';

                // Create translated message element
                const translatedMessage = document.createElement('div');
                translatedMessage.className = 'translated-message';

                translationContainer.appendChild(rawMessage);
                translationContainer.appendChild(translatedMessage);

                // Add to chat
                messageDiv.appendChild(translationContainer);
                chatBox.appendChild(messageDiv);

                // Type out raw message and show translation in real-time
                const rawText = showRawBugMessage(text);
                await typeRawMessage(rawMessage, rawText, translatedMessage, text);

                // Keep raw message displayed (do not remove it)
            } else {
                messageDiv.textContent = text;
                chatBox.appendChild(messageDiv);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function displayBug() {
            currentBug = await getRandomBug();
            const bugImage = document.getElementById('bugImage');
            if (currentBug.image) {
                bugImage.src = currentBug.image;
            }
            document.getElementById('bugName').textContent = `CONNECTED TO: ${currentBug.name.toUpperCase()}`;

            // Clear chat box for new bug
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';

            addScanningEffect();
            updateSignalStrength();
            updateNetworkStatus();

            // Initialize bug memory for this bug
            if (!bugMemory.has(currentBug.name)) {
                bugMemory.set(currentBug.name, []);
            }

            // Generate AI introduction message
            showTypingIndicator();
            try {
                console.log('Sending request to: /api/bug-chat.js for intro');
                const response = await fetch('/api/bug-chat.js', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bugType: currentBug.name,
                        message: "Introduce yourself to the human. Keep it very brief and clumsily written.",
                        conversationHistory: []
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Intro Response:', data);

                let introMessage;
                if (data.message) {
                    introMessage = data.message;
                } else {
                    introMessage = "hello human. i am " + currentBug.name.toLowerCase() + "... wht do u want to know ..";
                }

                removeTypingIndicator();
                await addMessage(introMessage, 'bug');

                bugMemory.get(currentBug.name).push({
                    role: "assistant",
                    content: introMessage
                });

                console.log('Intro message added and stored');
            } catch (error) {
                removeTypingIndicator();
                console.error('Error in displayBug:', error);
                const errorMsg = "sorry... connection bad... try again...";
                await addMessage(errorMsg, 'bug');
                bugMemory.get(currentBug.name).push({
                    role: "assistant",
                    content: errorMsg
                });
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            showTypingIndicator();
            updateSignalStrength();

            try {
                console.log('Sending message to: /api/bug-chat.js');

                let conversationHistory = [];
                if (bugMemory.has(currentBug.name)) {
                    conversationHistory = bugMemory.get(currentBug.name);
                }

                const response = await fetch('/api/bug-chat.js', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bugType: currentBug.name,
                        message: message,
                        conversationHistory: conversationHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Response:', data);
                if (data.message) {
                    removeTypingIndicator();
                    addMessage(data.message, 'bug');
                    if (!bugMemory.has(currentBug.name)) {
                        bugMemory.set(currentBug.name, []);
                    }
                    bugMemory.get(currentBug.name).push({
                        role: "user",
                        content: message
                    });
                    bugMemory.get(currentBug.name).push({
                        role: "assistant",
                        content: data.message
                    });
                } else {
                    removeTypingIndicator();
                    addMessage("sorry... connection bad... try again...", 'bug');
                    console.error('API error:', data.error || data.details);
                }
            } catch (error) {
                removeTypingIndicator();
                console.error('Detailed error:', error);
                addMessage("sorry... connection bad... try again...", 'bug');
            }
        }

        displayBug();
        setInterval(updateSignalStrength, 3000);
        setInterval(updateNetworkStatus, 5000);

        // Allow sending message with Enter key
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
    <script>
        (function () {
            const body = document.body;
            const chat = document.querySelector('.chat-container');
            if (!body) return;

            function rand(min, max) { return Math.random() * (max - min) + min; }

            function isOverChat(x, y) {
                const el = document.elementFromPoint(x, y);
                return el && el.closest && el.closest('.chat-container');
            }

            function spawnParticle(clientX, clientY) {
                if (isOverChat(clientX, clientY)) return;

                const p = document.createElement('div');
                p.className = 'cursor-particle';

                // slight random offset around cursor
                const offsetX = (Math.random() - 0.5) * 45;
                const offsetY = (Math.random() - 0.5) * 45;

                p.style.left = (clientX + offsetX) + 'px';
                p.style.top = (clientY + offsetY) + 'px';

                body.appendChild(p);

                const dx = (Math.random() - 0.5) * 150;
                const dy = (Math.random() - 0.5) * 150;
                const duration = 2900 + Math.random() * 1990;

                const anim = p.animate([
                    { transform: 'translate3d(0,0,0)', opacity: 1 },
                    { transform: `translate3d(${dx}px, ${dy}px, 0)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(.2,.6,.3,1)'
                });

                anim.onfinish = () => p.remove();
            }

            // throttle particle creation to avoid heavy DOM churn
            let last = 0;
            document.addEventListener('mousemove', (e) => {
                const now = Date.now();
                // allow bursts but cap baseline rate (~1 per 40ms)
                if (now - last < 40 && Math.random() > 0.12) return;
                last = now;

                // spawn 1-3 tiny particles
                const count = Math.random() < 0.2 ? 3 : 1;
                for (let i = 0; i < count; i++) {
                    spawnParticle(e.clientX, e.clientY);
                }
            }, { passive: true });

            // clean up particles if user leaves page or interacts heavily
            window.addEventListener('blur', () => {
                document.querySelectorAll('.cursor-particle').forEach(el => el.remove());
            });
        })();
    </script>
</body>
