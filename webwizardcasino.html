<body>

    <div id="loadingOverlay">

            <div id="mainStatus"></div>
            <div id="themeStatus"></div>
        </div>
        <div id="currentMessage"></div>
        <div class="progress-container">
            <div class="progress-label" id="progressLabel"></div>
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="generatedContent"></div>

    <script>
        // Unified wavy animation for 'Processing...' and ellipses
        function animateProgressLabel() {
            const label = document.getElementById('progressLabel');
            if (!label) return;
            const baseText = 'Processing';
            let ellipsisIndex = 0;
            let time = 0;
            function render() {
                // Build full text with ellipses
                const fullText = baseText + '.'.repeat(ellipsisIndex);
                label.innerHTML = fullText.split('').map((char, i) => {
                    // Unified sine wave for all characters
                    const offset = Math.sin((time/8) + i * 0.35) * 7;
                    return `<span style="display:inline-block;transform:translateY(${offset}px);transition:transform 0.1s;">${char}</span>`;
                }).join('');
            }
            render();
            setInterval(() => {
                time++;
                render();
            }, 60);
            setInterval(() => {
                ellipsisIndex = (ellipsisIndex + 1) % 4;
                render();
            }, 400);
        }
        document.addEventListener('DOMContentLoaded', animateProgressLabel);
        let consoleCommands = [];
        let consoleCommandsLoaded = false;
        (async () => {
            try {
                const response = await fetch('/casino-assets/console-commands.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}: Failed to load console-commands.json`);
                const data = await response.json();
                consoleCommands = Array.isArray(data.commands) ? data.commands : [];
                consoleCommandsLoaded = true;
                console.log('✓ Console commands loaded successfully');
            } catch (error) {
                console.error('✗ Error loading console-commands.json:', error);
            }
        })();

        // API endpoints - uses Vercel serverless functions
        const RANDOM_WORDS_ENDPOINT = '/api/random-words.js';
        const GENERATE_ENDPOINT = '/api/generate.js';

        // Create the prompt for the AI
        function createGenerationPrompt(theme) {
            return `
    CREATE A CREATIVE SITE WITH A P5.JS SKETCH:

    OUTPUT RULES:
    - Output complete HTML with p5.js JavaScript code wrapped in <script> tags and <style> tags as needed
    - MUST include setup() function that calls createCanvas()
    - MUST include draw() function that calls background() at the start
    - Must visually incorporate the theme "${theme}" in the sketch
    - MUST literally include the theme word(s) ${theme} as text in the content somewhere
    - Create something substantial: 250+ lines of creative code
    - Have more than one element of interactivity, preferably mouse or keyboard based
    - Use p5 drawing functions: rect(), ellipse(), line(), fill(), stroke(), etc
    - Can use: noise(), sin(), cos(), random(), map(), etc for animation
    - Can add interactivity: mousePressed(), keyPressed(), mouseX, mouseY, etc
    - Create classes, variables, arrays as needed
    - Can use images via: loadImage('https://picsum.photos/800/600')
    - DO NOT use deprecated features (deviceOrientation, etc)
    - Make it visually interesting and animated
    - Vary your approach - don't always do the same thing
    - No markdown code blocks, just raw HTML
    - DO NOT include any external CSS or JS files

    EXAMPLES OF GOOD APPROACHES:
    - Generative art that evolves over time
    - Animated patterns or fractals  
    - Games or simulations
    - Data visualizations
    - Abstract animations
    - Geometric explorations
    - Creative uses of HTML elements + p5.js canvas depending on the theme

    BEGIN HTML OUTPUT:`;
        }

        // Shuffle message array for randomization
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        let currentGeneration = {
            theme: '',
            code: ''
        };
        let isGenerating = false;
        let consoleCommandInterval = null;

        // Helper function to set regenerate button text with wave animation
        function setRegenerateButtonText(text) {
            const regenerateButton = document.getElementById('regenerateButton');
            if (text === 'generating...') {
                // Create wave animation with spans
                const chars = text.split('');
                regenerateButton.innerHTML = chars.map((char, index) => {
                    const delay = (index * 0.1) % 1.2;
                    return `<span class="button-wave-char" style="animation-delay: ${delay}s">${char}</span>`;
                }).join('');
                regenerateButton.disabled = false;
                // Only attach handler if not already attached
                if (!regenerateButton._handlerAttached) {
                    regenerateButton.onclick = () => {
                        if (isGenerating) {
                            document.getElementById('loadingOverlay').classList.remove('hidden');
                            document.getElementById('themeScreen').style.display = 'none';
                        } else {
                            document.getElementById('themeScreen').style.display = 'flex';
                            document.getElementById('topBar').style.display = 'flex';
                            document.getElementById('generatedContent').innerHTML = '';
                            currentGeneration = { theme: '', code: '' };
                            updateSaveButton();
                            setRegenerateButtonText('generate');
                        }
                    };
                    regenerateButton._handlerAttached = true;
                }
            } else {
                regenerateButton.textContent = text;
                regenerateButton.disabled = false;
                // Only attach handler if not already attached
                if (!regenerateButton._handlerAttached) {
                    regenerateButton.onclick = () => {
                        document.getElementById('themeScreen').style.display = 'flex';
                        document.getElementById('topBar').style.display = 'flex';
                        document.getElementById('generatedContent').innerHTML = '';
                        currentGeneration = { theme: '', code: '' };
                        updateSaveButton();
                        setRegenerateButtonText('generate');
                        regenerateButton.disabled = false;
                    };
                    regenerateButton._handlerAttached = true;
                }
            }
        }

        // Update progress bar
        function setProgressBar(percent) {
            const progressBar = document.querySelector('.progress-bar');
            if (progressBar) {
                progressBar.style.width = percent + '%';
                progressBar.style.animation = 'none'; // Stop the animation
            }
        }

        // Random console messages for loading (loaded from /casino-assets/console-commands.json)

        let currentTypingInterval = null; // Track active typing animation

        function typeText(element, text, speed = 60) {
            return new Promise((resolve) => {
                // Cancel any existing typing animation on this element
                if (currentTypingInterval !== null) {
                    clearInterval(currentTypingInterval);
                    currentTypingInterval = null;
                }
                
                let i = 0;
                element.textContent = '';
                
                const interval = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text[i];
                        i++;
                    } else {
                        clearInterval(interval);
                        currentTypingInterval = null;
                        resolve();
                    }
                }, speed);
                
                currentTypingInterval = interval;
            });
        }

        function typeConsoleCommand(text, type = 'normal', speed = 30) {
            return new Promise((resolve) => {
                const consoleOutput = document.getElementById('consoleOutput');
                if (!consoleOutput) {
                    resolve();
                    return;
                }
                
                const line = document.createElement('div');
                line.className = 'console-line';
                if (type !== 'normal') line.classList.add(type);
                
                consoleOutput.appendChild(line);
                
                let i = 0;
                const interval = setInterval(() => {
                    if (i < text.length) {
                        line.textContent += text[i];
                        i++;
                    } else {
                        clearInterval(interval);
                        
                        // Remove old lines if too many (keep last 5 lines)
                        const lines = consoleOutput.querySelectorAll('.console-line');
                        if (lines.length > 5) {
                            lines[0].classList.add('fading');
                            setTimeout(() => {
                                if (lines[0].parentNode) {
                                    lines[0].remove();
                                }
                            }, 600);
                        }
                        resolve();
                    }
                }, speed);
            });
        }

        function addConsoleCommand(text, type = 'normal') {
            // Just add text without typing - used for status updates
            const consoleOutput = document.getElementById('consoleOutput');
            if (!consoleOutput) return;
            
            const line = document.createElement('div');
            line.className = 'console-line';
            if (type !== 'normal') line.classList.add(type);
            line.textContent = text;
            
            consoleOutput.appendChild(line);
            
            // Remove old lines if too many (keep last 6 lines)
            const lines = consoleOutput.querySelectorAll('.console-line');
            if (lines.length > 6) {
                lines[0].classList.add('fading');
                setTimeout(() => {
                    if (lines[0].parentNode) {
                        lines[0].remove();
                    }
                }, 600);
            }
        }

        function disableGeneratedContextMenu(container, iframe = null) {
            if (!container) return;

            if (!container.dataset.contextMenuDisabled) {
                container.addEventListener('contextmenu', (event) => event.preventDefault());
                container.dataset.contextMenuDisabled = 'true';
            }

            if (iframe && iframe.contentDocument) {
                const doc = iframe.contentDocument;
                doc.addEventListener('contextmenu', (event) => event.preventDefault());
                if (doc.body) {
                    doc.body.addEventListener('contextmenu', (event) => event.preventDefault());
                }
            }
        }

        function startConsoleCommands() {
            stopConsoleCommands(); // Ensure no previous interval is running
            // Clear console output before starting new commands
            const consoleOutput = document.getElementById('consoleOutput');
            if (consoleOutput) {
                consoleOutput.innerHTML = '';
            }
            let lastCommand = null;
            // Add initial commands with typing animation
            (async () => {
                await typeConsoleCommand('System initialized', 'status', 30);
                await new Promise(r => setTimeout(r, 500));
                await typeConsoleCommand('Connecting to AI engine...', 'normal', 30);
                await new Promise(r => setTimeout(r, 500));
                await typeConsoleCommand('Connection established', 'status', 30);
                await new Promise(r => setTimeout(r, 500));
                // Continue with random commands
                consoleCommandInterval = setInterval(async () => {
                    if (!consoleCommandsLoaded || consoleCommands.length === 0) return;
                    let randomCommand;
                    let attempts = 0;
                    do {
                        randomCommand = consoleCommands[Math.floor(Math.random() * consoleCommands.length)];
                        attempts++;
                    } while (randomCommand === lastCommand && attempts < 10);
                    lastCommand = randomCommand;
                    await typeConsoleCommand(randomCommand, 'normal', 25);
                }, 4000);
            })();
        }

        function stopConsoleCommands() {
            if (consoleCommandInterval) {
                clearInterval(consoleCommandInterval);
                consoleCommandInterval = null;
            }
        }

        // Generic loading messages
        function getLoadingMessages() {
            return [
                "Generating creative code...",
                "Summoning digital muses...",
                "Drawing pixels from the void...",
                "Brewing up generative magic...",
                "Composing a new experience...",
                "Building your site...",
                "Unleashing creative chaos...",
                "Rendering the impossible...",
                "Inventing new patterns...",
                "Almost ready..."
            ];
        }

        // Get random theme from AI
        async function getRandomTheme() {
            const response = await fetch(RANDOM_WORDS_ENDPOINT, {});
            if (!response.ok) {
                throw new Error('Failed to fetch random theme');
            }
            const data = await response.json();
            return data.theme;
        }

        function setDisplayedGeneration(gen) {
            displayedGeneration = gen;
            const container = document.getElementById('generatedContent');
            clearAndSandbox(container);
            container.style.display = 'block';
            const isFullHTML = /<html[\s>]/i.test(gen.code) || /<body[\s>]/i.test(gen.code) || /<script[\s>]/i.test(gen.code) || /<style[\s>]/i.test(gen.code);
            const loadingOverlay = document.getElementById('loadingOverlay');
            // Hide overlay first, then inject site
            loadingOverlay.classList.add('hidden');
            setTimeout(() => {
                updateSaveButton();
                if (isFullHTML) {
                    container.innerHTML = gen.code;
                    disableGeneratedContextMenu(container);
                    // Remove all script tags from container
                    Array.from(container.querySelectorAll('script')).forEach(s => s.remove());
                    // Extract scripts from a temp div and append them to container
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = gen.code;
                    const scripts = tempDiv.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        for (const attr of oldScript.attributes) {
                            newScript.setAttribute(attr.name, attr.value);
                        }
                        if (oldScript.textContent) {
                            newScript.textContent = oldScript.textContent;
                        }
                        container.appendChild(newScript);
                    });
                } else {
                    container.textContent = gen.code;
                }
            }, 120); // Delay to ensure overlay is hidden first
        }
        
        // Utility to sandbox and clear preview or generated site
        function clearAndSandbox(container) {
            // Remove all child nodes and scripts
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }
            // Remove any lingering p5.js instances
            if (window.p5Instance) {
                window.p5Instance.remove();
                window.p5Instance = null;
            }
            // Remove all canvas elements from the document
            const canvases = document.querySelectorAll('canvas');
            canvases.forEach(canvas => {
                if (canvas.parentNode) {
                    canvas.parentNode.removeChild(canvas);
                }
            });
        }



        // Call AI API to generate a site for a theme
        async function generateWebsite() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const regenerateButton = document.getElementById('regenerateButton');
            const generatedContent = document.getElementById('generatedContent');
            const themeInput = document.getElementById('themeInput');
            const themeScreen = document.getElementById('themeScreen');
            const topBar = document.getElementById('topBar');
            // Require a theme — no silent random fallback
            if (!themeInput.value.trim()) {
                themeInput.classList.remove('input-error');
                void themeInput.offsetWidth; // force reflow to restart animation
                themeInput.classList.add('input-error');
                themeInput.addEventListener('animationend', () => themeInput.classList.remove('input-error'), { once: true });
                themeInput.focus();
                return;
            }
            // Hide theme screen, show loading overlay
            themeScreen.style.display = 'none';
            loadingOverlay.classList.remove('hidden');
            topBar.style.display = 'flex';
            setRegenerateButtonText('generating...');
            regenerateButton.disabled = true;
            // ...existing code...
            generatedContent.innerHTML = '';
            isGenerating = true;
            wasLoadingWhenGenerated = true;
            setProgressBar(0);
            // Animated progress bar with easing for more natural pacing
            let progress = 0;
            let t = 0;
            let progressInterval = null;
            setTimeout(() => {
                progressInterval = setInterval(() => {
                    if (progress < 85) {
                        // Ease in: slow at first, then faster
                        t += 0.005; // Even slower
                        // Use an ease-out cubic function for natural feel
                        let eased = 85 * (1 - Math.pow(1 - t, 3));
                        // Prevent overshooting
                        if (eased > 85) eased = 85;
                        progress = eased;
                        setProgressBar(progress);
                    }
                }, 120); // Even slower update
            }, 2000); // Delay progress bar start by 2000ms
            document.getElementById('consoleOutput').innerHTML = '';
            let themeValue = themeInput.value.trim();
            const themeStatus = document.getElementById('themeStatus');
            themeStatus.textContent = themeValue;
            themeStatus.style.display = 'block';
            startConsoleCommands();
            if (window.p5Instance) {
                window.p5Instance.remove();
                window.p5Instance = null;
            }
            previousGeneration = null;
            backgroundGeneration = null;
            try {
                // Use themeValue for all theme logic
                const prompt = createGenerationPrompt(themeValue);
                // Always send both theme and prompt to backend
                const response = await fetch(GENERATE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ theme: themeValue, prompt })
                });
                if (!response.ok) throw new Error('Failed to generate site');
                const data = await response.json();
                let firstPassCode = data.html || data.code;
                // Second pass: ask AI to flesh out and fully implement referenced functions
                const secondPassPrompt = `
You previously generated this site for the theme: "${themeValue}". Please review and improve it:

1. Flesh out the site further, making it more substantial and creative. The current code is merely a skeleton of what the site could be. Expand on it and make it more fully realized. This site should better fit the idea: "${themeValue}".
2. Carefully check for any referenced functions, variables, or classes that are not fully implemented, and implement them.
3. Ensure all p5.js code is complete and functional.
4. Output only the improved HTML/CSS/JS code, no explanations.

Theme: ${themeValue}

Here is the current code:
${firstPassCode}
`;
                // Show theme again during second pass
                themeStatus.textContent = themeValue;
                themeStatus.style.display = 'block';
                const secondResponse = await fetch(GENERATE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ theme: themeValue, prompt: secondPassPrompt })
                });
                if (!secondResponse.ok) throw new Error('Failed to improve site');
                const improvedData = await secondResponse.json();
                const improvedCode = improvedData.html || improvedData.code;
                currentGeneration = {
                    theme: themeValue,
                    code: improvedCode
                };
                // Only show new site immediately
                setDisplayedGeneration(currentGeneration);
                setTimeout(() => {
                    generatedContent.innerHTML = improvedCode;
                    disableGeneratedContextMenu(generatedContent);
                    // Execute any script tags in the generated HTML (no template literal injection)
                    const scripts = generatedContent.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        for (const attr of oldScript.attributes) {
                            newScript.setAttribute(attr.name, attr.value);
                        }
                        if (oldScript.textContent) {
                            newScript.textContent = oldScript.textContent;
                        }
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                            // Global error handler for generated content
                            window.addEventListener('error', function(event) {
                                const container = document.getElementById('generatedContent');
                                if (!container) return;
                                // Check if error target is inside generatedContent
                                if (event.target && container.contains(event.target)) {
                                    const errorDiv = document.createElement('div');
                                    errorDiv.className = 'error-overlay';
                                    errorDiv.textContent = 'Site error: ' + event.message;
                                    container.appendChild(errorDiv);
                                }
                            });
                    // Complete progress bar
                    progress = 100;
                    setProgressBar(100);
                    clearInterval(progressInterval);
                    loadingOverlay.classList.add('hidden');
                    // Hide themeStatus after loading
                    document.getElementById('themeStatus').style.display = 'none';
                    setRegenerateButtonText('generate');
                    regenerateButton.disabled = false;
                    isGenerating = false;
                    updateSaveButton();
                }, 0);
            } catch (error) {
                stopConsoleCommands();
                addConsoleCommand('Error: ' + error.message, 'error');
                setProgressBar(100);
                clearInterval(progressInterval);
                setRegenerateButtonText('generate');
                regenerateButton.disabled = false;
                isGenerating = false;
                // Show themeStatus even on error
                document.getElementById('themeStatus').style.display = 'block';
            }
        }

        // ── Favorites ────────────────────────────────────────────
        const FAV_KEY = 'wwc-favorites';
        const MAX_FAVS = 30;

        function getFavorites() {
            try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
            catch { return []; }
        }

        function saveFavorites(arr) {
            localStorage.setItem(FAV_KEY, JSON.stringify(arr));
        }

        function formatRelDate(iso) {
            const diff = Date.now() - new Date(iso).getTime();
            if (diff < 60000)      return 'just now';
            if (diff < 3600000)    return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000)   return Math.floor(diff / 3600000) + 'h ago';
            return Math.floor(diff / 86400000) + 'd ago';
        }

        function isCurrentSaved() {
            if (!currentGeneration.code) return false;
            return getFavorites().some(f => f.code === currentGeneration.code);
        }

        function updateSaveButton() {
            const btn = document.getElementById('saveButton');
            if (!btn) return;
            const hasSite = !!currentGeneration.code;
            btn.style.display = hasSite ? 'flex' : 'none';
            if (hasSite) {
                const saved = isCurrentSaved();
                btn.textContent = saved ? '✓ saved' : '★ save';
                btn.classList.toggle('is-saved', saved);
            }
        }

        function renderFavorites() {
            const favs = getFavorites();
            const list = document.getElementById('favoritesList');
            const empty = document.getElementById('favoritesEmpty');
            const favBtn = document.getElementById('favoritesButton');
            if (!list) return;

            favBtn.textContent = favs.length > 0 ? `saved (${favs.length})` : 'saved';
            favBtn.classList.toggle('has-items', favs.length > 0);

            list.querySelectorAll('.fav-item').forEach(el => el.remove());
            empty.style.display = favs.length === 0 ? 'block' : 'none';

            [...favs].reverse().forEach(fav => {
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.innerHTML = `
                    <div class="fav-meta">
                        <span class="fav-theme" title="${fav.theme.replace(/"/g,'&quot;')}">${fav.theme}</span>
                        <span class="fav-date">${formatRelDate(fav.savedAt)}</span>
                    </div>
                    <button class="fav-btn load-btn">load</button>
                    <button class="fav-btn delete-btn">×</button>
                `;
                item.querySelector('.load-btn').addEventListener('click', () => loadFavorite(fav));
                item.querySelector('.delete-btn').addEventListener('click', () => deleteFavorite(fav.id));
                list.appendChild(item);
            });
        }

        function addToFavorites() {
            if (!currentGeneration.code || isCurrentSaved()) return;
            const favs = getFavorites();
            if (favs.length >= MAX_FAVS) favs.shift();
            favs.push({ id: Date.now().toString(), theme: currentGeneration.theme, code: currentGeneration.code, savedAt: new Date().toISOString() });
            saveFavorites(favs);
            renderFavorites();
            updateSaveButton();
        }

        function deleteFavorite(id) {
            saveFavorites(getFavorites().filter(f => f.id !== id));
            renderFavorites();
            updateSaveButton();
        }

        function loadFavorite(fav) {
            closeFavoritesPanel();
            currentGeneration = { theme: fav.theme, code: fav.code };
            document.getElementById('themeScreen').style.display = 'none';
            document.getElementById('topBar').style.display = 'flex';
            setDisplayedGeneration(currentGeneration);
        }

        function toggleFavoritesPanel() {
            const panel = document.getElementById('favoritesPanel');
            if (panel.classList.contains('open')) {
                closeFavoritesPanel();
            } else {
                renderFavorites();
                panel.classList.add('open');
                document.getElementById('favoritesButton').classList.add('panel-open');
            }
        }

        function closeFavoritesPanel() {
            document.getElementById('favoritesPanel').classList.remove('open');
            document.getElementById('favoritesButton').classList.remove('panel-open');
        }
        // ─────────────────────────────────────────────────────────

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const regenerateButton = document.getElementById('regenerateButton');
            const randomThemeButton = document.getElementById('randomThemeButton');
            const themeInput = document.getElementById('themeInput');
            const themeScreen = document.getElementById('themeScreen');
            const startGenerationButton = document.getElementById('startGenerationButton');
            const topBar = document.getElementById('topBar');

            // Show theme screen initially, show top bar, hide loading overlay
            themeScreen.style.display = 'flex';
            topBar.style.display = 'flex';
            document.getElementById('loadingOverlay').classList.add('hidden');

            regenerateButton.addEventListener('click', () => {
                // Show loading overlay if site is generating
                if (isGenerating) {
                    document.getElementById('loadingOverlay').classList.remove('hidden');
                    document.getElementById('themeScreen').style.display = 'none';
                } else {
                    // Show theme screen, hide generated content, reset button
                    document.getElementById('themeScreen').style.display = 'flex';
                    document.getElementById('topBar').style.display = 'flex';
                    document.getElementById('generatedContent').innerHTML = '';
                    // Always reset regenerate button when theme screen is shown
                    setRegenerateButtonText('generate');
                    regenerateButton.disabled = false;
                    // Do NOT hide loadingOverlay here; it will be hidden after generation completes
                }
            });
            document.getElementById('saveButton').addEventListener('click', addToFavorites);
            document.getElementById('favoritesButton').addEventListener('click', toggleFavoritesPanel);
            document.addEventListener('click', (e) => {
                const panel = document.getElementById('favoritesPanel');
                const btn = document.getElementById('favoritesButton');
                if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
                    closeFavoritesPanel();
                }
            });
            renderFavorites();
            updateSaveButton();

            randomThemeButton.addEventListener('click', async () => {
                topBar.style.display = 'flex'; // Always show topBar when themeScreen is visible
                setRegenerateButtonText('generate');
                regenerateButton.disabled = false;
                randomThemeButton.disabled = true;
                randomThemeButton.textContent = '...';
                try {
                    const theme = await getRandomTheme();
                    themeInput.value = theme;
                } catch (e) {
                    themeInput.value = 'nothing found';
                }
                randomThemeButton.disabled = false;
                randomThemeButton.textContent = 'random_theme';
                topBar.style.display = 'flex'; // Always show topBar when themeScreen is visible
            });
            startGenerationButton.addEventListener('click', () => {
                setRegenerateButtonText('generate');
                regenerateButton.disabled = false;
                generateWebsite();
            });
        });
    </script>
</body>

</html>
