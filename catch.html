<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Play catch with your dad!</title>
    <style>
        @font-face {
            font-family: "F25 Bank Printer";
            src: url("F25_Bank_Printer.ttf") format("truetype");
            font-display: swap;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0d0d14;
            font-family: "F25 Bank Printer", monospace;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
        }

        body,
        a,
        div,
        button,
        input {
            font-family: "F25 Bank Printer", monospace;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
        }

        #music-credit {
            position: fixed;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 150;
            font-family: "F25 Bank Printer", monospace;
            font-size: 10px;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.48);
            text-align: center;
            pointer-events: none;
            text-transform: uppercase;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
        }
    </style>
</head>

<body>
    <a href="index.html"
        style="position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 8px 8px; background: rgba(0, 0, 0, 0.8); color: white; border: 1px solid #444; border-radius: 4px; text-decoration: none; font-family: 'F25 Bank Printer', monospace; font-size: 18px; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); line-height: 1; display: flex; align-items: center; justify-content: center;"
        onmouseover="this.style.transform='scale(1.2) rotate(5deg)'; this.style.background='rgba(100, 200, 255, 0.8)'; this.style.borderColor='#888'"
        onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.background='rgba(0, 0, 0, 0.8)'; this.style.borderColor='#444'"
        onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'"
        onmouseup="this.style.transform='scale(1.2) rotate(5deg)'">
        <img src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png" alt="home"
            style="width: 18px; height: 18px; object-fit: contain;"></a>
    <div id="vol-slider" style="position:fixed;bottom:16px;left:16px;z-index:200;cursor:pointer;user-select:none;font-family:'F25 Bank Printer',monospace;color:rgba(255,255,255,0.5);letter-spacing:2px;line-height:1.6;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:2px;">volume</div>
        <div id="vol-bar" style="font-size:13px;"></div>
    </div>
    <div id="music-credit">Music by Alex McCulloch</div>
    <audio id="bg-music" src="audio/Improvisation_Alex.mp3" loop preload="auto" playsinline></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
    <script>
        class Segment {
            constructor(x, y, len, i) {
                this.angle = 0;
                this.b = createVector();
                if (x instanceof Segment) {
                    // create from vector x, with len y
                    this.sw = map(len, 0, 20, 1, 10);
                    this.a = x.b.copy();
                    this.len = y;
                    this.calculateB();
                } else {
                    // create new vector
                    this.a = createVector(x, y);
                    this.sw = map(i, 0, 20, 1, 10);
                    this.len = len;
                    this.calculateB();
                }
            }

            followChild(child) {
                let targetX = child.a.x;
                let targetY = child.a.y;
                this.follow(targetX, targetY);
            }

            follow(tx, ty) {
                let target = createVector(tx, ty);
                let dir = p5.Vector.sub(target, this.a);
                this.angle = dir.heading();
                dir.setMag(this.len);
                dir.mult(-1);
                this.a = p5.Vector.add(target, dir);
            }

            setA(pos) {
                this.a = pos.copy();
                this.calculateB();
            }

            calculateB() {
                let dx = this.len * cos(this.angle);
                let dy = this.len * sin(this.angle);
                this.b.set(this.a.x + dx, this.a.y + dy);
            }

            update() {
                this.calculateB();
            }

            show() {
                stroke(255);
                strokeWeight(this.sw);
                line(this.a.x, this.a.y, this.b.x, this.b.y);
            }
        }

        class Tentacle {
            constructor(x, y, numSegments, len) {
                this.segments = [];
                this.base = createVector(x, y);
                this.numSegments = numSegments;
                this.len = len;
                // First segment
                this.segments[0] = new Segment(x, y, this.len, 0);
                for (let i = 1; i < this.numSegments; i++) {
                    this.segments[i] = new Segment(this.segments[i - 1], this.len, i);
                    // Taper stroke weight
                    this.segments[i].sw = map(i, 0, this.numSegments - 1, 18, 3);
                }
                // Taper first segment
                this.segments[0].sw = 18;
            }

            followBall(ball) {
                let total = this.segments.length;
                let end = this.segments[total - 1];
                end.follow(ball.x, ball.y);
                end.update();
                for (let i = total - 2; i >= 0; i--) {
                    this.segments[i].followChild(this.segments[i + 1]);
                    this.segments[i].update();
                }
                this.segments[0].setA(this.base);
                for (let i = 1; i < total; i++) {
                    this.segments[i].setA(this.segments[i - 1].b);
                }
            }

            show() {
                for (let i = 0; i < this.segments.length; i++) {
                    this.segments[i].show();
                }
            }
        }

        let arm;
        let ball;
        let gravity = 0.3;
        let dragging = false;
        let dragOffset = { x: 0, y: 0 };
        let throwStage = null;
        let throwTimer = 0;
        let throwLiftTarget = null;
        let throwLiftProgress = 0;
        let throwLiftStart = null;
        let throwLiftStartVel = null;
        let throwCatchVel = null;
        let throwContactTimer = 0;
        let throwCooldown = 0;
        let mouseHistory = [];
        let ballActivated = false;
        let throwMeFade = 1.0;
        let hintX, hintY;
        let displayFont;

        let audioCtx = null;
        let audioBuffers = [];
        let lastHitFrame = -60;
        const HIT_COOLDOWN = 2;
        const HIT_THRESHOLD = 1.7;
        let masterVolume = 0.8;
        const BG_MUSIC_MAX_LEVEL = 0.15;
        const BG_MUSIC_FADE = 0.75;
        let bgMusicStarted = false;
        let bgMusicSource = null;
        let bgMusicGain = null;
        const bgMusicEl = document.getElementById('bg-music');

        function preload() {
            displayFont = loadFont('F25_Bank_Printer.ttf');
        }

        function ensureAudioGraph() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (!bgMusicSource) {
                bgMusicSource = audioCtx.createMediaElementSource(bgMusicEl);
                bgMusicGain = audioCtx.createGain();
                bgMusicGain.gain.value = 0;
                bgMusicSource.connect(bgMusicGain);
                bgMusicGain.connect(audioCtx.destination);
            }
        }

        function getBackgroundMusicLevel() {
            return BG_MUSIC_MAX_LEVEL * masterVolume;
        }

        function updateBackgroundMusicVolume(immediate = false) {
            if (!audioCtx || !bgMusicGain) return;
            let t = audioCtx.currentTime;
            let target = getBackgroundMusicLevel();
            bgMusicGain.gain.cancelScheduledValues(t);
            if (immediate) {
                bgMusicGain.gain.setValueAtTime(target, t);
                return;
            }
            let current = bgMusicGain.gain.value;
            bgMusicGain.gain.setValueAtTime(current, t);
            bgMusicGain.gain.linearRampToValueAtTime(target, t + 0.12);
        }

        (function initVolSlider() {
            const STEPS = 10;
            const bar = document.getElementById('vol-bar');
            function render() {
                const filled = Math.round(masterVolume * STEPS);
                let out = '';
                for (let i = 0; i < STEPS; i++) {
                    if (i < filled - 1) out += '▓';
                    else if (i === filled - 1) out += (filled === STEPS ? '▓' : '▒');
                    else out += '░';
                }
                bar.textContent = out;
            }
            function setFromEvent(e) {
                const rect = bar.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                masterVolume = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
                updateBackgroundMusicVolume();
                render();
            }
            let draggingVol = false;
            bar.addEventListener('mousedown', e => { draggingVol = true; setFromEvent(e); e.stopPropagation(); });
            window.addEventListener('mousemove', e => { if (draggingVol) setFromEvent(e); });
            window.addEventListener('mouseup', () => { draggingVol = false; });
            bar.addEventListener('touchstart', e => { draggingVol = true; setFromEvent(e); e.preventDefault(); }, { passive: false });
            window.addEventListener('touchmove', e => { if (draggingVol) setFromEvent(e); }, { passive: false });
            window.addEventListener('touchend', () => { draggingVol = false; });
            render();
        })();

        function unlockAudio() {
            ensureAudioGraph();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            startBackgroundMusic();
        }

        async function loadBallSounds() {
            ensureAudioGraph();
            for (let i = 1; i <= 5; i++) {
                try {
                    let resp = await fetch(`https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/audio/ballhit${i}.wav`);
                    let arrayBuffer = await resp.arrayBuffer();
                    let decoded = await audioCtx.decodeAudioData(arrayBuffer);
                    audioBuffers.push(decoded);
                } catch(e) {}
            }
        }

        async function startBackgroundMusic() {
            ensureAudioGraph();
            if (bgMusicStarted) return;
            bgMusicStarted = true;
            let t = audioCtx.currentTime;
            bgMusicGain.gain.cancelScheduledValues(t);
            bgMusicGain.gain.setValueAtTime(0, t);
            bgMusicGain.gain.linearRampToValueAtTime(getBackgroundMusicLevel(), t + BG_MUSIC_FADE);
            try {
                bgMusicEl.volume = 1;
                await bgMusicEl.play();
            } catch (e) {
                bgMusicStarted = false;
            }
        }

        function fadeOutBackgroundMusic() {
            if (!audioCtx || !bgMusicGain) return;
            let t = audioCtx.currentTime;
            let current = bgMusicGain.gain.value;
            bgMusicGain.gain.cancelScheduledValues(t);
            bgMusicGain.gain.setValueAtTime(current, t);
            bgMusicGain.gain.linearRampToValueAtTime(0, t + 0.45);
        }

        function primeAudio() {
            unlockAudio();
            window.removeEventListener('pointerdown', primeAudio);
            window.removeEventListener('touchstart', primeAudio);
            window.removeEventListener('keydown', primeAudio);
        }

        window.addEventListener('pointerdown', primeAudio, { once: true });
        window.addEventListener('touchstart', primeAudio, { once: true });
        window.addEventListener('keydown', primeAudio, { once: true });
        window.addEventListener('beforeunload', fadeOutBackgroundMusic);
        window.addEventListener('pagehide', fadeOutBackgroundMusic);

        function playBallHit(speed) {
            if (frameCount - lastHitFrame < HIT_COOLDOWN) return;
            if (!audioCtx || audioBuffers.length === 0) return;
            lastHitFrame = frameCount;
            let buffer = audioBuffers[Math.floor(Math.random() * audioBuffers.length)];
            let source = audioCtx.createBufferSource();
            source.buffer = buffer;
            let gain = audioCtx.createGain();
            let targetVol = Math.min(1, (speed / 18) * masterVolume);
            let t = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(targetVol, t + 0.005);
            gain.gain.setValueAtTime(targetVol, t + buffer.duration - 0.015);
            gain.gain.linearRampToValueAtTime(0, t + buffer.duration);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(t);
        }

        function createArm() {
            const segLen = 14;
            const numSegs = Math.max(30, Math.round(52 * (width / 1920)));
            return new Tentacle(width + 60, height / 2, numSegs, segLen);
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            arm = createArm();
            resetBall();
            hintX = 120;
            hintY = height / 2;
            loadBallSounds();
            // Speech bubble setup
            window.speechMessages = [
                "I dont have any eyes so I'm finding this ball through smell",
                "Are you still here",
                "I can smell when the ball gets close",
                "I hope we can play like this forever",
                "I'm your father",
                "I feel your sweat on the ball",
                "I wish I could see you",
                "This ball feels like home to me",
                "I hope you're having fun",
                "Your mom made this game for us to play togetiher",
                "I can tell you're getting tired of me",
                "I wish I could see you throw the ball",
                "You're getting better at throwing",
                "I hope you know I love you",
                "I can feel the excitement when you throw the ball really hard",
                "Every throw is a secret every catch is a confession",
                "I'm here even when you can't see me",
                "You ain't seen grip like this kid",
                "Wow you're real fast at throwing that ball",
                "I know you're smiling when you throw like that",
                "Keep it up sport! You're a natural",
                "Thanks for playing with your old dad",
                "Nice throw champ! You got a real arm on you",
                "Huh, I've never seen anyone do that before"
            ];
            // Shuffle queue for unique messages
            window.speechQueue = shuffle([...speechMessages]);
            window.speechBubble = {
                active: false,
                message: "",
                timer: 0,
                fade: 0,
                state: "hidden"
            };
            window.speechBubbleInterval = Math.floor(random(380, 1880)); // frames until first bubble
        }

        function resetBall() {
            ball = {
                x: 120,
                y: height / 2,
                vx: 0,
                vy: 0,
                isHeld: false,
                isReturning: false,
                radius: 32
            };
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            arm = createArm();
            if (!ballActivated) {
                hintX = 120;
                hintY = height / 2;
                resetBall();
            }
        }

        function mousePressed() {
            unlockAudio();
            let d = dist(mouseX, mouseY, ball.x, ball.y);
            // Prevent grabbing if ball is held by tentacle or in throw sequence
            if (d < (ball.radius || 32) && !ball.isHeld && !ball.isReturning && !throwStage) {
                ballActivated = true;
                dragging = true;
                ball.isHeld = true;
                ball.isReturning = false;
                dragOffset.x = ball.x - mouseX;
                dragOffset.y = ball.y - mouseY;
                ball.vx = 0;
                ball.vy = 0;
                mouseHistory = [];
            }
        }

        function mouseDragged() {
            if (dragging && ball.isHeld) {
                ball.x = mouseX + dragOffset.x;
                ball.y = mouseY + dragOffset.y;
                mouseHistory.push({ x: mouseX, y: mouseY, t: frameCount });
                if (mouseHistory.length > 6) mouseHistory.shift();
            }
        }

        function mouseReleased() {
            if (dragging && ball.isHeld) {
                dragging = false;
                ball.isHeld = false;
                // Average velocity over recent history frames
                let vx = 0, vy = 0;
                if (mouseHistory.length >= 2) {
                    let oldest = mouseHistory[0];
                    let newest = mouseHistory[mouseHistory.length - 1];
                    let dt = Math.max(1, newest.t - oldest.t);
                    vx = (newest.x - oldest.x) / dt;
                    vy = (newest.y - oldest.y) / dt;
                }
                ball.vx = vx * 0.9;
                ball.vy = vy * 0.9;
                mouseHistory = [];
            }
        }

        function draw() {
            background(0);
            arm.followBall(ball);

            // Speech bubble logic
            if (!speechBubble.active && speechBubbleInterval-- <= 0) {
                speechBubble.active = true;
                // Pick next unique message
                if (speechQueue.length === 0) {
                    speechQueue = shuffle([...speechMessages]);
                }
                speechBubble.message = speechQueue.pop();
                speechBubble.timer = 0;
                speechBubble.fade = 0;
                speechBubble.state = "fadein";
                speechBubbleInterval = Math.floor(random(380, 1900)); // next interval
            }
            if (speechBubble.active) {
                if (speechBubble.state === "fadein") {
                    speechBubble.fade += 0.02;
                    if (speechBubble.fade >= 1) {
                        speechBubble.fade = 1;
                        speechBubble.state = "show";
                    }
                } else if (speechBubble.state === "show") {
                    speechBubble.timer++;
                    if (speechBubble.timer > 210) {
                        speechBubble.state = "fadeout";
                    }
                } else if (speechBubble.state === "fadeout") {
                    speechBubble.fade -= 0.02;
                    if (speechBubble.fade <= 0) {
                        speechBubble.fade = 0;
                        speechBubble.active = false;
                        speechBubble.state = "hidden";
                    }
                }
                // Draw bubble
                push();
                if (displayFont) textFont(displayFont);
                textSize(17);
                textAlign(CENTER, CENTER);
                let paddingX = 42;
                let paddingY = 30;
                let lines = speechBubble.message.split("\n");
                let longest = lines.reduce((a, b) => a.length > b.length ? a : b, "");
                let textW = textWidth(longest);
                let textH = lines.length * 36;
                let bwidth = textW + paddingX * 2;
                let bheight = textH + paddingY * 2;
                let bx = width - bwidth - 60;
                let by = height / 2 - bheight / 2 - 165;
                let alpha = speechBubble.fade * 220;
                // Bubble border (higher definition)
                stroke(255, alpha);
                strokeWeight(2);
                noFill();
                beginShape();
                for (let i = 0; i < 64; i++) {
                    let angle = map(i, 0, 64, 0, TWO_PI);
                    let rx = bwidth / 2 + cos(angle) * (bwidth / 2 - 10 + random(-1.2, 1.2));
                    let ry = bheight / 2 + sin(angle) * (bheight / 2 - 10 + random(-1.2, 1.2));
                    vertex(bx + bwidth / 2 + rx - bwidth / 2, by + bheight / 2 + ry - bheight / 2);
                }
                endShape(CLOSE);
                // Bubble text (jittery)
                noStroke();
                fill(255, alpha);
                for (let i = 0; i < lines.length; i++) {
                    let jitterX = random(-0.5, 0.5);
                    let jitterY = random(-0.5, 0.5);
                    text(lines[i], bx + bwidth / 2 + jitterX, by + paddingY + 18 + i * 36 + jitterY);
                }
                pop();
            }

            let tip = arm.segments[arm.segments.length - 1].b;
            let tipDist = dist(ball.x, ball.y, tip.x, tip.y);

            if (throwStage === 'lift') {
                // Ball is lifted up and back
                if (!throwLiftTarget) {
                    let tip = arm.segments[arm.segments.length - 1].b;
                    // Use captured velocity from the catch moment for lift direction
                    const sourceVel = throwCatchVel || { vx: ball.vx, vy: ball.vy };
                    // Dad stands on the right; throw should go back left.
                    let liftDirX = -Math.abs(sourceVel.vx) * 90;
                    let liftDirY = sourceVel.vy * 45;
                    // Clamp lift direction to reasonable values
                    liftDirX = constrain(liftDirX, -60, 80);
                    liftDirY = constrain(liftDirY, -10, 38);
                    let liftX = tip.x + liftDirX;
                    let desiredLiftY = tip.y + liftDirY - 60;
                    let liftY = min(max(desiredLiftY, ball.radius + 20), height - ball.radius - 20);
                    throwLiftTarget = { x: liftX, y: liftY };
                    throwLiftProgress = 0;
                    throwLiftStart = { x: ball.x, y: ball.y };
                    // Store velocity at start of lift
                    throwLiftStartVel = { vx: sourceVel.vx, vy: sourceVel.vy };
                }
                // Progress from 0 to 1 over throwTimer duration
                let totalFrames = 24;
                throwLiftProgress += 1 / totalFrames;
                // Interpolate from start to target
                let prevX = ball.x;
                let prevY = ball.y;
                ball.x = lerp(throwLiftStart.x, throwLiftTarget.x, throwLiftProgress);
                ball.y = lerp(throwLiftStart.y, throwLiftTarget.y, throwLiftProgress);

                if (throwLiftStartVel) {
                    let liftMoveX = ball.x - prevX;
                    let liftMoveY = ball.y - prevY;
                    ball.vx = lerp(throwLiftStartVel.vx, liftMoveX, throwLiftProgress);
                    ball.vy = lerp(throwLiftStartVel.vy, liftMoveY, throwLiftProgress);
                }
                throwTimer--;
                if (throwTimer <= 0 || throwLiftProgress >= 1) {
                    throwStage = 'throw';
                    throwTimer = 0;
                }
            } else if (throwStage === 'throw') {
                // Ball is thrown forward, force depends on lift direction
                ball.isReturning = false;
                ball.isHeld = false;
                // Only calculate throw force if throwLiftTarget and throwLiftStart exist
                let throwForceX = 0, throwForceY = 0;
                if (throwLiftTarget && throwLiftStart) {
                    throwForceX = (throwLiftTarget.x - throwLiftStart.x) * 0.5;
                    throwForceX = -Math.abs(throwForceX);
                    throwForceY = (throwLiftTarget.y - throwLiftStart.y) * 0.5;
                    
                } else {
                    // Fallback: throw left and up with extra force
                    throwForceX = random(-2, 2);
                    throwForceY = random(-1, 2.5);
                }
                ball.vx = throwForceX + random(-1.5, 1.5);
                ball.vy = throwForceY + random(-1, 2.5);
                throwStage = null;
                throwTimer = 0;
                throwLiftTarget = null;
                throwLiftProgress = 0;
                throwLiftStart = null;
                throwLiftStartVel = null;
                throwCatchVel = null;
                throwCooldown = 60; // Prevent reattachment
            }

            if (!ball.isHeld && ballActivated) {
                // Keep normal movement except during scripted lift
                if (throwStage !== 'lift') {
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    ball.vy += gravity;
                }
            }
            // If ball is being held by arm, let tentacle tip follow ball's velocity and gravity
            if (!ball.isHeld && !ball.isReturning && tipDist < ball.radius + 8 && !throwStage && throwCooldown === 0) {
                throwCatchVel = { vx: ball.vx, vy: ball.vy };
                ball.isReturning = true;
                // Start contact timer
                if (throwContactTimer === 0) throwContactTimer = 40;
            }
            // Decrement throw cooldown
            if (throwCooldown > 0) throwCooldown--;
            // After contact timer expires, start lift
            if (ball.isReturning && !throwStage && throwContactTimer > 0) {
                throwContactTimer--;
                if (throwContactTimer === 0) {
                    throwStage = 'lift';
                    throwTimer = 24;
                    throwLiftTarget = null;
                    throwLiftProgress = 0;
                    throwLiftStart = null;
                }
            }
            // Reset contact timer if ball is not returning
            if (!ball.isReturning) {
                throwContactTimer = 0;
                throwCatchVel = null;
            }
            if (ball.x < ball.radius) {
                if (Math.abs(ball.vx) > HIT_THRESHOLD) playBallHit(Math.abs(ball.vx));
                ball.x = ball.radius;
                ball.vx *= -0.5;
            }
            if (ball.x > width - ball.radius) {
                if (Math.abs(ball.vx) > HIT_THRESHOLD) playBallHit(Math.abs(ball.vx));
                ball.x = width - ball.radius;
                ball.vx *= -0.5;
            }
            if (ball.y > height - ball.radius) {
                if (ball.vy > HIT_THRESHOLD) playBallHit(ball.vy);
                ball.y = height - ball.radius;
                ball.vy *= -0.5;
            }
            if (ball.y < ball.radius) {
                if (Math.abs(ball.vy) > HIT_THRESHOLD) playBallHit(Math.abs(ball.vy));
                ball.y = ball.radius;
                ball.vy *= -0.5;
            }

            arm.followBall(ball);

            // Keep visual/physical lock to the tentacle tip during contact window,
            // but preserve velocity so motion continues naturally before throw.
            if (ball.isReturning && !ball.isHeld && throwStage !== 'throw' && throwStage !== 'lift') {
                let tip = arm.segments[arm.segments.length - 1].b;
                ball.x = tip.x;
                ball.y = tip.y;
            }

            arm.show();

            noStroke();
            fill(ball.isHeld ? 'orange' : 'lime');
            ellipse(ball.x, ball.y, ball.radius * 2, ball.radius * 2);

            // "throw me" hint
            if (throwMeFade > 0) {
                if (ballActivated) throwMeFade = max(0, throwMeFade - 0.035);
                let bob = sin(frameCount * 0.07) * 5;
                let a = throwMeFade * 255;
                let tipX = hintX;
                let tipY = hintY + ball.radius + 5 + bob;
                let labelY = tipY + 38;
                push();
                stroke(255, 255, 255, a);
                strokeWeight(2);
                noFill();
                line(tipX, labelY - 8, tipX, tipY + 10);
                // arrowhead pointing up
                let hs = 9;
                line(tipX, tipY, tipX - hs * cos(-HALF_PI - 0.45), tipY - hs * sin(-HALF_PI - 0.45));
                line(tipX, tipY, tipX - hs * cos(-HALF_PI + 0.45), tipY - hs * sin(-HALF_PI + 0.45));
                // label
                noStroke();
                fill(255, 255, 255, a);
                if (displayFont) textFont(displayFont);
                textSize(13);
                textAlign(CENTER, TOP);
                text('throw me', tipX, labelY);
                pop();
            }

            // If ball returns to user side, reset
            if (ball.isReturning && ball.x < 80) {
                resetBall();
            }
        }
    </script>
</body>
