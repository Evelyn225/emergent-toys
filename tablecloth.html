<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
    <title>Warping Tablecloth Pattern</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #c94b4b;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            cursor: none;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 8px 8px; background: rgba(0, 0, 0, 0.8); color: white; border: 1px solid #444; border-radius: 4px; text-decoration: none; font-family: sans-serif; font-size: 18px; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); line-height: 1; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.transform='scale(1.2) rotate(5deg)'; this.style.background='rgba(255, 100, 100, 0.8)'; this.style.borderColor='#888'" onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.background='rgba(0, 0, 0, 0.8)'; this.style.borderColor='#444'" onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'" onmouseup="this.style.transform='scale(1.2) rotate(5deg)'"><img src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png" alt="home" style="width: 18px; height: 18px; object-fit: contain;"></a>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let logicalWidth = window.innerWidth;
        let logicalHeight = window.innerHeight;
        let vignetteGradient = null;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            logicalWidth = window.innerWidth;
            logicalHeight = window.innerHeight;
            canvas.style.width = logicalWidth + 'px';
            canvas.style.height = logicalHeight + 'px';
            canvas.width = Math.round(logicalWidth * dpr);
            canvas.height = Math.round(logicalHeight * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const vcx = logicalWidth / 2;
            const vcy = logicalHeight / 2;
            const vr = Math.sqrt((logicalWidth / 2) ** 2 + (logicalHeight / 2) ** 2);
            vignetteGradient = ctx.createRadialGradient(vcx, vcy, 0, vcx, vcy, vr);
            vignetteGradient.addColorStop(0,   'rgba(255, 240, 220, 0.0)');
            vignetteGradient.addColorStop(0.5, 'rgba(120,  30,  10, 0.08)');
            vignetteGradient.addColorStop(1,   'rgba(60,   10,   0, 0.48)');
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Pattern configuration
        const config = {
            gridSize: 28,
            warpAmplitude: 32,
            warpFrequency: 0.02,
            color: '#0c0c0c',
            accentColor: '#0c0c0c',
            timeSpeed: 0.008,
            lineWidth: 2
        };

        let time = 0;
        const ripples = [];
        let lastMousePos = { x: 0, y: 0, time: 0 };
        let mouseRippleCounter = 0;
        let mouseAngle = 0;
        let targetAngle = 0;
        let cursorImage = null;

        // Load custom cursor image
        const cursorImg = new Image();
        cursorImg.src = 'https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/paw.png?v=' + Date.now();
        cursorImg.onload = () => {
            cursorImage = cursorImg;
        };

        // Draw rotated cursor image on main canvas
        function drawCursor(x, y, angle) {
            if (!cursorImage) return;
            
            const size = 22; // Adjust size as needed
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.drawImage(cursorImage, -size / 2, -size / 2, size, size);
            ctx.restore();
        }

        function rippleDisplacement(x, y) {
            if (ripples.length === 0) return 0;
            let offset = 0;
            for (let i = 0; i < ripples.length; i++) {
                const r = ripples[i];
                const dx = x - r.x;
                const dy = y - r.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const wave = Math.sin((dist - r.t * 120) / 10);
                const falloff = Math.exp(-dist / 220);
                const fade = Math.max(0, 1 - r.t / 1.4);
                const ease = fade * fade * (3 - 2 * fade);
                const strength = r.strength !== undefined ? r.strength : 1.0;
                offset += wave * falloff * 6 * ease * strength;
            }
            return offset;
        }

        function drawWarpedGrid() {
            // Base fill
            ctx.fillStyle = '#c94b4b';
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            ctx.strokeStyle = config.color;
            ctx.lineWidth = config.lineWidth;
            ctx.lineCap = 'round';

            const t = time * 2;
            const freq = config.warpFrequency;
            const amp = config.warpAmplitude;
            // Build warped mesh — compute every intersection point once,
            // then share those exact points between cell fills and grid lines
            const gs = config.gridSize;
            const cols = Math.ceil((logicalWidth  + gs * 2) / gs) + 1;
            const rows = Math.ceil((logicalHeight + gs * 2) / gs) + 1;
            const ox = -gs, oy = -gs;

            const pts = [];
            for (let row = 0; row < rows; row++) {
                pts[row] = [];
                const gy = oy + row * gs;
                for (let col = 0; col < cols; col++) {
                    const gx = ox + col * gs;
                    const rip = rippleDisplacement(gx, gy);
                    pts[row][col] = [
                        gx + Math.sin(gy * freq + t) * amp + rip,
                        gy + Math.sin(gx * freq + t) * amp + rip
                    ];
                }
            }

            // Fill cells using mesh corners
            ctx.globalAlpha = 0.95;
            for (let row = 0; row < rows - 1; row++) {
                for (let col = 0; col < cols - 1; col++) {
                    const isRed = (row + col) % 2 === 0;
                    const [x1, y1] = pts[row][col];
                    const [x2, y2] = pts[row][col + 1];
                    const [x3, y3] = pts[row + 1][col + 1];
                    const [x4, y4] = pts[row + 1][col];

                    const grad = ctx.createLinearGradient(x1, y1, x3, y3);
                    if (isRed) {
                        grad.addColorStop(0, '#e86060');
                        grad.addColorStop(1, '#7a1e1e');
                    } else {
                        grad.addColorStop(0, '#fff6ee');
                        grad.addColorStop(1, '#c0a898');
                    }
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineTo(x3, y3);
                    ctx.lineTo(x4, y4);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // Draw grid lines using the same mesh points
            ctx.strokeStyle = config.color;
            ctx.lineWidth = config.lineWidth;

            for (let row = 0; row < rows; row++) {
                const gy = oy + row * gs;
                const distY = Math.abs(gy - logicalHeight / 2) / (logicalHeight / 2);
                ctx.globalAlpha = Math.max(0.35, 0.88 - distY * 0.38);
                ctx.beginPath();
                for (let col = 0; col < cols; col++) {
                    const [px, py] = pts[row][col];
                    col === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();
            }

            for (let col = 0; col < cols; col++) {
                const gx = ox + col * gs;
                const distX = Math.abs(gx - logicalWidth / 2) / (logicalWidth / 2);
                ctx.globalAlpha = Math.max(0.35, 0.88 - distX * 0.38);
                ctx.beginPath();
                for (let row = 0; row < rows; row++) {
                    const [px, py] = pts[row][col];
                    row === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Draw ripple interactions
            if (ripples.length > 0) {
                ctx.strokeStyle = config.accentColor;
                ctx.lineWidth = 1.5;
                for (let i = ripples.length - 1; i >= 0; i--) {
                    const r = ripples[i];
                    
                    // Draw visible circles for click ripples
                    if (r.type === 'click') {
                        const radius = r.t * 120;
                        const fade = Math.max(0, 1 - r.t / 1.4);
                        const ease = fade * fade * (3 - 2 * fade);
                        const alpha = 0.55 * ease;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    
                    r.t += 0.015;
                    if (r.t > 1.4) {
                        ripples.splice(i, 1);
                    }
                }
                ctx.globalAlpha = 1;
            }

            // Radial vignette — overhead light simulation
            ctx.globalAlpha = 1;
            ctx.fillStyle = vignetteGradient;
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            // Draw paw cursor
            if (lastMousePos.x > 0 || lastMousePos.y > 0) {
                drawCursor(lastMousePos.x, lastMousePos.y, mouseAngle);
            }

            time += config.timeSpeed;
            requestAnimationFrame(drawWarpedGrid);
        }

        // Start animation
        drawWarpedGrid();
        // Mouse interactivity - simple and performant
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * logicalWidth;
            const y = (e.clientY - rect.top) / rect.height * logicalHeight;

            // Create subtle ripples as mouse moves
            const now = Date.now();
            const dx = x - lastMousePos.x;
            const dy = y - lastMousePos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const timeDelta = now - lastMousePos.time;

            // Update cursor angle based on movement direction
            if (dx !== 0 || dy !== 0) {
                targetAngle = Math.atan2(dy, dx) + Math.PI / 2; // Add 90 degrees so paw points forward
            }

            // Smoothly interpolate towards target angle
            let angleDiff = targetAngle - mouseAngle;
            // Normalize angle difference to shortest path
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            mouseAngle += angleDiff * 0.15; // Smooth easing (adjust 0.15 for faster/slower rotation)

            // Create ripple on every mouse movement with some speed
            if (dist > 3 && timeDelta > 16) { // ~60fps polling
                // Scale strength with mouse speed (dist/timeDelta)
                const speed = dist / Math.max(timeDelta, 1);
                const strength = Math.min(0.5, 0.1 + speed * 0.05); // 0.1 to 0.5 range
                ripples.push({ x, y, t: 0, strength: strength, type: 'mousemove' }); // subtler, no circle
                lastMousePos = { x, y, time: now };
            }
        });
        canvas.addEventListener('mouseleave', () => {
            config.warpAmplitude = 18;
            config.warpFrequency = 0.02;
        });
        // Click to create ripples
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * logicalWidth;
            const y = (e.clientY - rect.top) / rect.height * logicalHeight;
            ripples.push({ x, y, t: 0, strength: 1.0, type: 'click' });
        });
        // Double-click to reset
        canvas.addEventListener('dblclick', () => {
            config.warpAmplitude = 18;
            config.warpFrequency = 0.02;
            time = 0;
        });
    </script>
</body>
</html>
