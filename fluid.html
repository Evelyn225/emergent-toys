<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16"
        href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
    <title>Liquid Particles Flow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001220;
        }

        #slider-wrap {
            position: fixed;
            left: 24px;
            bottom: 24px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 5px;
            user-select: none;
        }

        #slider-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px #000, 0 0 8px #000;
        }

        #influenceSlider {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 2px;
            border-radius: 1px;
            outline: none;
            cursor: pointer;
            background: linear-gradient(to right,
                    rgba(100, 200, 255, 0.75) 0%,
                    rgba(100, 200, 255, 0.75) var(--pct, 35%),
                    rgba(255, 255, 255, 0.15) var(--pct, 35%),
                    rgba(255, 255, 255, 0.15) 100%);
        }

        #influenceSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px rgba(100, 200, 255, 0.9), 0 0 2px rgba(100, 200, 255, 0.5);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }

        #influenceSlider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 14px rgba(100, 200, 255, 1), 0 0 4px rgba(100, 200, 255, 0.7);
        }

        #influenceSlider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            background: #fff;
            box-shadow: 0 0 8px rgba(100, 200, 255, 0.9);
            cursor: pointer;
        }

        #slider-value {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px #000, 0 0 8px #000;
        }
    </style>
</head>

<body>
    <a href="index.html"
        style="position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 8px 8px; background: rgba(0, 0, 0, 0.8); color: white; border: 1px solid #444; border-radius: 4px; text-decoration: none; font-family: sans-serif; font-size: 18px; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); line-height: 1; display: flex; align-items: center; justify-content: center;"
        onmouseover="this.style.transform='scale(1.2) rotate(5deg)'; this.style.background='rgba(100, 200, 255, 0.8)'; this.style.borderColor='#888'"
        onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.background='rgba(0, 0, 0, 0.8)'; this.style.borderColor='#444'"
        onmousedown="this.style.transform='scale(0.9) rotate(-5deg)'"
        onmouseup="this.style.transform='scale(1.2) rotate(5deg)'"><img
            src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png" alt="home"
            style="width: 18px; height: 18px; object-fit: contain;"></a>
    <div id="slider-wrap">
        <span id="slider-label">Influence</span>
        <input id="influenceSlider" type="range" min="80" max="600" value="260">
        <span id="slider-value">260</span>
    </div>
    <script>
        const particles = [];
        const numParticles = 14000;
        const noiseScale = 0.002;
        const particleSpeed = 2.1;
        let time = 0;
        let fadeLayer;
        let colorCycle = 0;
        let noiseOffset = 0;
        let globalHue = 0;
        let startTime = 0; // Track when simulation starts
        let influenceRadius = 260;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            background(0, 0, 0);
            // Create fade layer
            fadeLayer = createGraphics(width, height);
            fadeLayer.background(0, 0, 0);
            colorMode(HSB, 50);
            blendMode(ADD);
            // Initialize particles
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    pos: createVector(random(width), random(height)),
                    vel: createVector(0, 0),
                    size: random(1.5, 3.5),
                    life: random(0, 140),
                    maxLife: random(120, 200),
                    birthHue: 0, // Start all particles as red
                    isOriginal: true // Track if this is an original particle
                });
            }
            startTime = millis(); // Record start time

            const slider = document.getElementById('influenceSlider');
            const valueLabel = document.getElementById('slider-value');

            function updateSlider(val) {
                val = Math.max(80, Math.min(600, val));
                slider.value = val;
                influenceRadius = val;
                valueLabel.textContent = val;
                const pct = ((val - 80) / (600 - 80) * 100).toFixed(1) + '%';
                slider.style.setProperty('--pct', pct);
            }

            slider.addEventListener('input', (e) => {
                updateSlider(parseInt(e.target.value));
            });

            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                const step = e.deltaY > 0 ? -10 : 10;
                updateSlider(influenceRadius + step);
            }, { passive: false });

            updateSlider(260);
        }

        function draw() {
            // Apply subtle fade using the fade layer
            push();
            blendMode(BLEND);
            tint(255, .6);
            image(fadeLayer, 0, 0);
            pop();

            blendMode(ADD);
            time += 0.003;
            colorCycle += 0.02;
            noiseOffset += 0.0011;

            // Update global hue for new particles
            let timeSinceStart = (millis() - startTime) / 1000; // Convert to seconds
            let maxHueRange = (timeSinceStart) % 360; // Only go through half the spectrum
            globalHue = maxHueRange * Math.abs(sin(time * 0.5)); // Oscillate back and forth

            // Create center points for vortex effects
            const vortexPoints = [
                { x: width * 0.3 + sin(time * 0.2) * 50, y: height * 0.4 + cos(time * 0.15) * 50 },
                { x: width * 0.8 + sin(time * 0.15) * 50, y: height * 0.6 + cos(time * 0.2) * 50 },
                { x: width * 0.5 + sin(time * 0.1) * 30, y: height * 0.5 + cos(time * 0.1) * 30 }
            ];

            // Update and draw particles
            particles.forEach(particle => {
                // Complex flow field combining noise and vortex influences
                let angle = noise(
                    particle.pos.x * noiseScale + noiseOffset,
                    particle.pos.y * noiseScale + noiseOffset,
                    time
                ) * TWO_PI * 2;

                // Add vortex influence
                let vortexInfluence = createVector(0, 0);
                vortexPoints.forEach(vortex => {
                    let dx = particle.pos.x - vortex.x;
                    let dy = particle.pos.y - vortex.y;
                    let distance = sqrt(dx * dx + dy * dy);
                    let strength = 50 / (distance + 50);
                    let vortexAngle = atan2(dy, dx) + PI / 2;
                    vortexInfluence.x += cos(vortexAngle) * strength;
                    vortexInfluence.y += sin(vortexAngle) * strength;
                });

                // Combine noise and vortex effects
                particle.vel.x = cos(angle) * particleSpeed + vortexInfluence.x;
                particle.vel.y = sin(angle) * particleSpeed + vortexInfluence.y;

                // If mouse is pressed, attract particles toward mouse
                if (mouseIsPressed && mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
                    let toMouse = createVector(mouseX - particle.pos.x, mouseY - particle.pos.y);
                    let dist = toMouse.mag();
                    if (dist > 1 && dist < influenceRadius) {
                        // Add a wave/ripple effect to the direction
                        let waveAngle = sin(time * 8 + particle.pos.x * 0.01 + particle.pos.y * 0.01) * 0.7;
                        toMouse.rotate(waveAngle);
                        toMouse.normalize();
                        // Feathered attraction: strong in center, fades at edge but never zero
                        let feather = 1 - (dist / influenceRadius);
                        feather = constrain(feather, 0, 1);
                        let attractStrength = 6.0 * constrain(400 / (dist + 40), 0.2, 2.0);
                        attractStrength *= feather * 0.85 + 0.15; // Always at least 15% strength at edge
                        particle.vel.x += toMouse.x * attractStrength;
                        particle.vel.y += toMouse.y * attractStrength;
                    } else if (dist >= influenceRadius && dist < influenceRadius * 1.5) {
                        // Residual feathered pull outside the main radius
                        let waveAngle = sin(time * 8 + particle.pos.x * 0.01 + particle.pos.y * 0.01) * 0.7;
                        toMouse.rotate(waveAngle);
                        toMouse.normalize();
                        let feather = 1 - ((dist - influenceRadius) / (influenceRadius * 0.25));
                        feather = constrain(feather, 0, 1);
                        let attractStrength = 6.0 * constrain(400 / (dist + 40), 0.05, 0.2);
                        attractStrength *= feather * 0.6; // Residual pull fades out
                        particle.vel.x += toMouse.x * attractStrength;
                        particle.vel.y += toMouse.y * attractStrength;
                    }
                }

                // Update position with velocity damping
                particle.vel.mult(0.95);
                particle.pos.add(particle.vel);

                // Update particle life and reset if needed
                particle.life += 1;
                if (particle.life > particle.maxLife) {
                    particle.life = 0;
                    particle.pos.x = random(width);
                    particle.pos.y = random(height);
                    if (particle.isOriginal) {
                        // First rebirth of an original particle
                        particle.isOriginal = false;
                        particle.birthHue = globalHue;
                    } else {
                        // Subsequent rebirths
                        particle.birthHue = globalHue;
                    }
                }

                // Color transition based on life and velocity
                let speed = constrain(particle.vel.mag(), 0, 4); // Clamp speed for color mapping
                let baseHue = particle.birthHue;
                // Ensure minimum saturation and lower max brightness for slow particles
                let saturation = map(speed, 0, 3, 60, 80); // min 60, max 80
                let brightness = map(particle.life, 0, particle.maxLife, 60, 20); // max 60, min 20
                // Reduce max alpha for fast particles to avoid white dots
                let alpha = map(particle.life, 0, particle.maxLife, 40, 18) * map(speed, 0, 4, 1, 0.5);

                // Draw particles with modulated color
                noStroke();
                fill(baseHue, saturation, brightness, alpha);
                circle(particle.pos.x, particle.pos.y, particle.size * 1.2);

                // Wrap around edges with smooth transition
                if (particle.pos.x < -20) {
                    particle.pos.x = width + 20;
                }
                if (particle.pos.x > width + 20) {
                    particle.pos.x = -20;
                }
                if (particle.pos.y < -20) {
                    particle.pos.y = height + 20;
                }
                if (particle.pos.y > height + 20) {
                    particle.pos.y = -20;
                }
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            fadeLayer.resizeCanvas(windowWidth, windowHeight);
            fadeLayer.background(0, 0, 0);
            background(0, 0, 0);
        }
    </script>
</body>

</html>
