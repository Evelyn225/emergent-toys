<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"
    href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/favicon-16x16.png">
  <link rel="manifest" href="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/site.webmanifest">
  <title>Ball Like</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a060a; }
    canvas { display: block; position: fixed; top: 0; left: 0; }

    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 102;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace, monospace;
      color: #fff;
      font-size: 12px;
    }
    button {
      background: rgba(255,255,255,0.07);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 4px;
      padding: 5px 11px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover  { background: rgba(255,255,255,0.16); }
    button:active { transform: scale(0.95); }

    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 102;
      font-family: 'DM Mono', monospace, monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <a href="index.html"
    style="position: fixed; top: 10px; right: 10px; z-index: 1000;
           width: 36px; height: 36px; border-radius: 50%;
           background: rgba(0,10,14,0.85);
           border: 1.5px solid rgba(0,238,255,0.45);
           box-shadow: 0 0 8px rgba(0,238,255,0.2), inset 0 0 6px rgba(0,238,255,0.05);
           text-decoration: none;
           transition: all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
           display: flex; align-items: center; justify-content: center;"
    onmouseover="this.style.transform='scale(1.2)';this.style.background='rgba(0,238,255,0.18)';this.style.borderColor='rgba(0,238,255,0.9)';this.style.boxShadow='0 0 18px rgba(0,238,255,0.55), inset 0 0 10px rgba(0,238,255,0.12)'"
    onmouseout="this.style.transform='scale(1)';this.style.background='rgba(0,10,14,0.85)';this.style.borderColor='rgba(0,238,255,0.45)';this.style.boxShadow='0 0 8px rgba(0,238,255,0.2), inset 0 0 6px rgba(0,238,255,0.05)'"
    onmousedown="this.style.transform='scale(0.88)'"
    onmouseup="this.style.transform='scale(1.2)'">
    <img src="https://raw.githubusercontent.com/Evelyn225/emergent-toys/main/images/go-home.png"
         alt="home" style="width:16px;height:16px;object-fit:contain;opacity:0.85;">
  </a>

  <canvas id="gameCanvas"></canvas>

  <div id="hint">left drag: draw &nbsp;·&nbsp; right click: drop ball &nbsp;·&nbsp; ctrl+drag: erase</div>

  <div id="controls">
    <button onclick="clearBalls()">clear balls</button>
    <button onclick="clearLines()">clear lines</button>
    <button onclick="clearAll()">clear all</button>
  </div>

  <script src="balllike.js"></script>
</body>
</html>
