<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sleepOS v0.9β</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── CRT overlay ──────────────────────────────────────────────── */
#crt {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 99999;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,8,0,0.10) 2px, rgba(0,8,0,0.10) 4px
  );
}
#crt::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
}

/* ── Global type ─────────────────────────────────────────────── */
body {
  overflow: hidden;
  font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
  font-size: 11px;
  background: #000;
}

/* ── BIOS ─────────────────────────────────────────────────────── */
#bios {
  position: fixed; inset: 0;
  background: #000; z-index: 9999;
  display: flex; align-items: flex-start; justify-content: flex-start;
  padding: 2rem 2.5rem;
  font-family: 'VT323', monospace;
  font-size: 18px; color: #aaa;
  overflow: hidden;
}
#bios-text { white-space: pre; line-height: 1.45; }
@media (min-width: 900px) {
  #bios { align-items: center; justify-content: center; padding: 0; }
  #bios-text { padding: 2rem 2.5rem; }
}

/* ── Desktop ─────────────────────────────────────────────────── */
#desktop {
  position: fixed; inset: 0; bottom: 28px;
  display: none;
}
#desktop-bg {
  position: absolute; inset: 0;
  background: #008080;
}

/* ── Desktop icons ───────────────────────────────────────────── */
#icons-layer {
  position: absolute; inset: 0;
  padding: 8px 6px;
  display: flex; flex-direction: column; flex-wrap: wrap;
  align-content: flex-start; gap: 2px;
}
.desktop-icon {
  width: 74px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px; cursor: default;
  border: 1px solid transparent;
}
.desktop-icon:hover { border: 1px dotted rgba(255,255,255,0.55); background: rgba(0,0,128,0.28); }
.desktop-icon.selected { border: 1px dotted #fff; background: rgba(0,0,128,0.5); }
.di-img { font-size: 30px; line-height: 1; }
.di-name {
  font-size: 11px; color: #fff;
  text-align: center; text-shadow: 1px 1px 1px #000;
  word-break: break-word; line-height: 1.2;
}
.desktop-icon.selected .di-name { background: #000080; }

/* ── Windows layer ───────────────────────────────────────────── */
#windows-layer { position: absolute; inset: 0; pointer-events: none; }

/* ── OS Window ───────────────────────────────────────────────── */
.os-window { pointer-events: auto; }
.os-window {
  position: absolute;
  display: flex; flex-direction: column;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  box-shadow: 1px 1px 0 #000;
  min-width: 180px; min-height: 80px;
}
.os-window.inactive .win-titlebar { background: #808080; }
.win-titlebar {
  background: linear-gradient(to right, #000080, #1084d0);
  color: #fff; padding: 2px 2px 2px 4px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: default; user-select: none;
  height: 18px; flex-shrink: 0; gap: 4px;
}
.win-title-text {
  display: flex; align-items: center; gap: 4px;
  overflow: hidden; white-space: nowrap; flex: 1;
  font-size: 11px; font-weight: bold;
}
.win-icon { font-size: 12px; }
.win-controls { display: flex; gap: 1px; flex-shrink: 0; }
.win-btn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 9px; color: #000;
  display: flex; align-items: center; justify-content: center;
  cursor: default; padding: 0; line-height: 1; flex-shrink: 0;
}
.win-btn:active { border-color: #808080 #fff #fff #808080; }
.win-menubar {
  background: #c0c0c0; padding: 1px 2px;
  display: flex; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.menu-item { padding: 1px 5px; cursor: default; font-size: 11px; }
.menu-item:hover { background: #000080; color: #fff; }
.win-body { flex: 1; overflow: hidden; position: relative; background: #c0c0c0; }
.win-statusbar {
  height: 18px; background: #c0c0c0;
  border-top: 1px solid #808080;
  display: flex; align-items: center; padding: 0 4px;
  font-size: 11px; flex-shrink: 0;
}
.statusbar-panel {
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  padding: 0 4px; height: 14px; display: flex; align-items: center; margin-right: 2px;
}

/* ── Taskbar ─────────────────────────────────────────────────── */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  background: #c0c0c0; border-top: 2px solid; border-color: #fff #808080 #808080 #fff;
  display: none; align-items: center; padding: 2px; z-index: 9000; gap: 2px;
}
#start-btn {
  height: 22px; padding: 0 8px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-weight: bold; font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0;
}
#start-btn:active, #start-btn.pressed { border-color: #808080 #fff #fff #808080; }
.tb-divider {
  width: 2px; height: 22px; flex-shrink: 0;
  border-left: 1px solid #808080; border-right: 1px solid #fff; margin: 0 2px;
}
#taskbar-programs { flex: 1; display: flex; align-items: center; gap: 2px; overflow: hidden; }
.taskbar-btn {
  height: 22px; padding: 0 6px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; max-width: 150px;
}
.taskbar-btn.focused { border-color: #808080 #fff #fff #808080; background: #b4b4b4; }
.taskbar-btn span:last-child { overflow: hidden; text-overflow: ellipsis; }
#system-tray {
  height: 22px;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  display: flex; align-items: center; padding: 0 6px; gap: 6px;
  font-size: 11px; flex-shrink: 0;
}

/* ── Start Menu ──────────────────────────────────────────────── */
#start-menu {
  position: fixed; bottom: 28px; left: 0;
  width: 200px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 9001; display: none; flex-direction: row;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}
#sm-sidebar {
  width: 22px;
  background: linear-gradient(to top, #808080, #c0c0c0);
  display: flex; align-items: flex-end; padding-bottom: 4px;
}
#sm-sidebar span {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
}
#sm-items { flex: 1; padding: 2px 0; }
.sm-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px 4px 4px; cursor: default; font-size: 11px;
}
.sm-item:hover { background: #000080; color: #fff; }
.sm-icon { font-size: 16px; flex-shrink: 0; }
.sm-sep { height: 1px; margin: 2px 4px; background: linear-gradient(to right, #808080, #fff); }

/* ── Dropdown menus ──────────────────────────────────────────── */
.menu-dropdown {
  position: fixed; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 99999; min-width: 130px; padding: 2px 0;
  box-shadow: 2px 2px 0 #000;
}
.menu-dd-item {
  padding: 2px 4px 2px 20px; font-size: 11px;
  cursor: default; white-space: nowrap; user-select: none;
}
.menu-dd-item:hover { background: #000080; color: #fff; }
.menu-dd-item.disabled { color: #808080; pointer-events: none; }
.menu-dd-sep { border: none; border-top: 1px solid #808080; margin: 2px 0; }

/* ── File manager ────────────────────────────────────────────── */
.file-grid {
  display: flex; flex-wrap: wrap; gap: 0; padding: 4px;
  align-content: flex-start;
}
.file-item {
  width: 72px; display: flex; flex-direction: column;
  align-items: center; gap: 2px; padding: 4px 2px;
  cursor: default; border: 1px solid transparent; text-align: center;
}
.file-item:hover { border-color: #000080; background: rgba(0,0,128,0.1); }
.file-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fi-icon { font-size: 24px; }
.fi-name { font-size: 10px; word-break: break-word; line-height: 1.2; }
/* list view */
.file-list { padding: 4px; }
.file-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 1px 4px; cursor: default; font-size: 11px;
  border: 1px solid transparent;
}
.file-list-item:hover { background: rgba(0,0,128,0.1); border-color: #000080; }
.file-list-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fli-icon { font-size: 14px; flex-shrink: 0; }
/* details view */
.file-details { width: 100%; border-collapse: collapse; font-size: 11px; }
.file-details thead th {
  background: #c0c0c0; border-bottom: 1px solid #808080;
  padding: 2px 8px; text-align: left; position: sticky; top: 0;
  border-right: 1px solid #808080; cursor: default; user-select: none;
}
.file-details tbody tr { cursor: default; }
.file-details tbody tr:hover { background: rgba(0,0,128,0.1); }
.file-details tbody tr.selected td { background: #000080; color: #fff; }
.file-details td { padding: 1px 8px; border-right: 1px solid #d0d0d0; }
.fd-icon { font-size: 12px; width: 24px; }

/* ── Terminal ─────────────────────────────────────────────────── */
.term-wrap {
  background: #000; color: #00cc00;
  font-family: 'VT323', 'Courier New', monospace; font-size: 15px;
  padding: 4px; height: 100%;
  display: flex; flex-direction: column;
}
.term-out { flex: 1; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.term-in-line { display: flex; align-items: center; }
.term-prompt { color: #00cc00; white-space: nowrap; }
.term-input {
  flex: 1; background: transparent; border: none;
  color: #00cc00; font-family: inherit; font-size: inherit;
  outline: none; caret-color: #00cc00;
}

/* ── Sysmon ───────────────────────────────────────────────────── */
.sm-row {
  display: flex; align-items: center; padding: 2px 4px;
  font-size: 11px; border-bottom: 1px solid #d0d0d0;
}
.sm-row:nth-child(even) { background: #e8e8e8; }
.sm-lbl { width: 120px; color: #333; }
.sm-track {
  flex: 1; height: 10px; background: #fff;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  position: relative; overflow: hidden;
}
.sm-fill { height: 100%; background: #000080; position: absolute; left: 0; top: 0; transition: width 1.2s ease; }
.sm-val { width: 38px; text-align: right; font-size: 10px; color: #444; }

/* ── Browser ─────────────────────────────────────────────────── */
.browser-toolbar {
  display: flex; align-items: center; gap: 2px; padding: 2px 4px;
  background: #c0c0c0; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.br-btn {
  min-width: 22px; height: 22px; padding: 0 4px; cursor: default;
  background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; font-family: inherit;
}
.br-btn:active { border-color: #808080 #fff #fff #808080; }
.br-btn:disabled { color: #808080; }
.br-vsep { width: 1px; background: #808080; height: 20px; margin: 0 2px; flex-shrink: 0; }
.br-addr-label { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.br-addr {
  flex: 1; height: 18px; font-size: 11px; padding: 0 2px;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  background: #fff; font-family: inherit;
}

/* ── Dialog ───────────────────────────────────────────────────── */
.dlg-body { padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
.dlg-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
.dlg-text { font-size: 11px; line-height: 1.6; flex: 1; }
.dlg-btns { padding: 8px; display: flex; justify-content: center; gap: 8px; border-top: 1px solid #d0d0d0; }
.dlg-btn {
  min-width: 75px; height: 23px; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; justify-content: center; padding: 0 8px;
}
.dlg-btn:active { border-color: #808080 #fff #fff #808080; }
.dlg-btn.primary { border-width: 2px; box-shadow: inset 0 0 0 1px #000; }

/* ── Glitch overlay ──────────────────────────────────────────── */
#glitch { position: fixed; inset: 0; z-index: 99998; pointer-events: none; display: none; }
@keyframes void-blink { 50% { opacity: 0; } }
/* ── Wallpaper swatches ──────────────────────────────────────── */
.wp-swatch .wp-thumb { border: 2px solid #808080; }
.wp-swatch.wp-selected > div:first-child { border-color: #000080; outline: 1px solid #fff; }
.wp-swatch:hover > div:first-child { border-color: #000080; }
@keyframes eb-battle { 0% { background-position: 0 0; } 100% { background-position: 153px 153px; } }
@keyframes eb-cave {
  0%   { filter: hue-rotate(0deg)   brightness(1);   }
  50%  { filter: hue-rotate(40deg)  brightness(1.35); }
  100% { filter: hue-rotate(-25deg) brightness(0.75); }
}
@keyframes eb-magicant {
  0%,100% { filter: hue-rotate(0deg)  brightness(1);   }
  50%     { filter: hue-rotate(15deg) brightness(1.1); }
}
@keyframes glitch-shift {
  0%   { transform: translate(0,0); filter: none; }
  15%  { transform: translate(-3px,0); filter: hue-rotate(90deg) saturate(3); }
  30%  { transform: translate(3px,-1px); filter: hue-rotate(-60deg); }
  50%  { transform: translate(-2px,2px); filter: none; }
  70%  { transform: translate(2px,0); filter: saturate(0.2); }
  100% { transform: translate(0,0); filter: none; }
}
.glitching { animation: glitch-shift 0.18s steps(1) 3; }

/* ── File Explorer ───────────────────────────────────────────── */
.exp-toolbar {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-bottom: 1px solid #808080;
  background: #d4d0c8;
}
.exp-toolbar button {
  font-family: inherit; font-size: 11px; padding: 2px 8px;
  background: #d4d0c8; border: 2px solid;
  border-color: #fff #808080 #808080 #fff; cursor: pointer;
}
.exp-toolbar button:active { border-color: #808080 #fff #fff #808080; }
.exp-addr {
  flex: 1; font-family: 'Courier New', monospace; font-size: 11px;
  padding: 1px 4px; border: 2px solid; border-color: #808080 #fff #fff #808080;
  background: #fff;
}
.exp-body {
  flex: 1; overflow: auto; background: #fff;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  margin: 4px; padding: 6px;
}
.exp-grid { display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
.exp-item {
  display: flex; flex-direction: column; align-items: center;
  width: 72px; padding: 4px; cursor: pointer; border: 1px solid transparent;
  font-family: 'Courier New', monospace; font-size: 10px; text-align: center;
  word-break: break-all;
}
.exp-item:hover { background: #000080; color: #fff; border-color: #000080; }
.exp-item.selected { background: #000080; color: #fff; border-color: #000080; }
.exp-item .exp-icon { font-size: 28px; margin-bottom: 2px; pointer-events: none; }
.exp-item span { pointer-events: none; }
.exp-sysfile {  }

/* ── Drop zone overlay ───────────────────────────────────────── */
#drop-overlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,128,0.55); border: 4px dashed #fff;
  align-items: center; justify-content: center;
  color: #fff; font-family: 'Courier New', monospace; font-size: 22px;
  pointer-events: none;
}
#drop-overlay.active { display: flex; }

/* ── Image viewer / Video player ─────────────────────────────── */
.media-body {
  width: 100%; height: 100%; background: #111;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.media-body img { max-width: 100%; max-height: 100%; object-fit: contain; }
.media-body video { width: 100%; height: 100%; background: #000; }

/* ── Welcome text window ─────────────────────────────────────── */
.note-body {
  background: #fff; height: 100%; overflow: auto;
  padding: 8px; font-family: 'Courier New', monospace;
  font-size: 11px; line-height: 1.7;
}
.note-textarea {
  display: block; width: 100%; height: 100%; box-sizing: border-box;
  background: #fff; padding: 8px;
  font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.7;
  border: none; outline: none; resize: none; overflow: auto;
}

/* ── Syntax-highlighting editor (notepad) ─────────────────────── */
.editor-wrap {
  position: relative; flex: 1; min-height: 0; overflow: hidden;
}
.editor-wrap .note-textarea {
  position: absolute; inset: 0; height: auto;
  color: transparent; caret-color: #000;
  background: transparent;
  z-index: 2; tab-size: 2;
}
.editor-highlight {
  position: absolute; inset: 0;
  padding: 8px; box-sizing: border-box;
  font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-all;
  overflow: auto; pointer-events: none;
  background: #fff; color: #000; z-index: 1;
}
/* token colours */
.tok-kw  { color: #0000cc; }
.tok-str { color: #a31515; }
.tok-num { color: #098658; }
.tok-cmt { color: #6a9955; font-style: italic; }
.tok-tag { color: #800000; }
.tok-att { color: #dd4400; }
.tok-fn  { color: #795e26; }
.tok-var { color: #001080; }
.tok-hdr { color: #0000cc; font-weight: bold; }

/* ── Mobile / touch ──────────────────────────────────────────── */
@media (pointer: coarse), (max-width: 700px) {
  body { font-size: 14px; }

  #icons-layer { padding: 10px 8px; gap: 4px; }
  .desktop-icon { width: 90px; padding: 6px; gap: 4px; }
  .di-img { font-size: 40px; }
  .di-name { font-size: 13px; }

  #taskbar { height: 44px; padding: 3px; }
  #desktop { bottom: 44px; }
  #start-menu { bottom: 44px; }
  #start-btn { height: 36px; font-size: 14px; padding: 0 12px; }
  .taskbar-btn { height: 36px; font-size: 13px; padding: 0 8px; max-width: 120px; }
  .tb-divider { height: 36px; }
  #system-tray { height: 36px; font-size: 14px; padding: 0 8px; }

  .win-titlebar { height: 34px; padding: 2px 4px; }
  .win-btn { width: 30px; height: 28px; font-size: 15px; }
  .win-title-text { font-size: 13px; }
  .win-icon { font-size: 16px; }
  .win-menubar { padding: 2px 4px; }
  .menu-item { padding: 4px 10px; font-size: 13px; }
  .win-statusbar { height: 24px; font-size: 13px; }

  .file-item { width: 90px; padding: 8px 4px; }
  .fi-icon { font-size: 30px; }
  .fi-name { font-size: 12px; }

  .sm-lbl { width: 100px; font-size: 12px; }
  .sm-val { font-size: 12px; }

  .dlg-body { padding: 14px; }
  .dlg-text { font-size: 14px; line-height: 1.7; }
  .dlg-btn { min-width: 90px; height: 34px; font-size: 14px; }

  .term-wrap { font-size: 16px; }
  .note-body, .note-textarea { font-size: 13px; }
}
</style>
</head>
<body>

<!-- CRT overlay -->
<div id="crt" aria-hidden="true"></div>
<!-- Glitch div -->
<div id="glitch"></div>

<!-- BIOS boot screen -->
<div id="bios"><div id="bios-text"></div></div>

<!-- Drop overlay -->
<div id="drop-overlay">📁 Drop files to upload to sleepOS</div>
<input id="file-upload-input" type="file" accept="image/*,video/*,audio/*,text/*,.script,.txt,.md,.csv,.json,.xml,.html,.css,.js" multiple style="display:none">

<!-- Desktop -->
<div id="desktop">
  <div id="desktop-bg"></div>
  <div id="icons-layer"></div>
  <div id="windows-layer"></div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="start-btn" onclick="toggleStart()">🖥 Start</button>
  <div class="tb-divider"></div>
  <div id="taskbar-programs"></div>
  <div id="system-tray">
    <span title="sleepOS network active">📶</span>
    <span id="clock">--:--</span>
  </div>
</div>

<!-- Start Menu -->
<div id="start-menu">
  <div id="sm-sidebar"><span>sleepOS</span></div>
  <div id="sm-items">
    <div class="sm-item" onclick="closeStart();openWelcome()">
      <span class="sm-icon">📄</span><span>Welcome</span>
    </div>
    <div class="sm-item" onclick="closeStart();openNotepad()">
      <span class="sm-icon">📝</span><span>Notepad</span>
    </div>
    <div class="sm-item" onclick="closeStart();openExplorer()">
      <span class="sm-icon">🗂️</span><span>File Explorer</span>
    </div>
    <div class="sm-item" onclick="closeStart();openFiles()">
      <span class="sm-icon">📁</span><span>Projects</span>
    </div>
    <div class="sm-item" onclick="closeStart();openTerminal()">
      <span class="sm-icon">💻</span><span>Terminal</span>
    </div>
    <div class="sm-item" onclick="closeStart();openSysmon()">
      <span class="sm-icon">📊</span><span>System Monitor</span>
    </div>
    <div class="sm-item" onclick="closeStart();openAppearance()">
      <span class="sm-icon">🖼️</span><span>Appearance</span>

      const lines = biosTextEl.textContent.split('\n');
      lines[lines.length - 1] = line.slice(0, biosChar);

}

// Helper: get a directory object by name ('' = root)
function fsGetDir(name) {
  if (!name) return { dirs: termFS.dirs, files: termFS.files, blobs: termFS.blobs };
  return termFS.subdirs.get(name.toUpperCase()) || null;
}

function fsNormalizeDir(name) {
  return String(name || '')
    .trim()
    .replace(/^C:\\sleepOS\\?/i, '')
    .replace(/\//g, '\\')
    .replace(/^\\+|\\+$/g, '')
    .toUpperCase();
}

function fsSplitPath(path, fallbackDir) {
  const cleaned = String(path || '')
    .trim()
    .replace(/^C:\\sleepOS\\?/i, '')
    .replace(/\//g, '\\')
    .replace(/^\\+|\\+$/g, '');
  if (!cleaned) return { dirName: fsNormalizeDir(fallbackDir), fileName: '' };
  const parts = cleaned.split('\\').filter(Boolean);
  if (parts.length === 1) return { dirName: fsNormalizeDir(fallbackDir), fileName: parts[0] };
  return {
    dirName: fsNormalizeDir(parts.slice(0, -1).join('\\')),
    fileName: parts[parts.length - 1],
  };
}

function fsGetEntry(path, fallbackDir) {
  const { dirName, fileName } = fsSplitPath(path, fallbackDir);
  const dir = fsGetDir(dirName);
  if (!dir || !fileName) return null;
  if (dir.files.has(fileName)) return { dir, dirName, fileName, kind: 'text', value: dir.files.get(fileName) };
  if (dir.blobs.has(fileName)) return { dir, dirName, fileName, kind: 'blob', value: dir.blobs.get(fileName) };
  return null;
}

function fsWriteTextFile(path, value, fallbackDir) {
  const { dirName, fileName } = fsSplitPath(path, fallbackDir);
  const dir = fsGetDir(dirName);
  if (!dir || !fileName) return null;
  dir.files.set(fileName, value);
  return { dir, dirName, fileName };
}

// ── Script executor ──────────────────────────────────────────────
const SCRIPT_COLORS = { red:'#ff4444', green:'#44dd44', yellow:'#dddd00', cyan:'#44dddd', blue:'#6699ff', white:'#ffffff' };

function execScript(source, printFn) {
  const vars = {};
  let delay = 0;
  const lines = source.split('\n');

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#') || line.startsWith('//')) continue;

    // Pre-scan wait to compute delay offset for subsequent commands
    if (/^wait\s+\d+/i.test(line)) {
      delay += Math.min(parseInt(line.split(/\s+/)[1]) || 0, 30000);
      continue;
    }

    ((d, l) => setTimeout(() => {
      const resolved = l.replace(/\$(\w+)/g, (_, k) => vars[k] ?? '');
      const spIdx = resolved.search(/\s/);
      const cmd = (spIdx === -1 ? resolved : resolved.slice(0, spIdx)).toLowerCase();
      const arg = spIdx === -1 ? '' : resolved.slice(spIdx + 1).trim();

      switch (cmd) {
        case 'print': case 'echo': {
          const m = arg.match(/^\[(\w+)\]\s*/);
          if (m && SCRIPT_COLORS[m[1]]) printFn(arg.slice(m[0].length), SCRIPT_COLORS[m[1]]);
          else printFn(arg);
          break;
        }
        case 'set': {
          const sp = arg.indexOf(' ');
          if (sp !== -1) vars[arg.slice(0, sp)] = arg.slice(sp + 1);
          break;
        }
        case 'clear': {
          const out = document.getElementById('to');
          if (out) out.innerHTML = '';
          break;
        }
        case 'touch':
          if (arg && !termFS.files.has(arg)) termFS.files.set(arg, '');
          break;
        case 'mkdir':
          if (arg) termFS.dirs.add(arg.toUpperCase());
          break;
        case 'del': case 'rm':
          termFS.files.delete(arg);
          if (termFS.blobs.has(arg)) { URL.revokeObjectURL(termFS.blobs.get(arg).url); termFS.blobs.delete(arg); }
          break;
        case 'open':
          if (termFS.blobs.has(arg)) openMediaFile(arg);
          else if (termFS.files.has(arg)) openNotepad(arg);
          break;
        case 'notepad': openNotepad(arg || undefined); break;
        case 'start': {
          const p = arg.toLowerCase();
          const map = { notepad: openNotepad, terminal: openTerminal, sysmon: openSysmon,
                        browser: openBrowser, defrag: openDefrag, explorer: openExplorer,
                        welcome: openWelcome, files: openFiles };
          if (map[p]) map[p](); break;
        }
        case 'run':
          if (arg && termFS.files.has(arg)) execScript(termFS.files.get(arg), printFn);
          else printFn(`Script not found: ${arg}`, '#ff4444');
          break;
      }
    }, d))(delay, line);
  }
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

let _uploadCwd = '';
function triggerUpload(dir) {
  _uploadCwd = dir || '';
  document.getElementById('file-upload-input').click();
}

function handleFileUpload(fileList) {
  const target = fsGetDir(_uploadCwd) || { files: termFS.files, blobs: termFS.blobs };
  const dirLabel = _uploadCwd ? `C:\\sleepOS\\${_uploadCwd}\\` : 'C:\\sleepOS';
  const added = [];
  [...fileList].forEach(file => {
    const url = URL.createObjectURL(file);
    const TEXT_EXTS = /\.(script|txt|md|csv|json|xml|html|css|js|log|ini|cfg|sh|bat)$/i;
    const isText = file.type.startsWith('text/') || TEXT_EXTS.test(file.name) || file.type === '';
    const kind = file.type.startsWith('image/') ? 'image'
               : file.type.startsWith('video/') ? 'video'
               : file.type.startsWith('audio/') ? 'audio'
               : isText ? 'text'
               : 'binary';
    if (kind === 'text') {
      const reader = new FileReader();
      reader.onload = e => target.files.set(file.name, e.target.result);
      reader.readAsText(file);
    } else {
      target.blobs.set(file.name, { url, kind, size: file.size, mime: file.type });
    }
    added.push(file.name);
  });
  if (added.length) {
    showUploadConfirm(added, dirLabel);
    document.dispatchEvent(new CustomEvent('fs-changed'));
  }
}

function mkWin({ id, title, icon = '📄', x, y, w = 500, h = 380,
                 menubar = true, statusbar = true, popup = false }) {
  if (wins[id]) { focusWin(id); unminWin(id); return null; }

  // Default position: slightly random cascade; on mobile fill viewport (except small popups)
  const count = Object.keys(wins).length;
  const isMobile = window.innerWidth <= 700 || window.matchMedia('(pointer: coarse)').matches;
  const taskbarH = isMobile ? 44 : 28;
  if (isMobile && !popup) {
    x = 0; y = 0;
    w = window.innerWidth;
    h = window.innerHeight - taskbarH;
  } else {
    if (x === undefined) x = 80 + count * 22;
    if (y === undefined) y = 44 + count * 22;
    // Center popups on mobile
    if (isMobile && popup) {
      x = Math.max(4, Math.floor((window.innerWidth - w) / 2));
      y = Math.max(4, Math.floor((window.innerHeight - taskbarH - h) / 3));
    }
  }

  const el = document.createElement('div');
  el.className = 'os-window inactive';
  el.id = 'win-' + id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  el.innerHTML = `
    <div class="win-titlebar" id="tb-${id}">
      <div class="win-title-text">
        <span class="win-icon">${icon}</span>
        <span id="wtitle-${id}">${title}</span>
      </div>
      <div class="win-controls">
        <button class="win-btn" title="Minimize" onclick="minWin('${id}')">─</button>
        <button class="win-btn" title="Maximize" onclick="maxWin('${id}')">□</button>
        <button class="win-btn" title="Close"    onclick="closeWin('${id}')">✕</button>
      </div>
    </div>
    ${menubar ? `<div class="win-menubar" id="mb-${id}"></div>` : ''}
    <div class="win-body" id="wb-${id}"></div>
    ${statusbar ? `<div class="win-statusbar"><div class="statusbar-panel" id="ws-${id}">Ready</div></div>` : ''}
  `;

  document.getElementById('windows-layer').appendChild(el);
  wins[id] = { el, title, icon, minimized: false, maximized: false, origStyle: null };

  makeDraggable(el, document.getElementById('tb-' + id));
  addTbBtn(id, title, icon);
  el.addEventListener('mousedown', () => focusWin(id));
  el.addEventListener('touchstart', () => focusWin(id), { passive: true });

  focusWin(id);
  return el;
}

function focusWin(id) {
  const w = wins[id]; if (!w) return;
  w.el.style.zIndex = ++zTop;
  Object.values(wins).forEach(v => v.el.classList.add('inactive'));
  w.el.classList.remove('inactive');
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('focused'));
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.add('focused');
}

function minWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = true; w.el.style.display = 'none';
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.remove('focused');
}

function unminWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = false; w.el.style.display = 'flex'; focusWin(id);
}

function maxWin(id) {
  const w = wins[id]; if (!w) return;
  if (w.maximized) {
    w.el.style.cssText = w.origStyle; w.maximized = false;
  } else {
    w.origStyle = w.el.style.cssText;
    const d = document.getElementById('desktop');
    w.el.style.left   = '0';
    w.el.style.top    = '0';
    w.el.style.width  = d.offsetWidth + 'px';
    w.el.style.height = d.offsetHeight + 'px';
    w.el.style.zIndex = ++zTop;
    w.maximized = true;
  }
}

function closeWin(id) {
  const w = wins[id]; if (!w) return;
  if (w._interval) clearInterval(w._interval);
  w.el.remove(); delete wins[id];
  const btn = document.getElementById('tbtn-' + id); if (btn) btn.remove();
}

function makeDraggable(win, handle) {
  let sx, sy, sl, st;

  function startDrag(cx, cy) {
    sx = cx; sy = cy;
    sl = win.offsetLeft; st = win.offsetTop;
  }
  function moveDrag(cx, cy) {
    win.style.left = Math.max(0, sl + cx - sx) + 'px';
    win.style.top  = Math.max(0, st + cy - sy) + 'px';
  }

  handle.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    startDrag(e.clientX, e.clientY);
    const onMove = (e) => moveDrag(e.clientX, e.clientY);
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  handle.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
    const onMove = (e) => { e.preventDefault(); const t = e.touches[0]; moveDrag(t.clientX, t.clientY); };
    const onEnd = () => { handle.removeEventListener('touchmove', onMove); handle.removeEventListener('touchend', onEnd); };
    handle.addEventListener('touchmove', onMove, { passive: false });
    handle.addEventListener('touchend', onEnd);
  }, { passive: false });
}

function addTbBtn(id, title, icon) {
  const btn = document.createElement('button');
  btn.className = 'taskbar-btn focused';
  btn.id = 'tbtn-' + id;
  btn.innerHTML = `<span>${icon}</span><span>${title}</span>`;
  btn.addEventListener('click', () => {
    const w = wins[id]; if (!w) return;
    if (w.minimized) { unminWin(id); }
    else if (w.el.classList.contains('inactive')) { focusWin(id); }
    else { minWin(id); }
  });
  document.getElementById('taskbar-programs').appendChild(btn);
}

function makeDesktopIconEl(ic) {
  const div = document.createElement('div');
  div.className = 'desktop-icon';
  div.innerHTML = `<div class="di-img">${ic.emoji}</div><div class="di-name">${ic.name}</div>`;
  function activate() {
    if (ic.action) window[ic.action]?.();
    else if (ic.openFn) ic.openFn();
  }
  let clicks = 0, clickT;
  div.addEventListener('pointerdown', e => {
    e.stopPropagation();
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    div.classList.add('selected');
    if (e.pointerType !== 'mouse') {
      activate();
    } else {
      clicks++;
      if (clicks === 1) {
        clickT = setTimeout(() => { clicks = 0; }, 380);
      } else {
        clearTimeout(clickT); clicks = 0;
        activate();
      }
    }
  });
  div.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    div.classList.add('selected');
    const items = [{ label: '▶ Open', action: activate }];
    if (ic.custom) {
      items.push('-');
      items.push({ label: '🗑️ Remove Shortcut', action: () => {
        const idx = customDesktopIcons.indexOf(ic);
        if (idx > -1) customDesktopIcons.splice(idx, 1);
        div.remove();
      }});
    }
    showCtxMenu(e.clientX, e.clientY, items);
  });
  return div;
}

// ── Syntax highlighting ───────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function detectLang(fname) {
  if (!fname) return 'txt';
  const ext = (fname.split('.').pop() || '').toLowerCase();
  return { js:'js', mjs:'js', ts:'js', jsx:'js', tsx:'js',
           html:'html', htm:'html',
           css:'css', scss:'css',
           json:'json',
           md:'md', markdown:'md',
           py:'py',
           script:'script' }[ext] || 'txt';
}

const LANG_LABELS = { js:'JavaScript', html:'HTML', css:'CSS', json:'JSON', md:'Markdown', py:'Python', script:'.script', txt:'Plain Text' };

// Each rule: { re (global regex), cls (CSS class) }
const LANG_RULES = {
  js: [
    { re: /\/\*[\s\S]*?\*\//g,          cls: 'tok-cmt' },
    { re: /\/\/[^\n]*/g,                 cls: 'tok-cmt' },
    { re: /`(?:[^`\\]|\\.)*`/g,          cls: 'tok-str' },
    { re: /"(?:[^"\\]|\\.)*"/g,          cls: 'tok-str' },
    { re: /'(?:[^'\\]|\\.)*'/g,          cls: 'tok-str' },
    { re: /\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|delete|typeof|instanceof|in|of|this|class|extends|import|export|default|try|catch|finally|throw|async|await|true|false|null|undefined|void|static|get|set|from)\b/g, cls: 'tok-kw' },
    { re: /\b([A-Za-z_$][\w$]*)\s*(?=\()/g, cls: 'tok-fn' },
    { re: /\b0x[\da-fA-F]+|\b\d+(\.\d+)?([eE][+-]?\d+)?\b/g, cls: 'tok-num' },
  ],
  html: [
    { re: /<!--[\s\S]*?-->/g,            cls: 'tok-cmt' },
    { re: /"[^"]*"/g,                    cls: 'tok-str' },
    { re: /'[^']*'/g,                    cls: 'tok-str' },
    { re: /\b[a-zA-Z-]+=(?=["'])/g,     cls: 'tok-att' },
    { re: /<\/?[A-Za-z][A-Za-z0-9]*|>/g, cls: 'tok-tag' },
  ],
  css: [
    { re: /\/\*[\s\S]*?\*\//g,           cls: 'tok-cmt' },
    { re: /"[^"]*"|'[^']*'/g,            cls: 'tok-str' },
    { re: /#[0-9a-fA-F]{3,8}\b/g,        cls: 'tok-num' },
    { re: /\b\d+(\.\d+)?(px|em|rem|%|vh|vw|vmin|vmax|pt|cm|mm|s|ms|deg|fr)?\b/g, cls: 'tok-num' },
    { re: /[.#:[\]A-Za-z*][^{;]*(?=\{)/g, cls: 'tok-fn' },
    { re: /[\w-]+(?=\s*:)/g,             cls: 'tok-kw' },
  ],
  json: [
    { re: /"(?:[^"\\]|\\.)*"\s*(?=:)/g,  cls: 'tok-att' },
    { re: /"(?:[^"\\]|\\.)*"/g,           cls: 'tok-str' },
    { re: /\b(true|false|null)\b/g,       cls: 'tok-kw' },
    { re: /-?\b\d+(\.\d+)?([eE][+-]?\d+)?\b/g, cls: 'tok-num' },
  ],
  md: [
    { re: /^#{1,6} .+/gm,               cls: 'tok-hdr' },
    { re: /`[^`]+`/g,                    cls: 'tok-cmt' },
    { re: /\*\*[^*\n]+\*\*|__[^_\n]+__/g, cls: 'tok-kw' },
    { re: /\*[^*\n]+\*|_[^_\n]+_/g,     cls: 'tok-str' },
    { re: /^\s*[-*+] /gm,               cls: 'tok-fn' },
    { re: /\[[^\]]+\]\([^)]+\)/g,        cls: 'tok-fn' },
  ],
  py: [
    { re: /"""[\s\S]*?"""|'''[\s\S]*?'''/g, cls: 'tok-str' },
    { re: /#[^\n]*/g,                    cls: 'tok-cmt' },
    { re: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g, cls: 'tok-str' },
    { re: /\b(def|class|return|if|elif|else|for|while|in|not|and|or|is|import|from|as|try|except|finally|raise|with|lambda|pass|break|continue|yield|True|False|None|global|nonlocal|del|assert|async|await)\b/g, cls: 'tok-kw' },
    { re: /\b([A-Za-z_]\w*)\s*(?=\()/g, cls: 'tok-fn' },
    { re: /\b\d+(\.\d+)?\b/g,           cls: 'tok-num' },
  ],
  script: [
    { re: /#[^\n]*/g,                    cls: 'tok-cmt' },
    { re: /\/\/[^\n]*/g,                 cls: 'tok-cmt' },
    { re: /\b(print|echo|set|wait|clear|touch|mkdir|del|rm|open|notepad|start|run)\b/gi, cls: 'tok-kw' },
    { re: /\[(red|green|yellow|cyan|blue|white)\]/gi, cls: 'tok-fn' },
    { re: /\$\w+/g,                      cls: 'tok-var' },
    { re: /\b\d+\b/g,                    cls: 'tok-num' },
  ],
  txt: [],
};

function highlight(text, lang) {
  const rules = LANG_RULES[lang] || [];
  if (!rules.length) return escHtml(text);

  // Collect all non-overlapping token intervals
  const intervals = [];
  for (let ri = 0; ri < rules.length; ri++) {
    const { re, cls } = rules[ri];
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      intervals.push({ start: m.index, end: m.index + m[0].length, cls, ri });
    }
  }
  // Sort by start; ties broken by rule order (lower ri = higher priority)
  intervals.sort((a, b) => a.start !== b.start ? a.start - b.start : a.ri - b.ri);

  // Sweep: drop intervals that overlap an already-chosen one
  const chosen = [];
  let coveredTo = 0;
  for (const iv of intervals) {
    if (iv.start >= coveredTo) { chosen.push(iv); coveredTo = iv.end; }
  }

  let result = '';
  let cur = 0;
  for (const iv of chosen) {
    if (iv.start > cur) result += escHtml(text.slice(cur, iv.start));
    result += `<span class="${iv.cls}">${escHtml(text.slice(iv.start, iv.end))}</span>`;
    cur = iv.end;
  }
  if (cur < text.length) result += escHtml(text.slice(cur));
  return result;
}

function openNotepad(filename, dirName) {
  const entry = filename ? fsGetEntry(filename, dirName) : null;
  const { dirName: initialDir, fileName } = fsSplitPath(filename, dirName);
  const pathKey = filename ? ((initialDir ? initialDir + '\\' : '') + fileName) : String(++_notepadCount);
  const id = 'notepad-' + pathKey.replace(/\W/g,'_');
  const displayName = fileName || 'untitled.txt';
  const initial = entry && entry.kind === 'text' ? entry.value : '';
  if (!mkWin({ id, title: displayName + ' \u2014 Notepad', icon: '📝', w:500, h:360 })) return;

  const body = document.getElementById('wb-' + id);
  const ws   = document.getElementById('ws-' + id);
  const mb   = document.getElementById('mb-' + id);
  body.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:column;';

  // ── editor container (highlight div + textarea overlay) ──────
  const wrap = document.createElement('div');
  wrap.className = 'editor-wrap';

  const hl = document.createElement('div');
  hl.className = 'editor-highlight';

  const ta = document.createElement('textarea');
  ta.className = 'note-textarea';
  ta.value = initial;
  ta.spellcheck = false;

  wrap.appendChild(hl);
  wrap.appendChild(ta);
  body.appendChild(wrap);

  let currentFile = fileName || null;
  let currentDir = currentFile ? initialDir : fsNormalizeDir(dirName);
  let lang = detectLang(fileName || filename);

  function renderHighlight() {
    hl.innerHTML = highlight(ta.value, lang) + '\n'; // trailing \n keeps last-line height correct
    syncScroll();
  }
  function syncScroll() {
    hl.scrollTop  = ta.scrollTop;
    hl.scrollLeft = ta.scrollLeft;
  }

  renderHighlight();

  const lineCount = () => ta.value.split('\n').length;

  const updateStatus = () => {
    if (!ws) return;
    const fname = currentFile || 'untitled.txt';
    ws.textContent = `${fname}  —  Ln ${lineCount()}  |  ${ta.value.length} bytes  |  ${LANG_LABELS[lang] || lang}`;
  };

  ta.addEventListener('input', () => { renderHighlight(); updateStatus(); });
  ta.addEventListener('scroll', syncScroll);
  updateStatus();

  // ── IDE keybindings ──────────────────────────────────────────
  ta.addEventListener('keydown', e => {
    // Tab → insert 2 spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s + 2;
      renderHighlight(); updateStatus();
    }
    // Enter → auto-indent (match leading whitespace of current line)
    if (e.key === 'Enter') {
      const s = ta.selectionStart;
      const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
      const indent = ta.value.slice(lineStart).match(/^[ \t]*/)[0];
      if (indent.length) {
        e.preventDefault();
        ta.value = ta.value.slice(0, s) + '\n' + indent + ta.value.slice(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = s + 1 + indent.length;
        renderHighlight(); updateStatus();
      }
    }
    // Ctrl+S / Cmd+S → save
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      currentFile ? save(currentFile) : promptSaveAs();
    }
    // Ctrl+/ → toggle line comment
    if ((e.ctrlKey || e.metaKey) && e.key === '/') {
      e.preventDefault();
      const cmt = { js:'//', html:'<!--', css:'/*', py:'#', script:'#', md:'', txt:'', json:'' }[lang] || '//';
      if (!cmt) return;
      const s = ta.selectionStart;
      const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
      const lineEnd = ta.value.indexOf('\n', s);
      const line = ta.value.slice(lineStart, lineEnd === -1 ? undefined : lineEnd);
      const trimmed = line.trimStart();
      const prefix = line.slice(0, line.length - trimmed.length);
      let newLine;
      if (trimmed.startsWith(cmt)) newLine = prefix + trimmed.slice(cmt.length);
      else newLine = prefix + cmt + trimmed;
      ta.value = ta.value.slice(0, lineStart) + newLine + (lineEnd === -1 ? '' : ta.value.slice(lineEnd));
      ta.selectionStart = ta.selectionEnd = s + (newLine.length - line.length);
      renderHighlight(); updateStatus();
    }
  });

  function save(fname) {
    const saved = fsWriteTextFile(fname, ta.value, currentDir);
    if (!saved) return;
    currentFile = saved.fileName;
    currentDir = saved.dirName;
    // re-detect lang if filename changed
    const newLang = detectLang(currentFile);
    if (newLang !== lang) { lang = newLang; renderHighlight(); }
    const titleEl = document.getElementById('wtitle-' + id);
    if (titleEl) titleEl.textContent = currentFile + ' \u2014 Notepad';
    updateStatus();
  }

  function promptSaveAs() {
    openSaveDialog(currentFile || 'untitled.txt', (fname, dir) => {
      const saved = fsWriteTextFile(fname, ta.value, dir || currentDir);
      if (!saved) return;
      currentFile = saved.fileName;
      currentDir = saved.dirName;
      const newLang = detectLang(currentFile);
      if (newLang !== lang) { lang = newLang; renderHighlight(); }
      const titleEl = document.getElementById('wtitle-' + id);
      if (titleEl) titleEl.textContent = currentFile + ' \u2014 Notepad';
      updateStatus();
      document.dispatchEvent(new CustomEvent('fs-changed'));
    });
  }

  function setLang(l) { lang = l; renderHighlight(); updateStatus(); }

  function buildMenu() {
    mb.innerHTML = '';
    [
      { label: 'File', items: [
        { label: 'New',           action: () => openNotepad() },
        '-',
        { label: 'Save  Ctrl+S', action: () => currentFile ? save(currentFile) : promptSaveAs() },
        { label: 'Save As\u2026', action: promptSaveAs },
        '-',
        { label: 'Close',         action: () => closeWin(id) },
      ]},
      { label: 'Edit', items: [
        { label: 'Select All',    action: () => { ta.focus(); ta.select(); } },
        '-',
        { label: 'Toggle Comment  Ctrl+/', action: () => ta.dispatchEvent(Object.assign(new KeyboardEvent('keydown',{key:'/',ctrlKey:true,bubbles:true}))) },
      ]},
      { label: 'Language', items: Object.entries(LANG_LABELS).map(([k,v]) => ({
          label: (lang === k ? '\u2713 ' : '\u00a0\u00a0') + v,
          action: () => setLang(k),
        }))
      },
    ].forEach(({ label, items }) => {
      const span = document.createElement('span');
      span.className = 'menu-item'; span.textContent = label;
      span.addEventListener('click', e => { e.stopPropagation(); showDropdown(span, items); });
      mb.appendChild(span);
    });
  }
  buildMenu();
  // Rebuild language menu when lang changes so checkmark updates
  const origSetLang = setLang;
  setLang = (l) => { origSetLang(l); buildMenu(); };

  ta.addEventListener('contextmenu', e => {
    e.preventDefault();
    const hasSel = ta.selectionStart !== ta.selectionEnd;
    showCtxMenu(e.clientX, e.clientY, [
      { label: '✂️ Cut',              disabled: !hasSel, action: () => document.execCommand('cut') },
      { label: '📋 Copy',             disabled: !hasSel, action: () => document.execCommand('copy') },
      { label: '📄 Paste',            action: () => { ta.focus(); navigator.clipboard?.readText().then(t => document.execCommand('insertText', false, t)); } },
      '-',
      { label: 'Select All',          action: () => { ta.focus(); ta.select(); } },
      { label: 'Toggle Comment',      action: () => ta.dispatchEvent(Object.assign(new KeyboardEvent('keydown', { key: '/', ctrlKey: true, bubbles: true }))) },
      '-',
      { label: 'Save  Ctrl+S',        action: () => currentFile ? save(currentFile) : promptSaveAs() },
      { label: 'Save As\u2026',       action: promptSaveAs },
    ]);
  });
}

      'TERMINAL.EXE':  '💻', 'SYSMON.EXE':    '📊',
      'NOTEPAD.EXE':   '📝', 'BROWSER.EXE':   '🌐',
      'DEFRAG.EXE':    '🧩', 'WELCOME.README':'📄',
      'void.tmp':      '⬛', 'daemon.core':   '👁️',
      '?????.exe':     '❓',
    };
    if (NAME_ICONS[name]) return NAME_ICONS[name];
    const ext = (name.split('.').pop() || '').toLowerCase();
    return { exe:'⚙️', script:'📜', txt:'📄', readme:'📄', md:'📋',
             json:'📋', js:'📜', ts:'📜', jsx:'📜', tsx:'📜',
             html:'🌐', htm:'🌐', css:'🎨', py:'🐍',
             tmp:'🗑️', log:'📋', csv:'📊', core:'💥' }[ext] || '📄';
  }

  function openItem(name, kind, sysfile) {
    if (kind === 'dir') {
      if (name === 'PROJECTS') { openFiles(); return; }
      cwd = name; render(); return;
    }
    if (sysfile) {
      const SYS = {
        'WELCOME.README': openWelcome,  'TERMINAL.EXE': openTerminal,
        'SYSMON.EXE':     openSysmon,   'NOTEPAD.EXE':  openNotepad,
        'BROWSER.EXE':    openBrowser,  'DEFRAG.EXE':   openDefrag,
        'void.tmp':       openVoid,     'daemon.core':  openDaemon,
        '?????.exe':      openUnknown,
      };
      if (SYS[name]) SYS[name]();
      return;
    }
    const dir = fsGetDir(cwd);
    if (dir.blobs.has(name)) openMediaFile(name, cwd);
    else if (dir.files.has(name)) openNotepad(name, cwd);
  }

  function deleteSelected() {
    if (!selected || selected.sysfile) return;
    osConfirm(`Delete "${selected.name}"?`, 'Delete', ok => {
      if (!ok) return;
      const dir = fsGetDir(cwd);
      if (selected.kind === 'dir') { termFS.dirs.delete(selected.name); termFS.subdirs.delete(selected.name); }
      else if (dir.blobs.has(selected.name)) { URL.revokeObjectURL(dir.blobs.get(selected.name).url); dir.blobs.delete(selected.name); }
      else dir.files.delete(selected.name);
      render();
    }, '🗑️');
  }

  function makeItem(name, kind, sysfile) {
    const el = document.createElement('div');
    el.className = 'exp-item' + (sysfile ? ' exp-sysfile' : '');
    el.innerHTML = `<div class="exp-icon">${getIcon(name, kind)}</div><span>${name}</span>`;
    el.addEventListener('click', () => {
      pane.querySelectorAll('.exp-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected'); selected = { name, kind, sysfile };
      if (ws) ws.textContent = name;
    });
    el.addEventListener('dblclick', () => openItem(name, kind, sysfile));
    el.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      pane.querySelectorAll('.exp-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected'); selected = { name, kind, sysfile };
      if (ws) ws.textContent = name;
      const canDelete = !sysfile;
      const isScript = !sysfile && name.toLowerCase().endsWith('.script');
      showCtxMenu(e.clientX, e.clientY, [
        { label: kind === 'dir' ? '📂 Open Folder' : '▶ Open', action: () => openItem(name, kind, sysfile) },
        ...(isScript ? [{ label: '📜 Run Script', action: () => {
          const dir = fsGetDir(cwd);
          const src = dir.files.get(name);
          if (src !== undefined) runScriptInPopup(name, src);
        }}] : []),
        '-',
        { label: '✏️ Rename', disabled: sysfile, action: () => {
          if (sysfile) return;
          osPrompt('Rename to:', name, 'Rename', n => {
            if (!n || n === name) return;
            const dir = fsGetDir(cwd);
            if (kind === 'dir') {
              termFS.dirs.delete(name);
              const sub = termFS.subdirs.get(name);
              termFS.dirs.add(n.toUpperCase());
              if (sub) termFS.subdirs.set(n.toUpperCase(), sub);
              termFS.subdirs.delete(name);
            } else if (dir.blobs.has(name)) {
              const b = dir.blobs.get(name); dir.blobs.delete(name); dir.blobs.set(n, b);
            } else {
              const c = dir.files.get(name); dir.files.delete(name); dir.files.set(n, c ?? '');
            }
            render();
          });
        }},
        { label: '🗑️ Delete', disabled: !canDelete, action: deleteSelected },
        '-',
        { label: '📌 Create Desktop Shortcut', action: () => {
          const icon = getIcon(name, kind);
          addDesktopShortcut(name, icon, () => openItem(name, kind, sysfile));
        }},
        '-',
        { label: '📋 Copy Name', action: () => navigator.clipboard?.writeText(name) },
      ]);
    });
    return el;
  }

  function render() {
    pane.innerHTML = ''; selected = null;
    const grid = document.createElement('div'); grid.className = 'exp-grid';
    const fullPath = cwd ? `C:\\sleepOS\\${cwd}` : 'C:\\sleepOS';
    addrEl.value = fullPath;
    const titleEl = document.getElementById('wtitle-explorer');
    if (titleEl) titleEl.textContent = `FILE EXPLORER \u2014 ${fullPath}`;

    if (!cwd) {
      // Root: show system files + DOCS + user dirs/files/blobs
      ['PROJECTS'].forEach(d => grid.appendChild(makeItem(d, 'dir', true)));
      ['DOCS', ...termFS.dirs].filter((v, i, a) => a.indexOf(v) === i).forEach(d => {
        if (d !== 'PROJECTS') grid.appendChild(makeItem(d, 'dir', false));
      });
      [
        {name:'WELCOME.README', sys:true}, {name:'TERMINAL.EXE', sys:true},
        {name:'SYSMON.EXE', sys:true},     {name:'NOTEPAD.EXE', sys:true},
        {name:'BROWSER.EXE', sys:true},    {name:'DEFRAG.EXE', sys:true},
        {name:'void.tmp', sys:true},       {name:'daemon.core', sys:true},
        {name:'?????.exe', sys:true},
      ].forEach(({name, sys}) => grid.appendChild(makeItem(name, 'file', sys)));
      termFS.files.forEach((_, name) => grid.appendChild(makeItem(name, 'file', false)));
      termFS.blobs.forEach((b, name) => grid.appendChild(makeItem(name, b.kind, false)));
    } else {
      const dir = fsGetDir(cwd);
      if (!dir) { cwd = ''; render(); return; }
      dir.dirs.forEach(d => grid.appendChild(makeItem(d, 'dir', false)));
      dir.files.forEach((_, name) => grid.appendChild(makeItem(name, 'file', false)));
      dir.blobs.forEach((b, name) => grid.appendChild(makeItem(name, b.kind, false)));
    }
    pane.appendChild(grid);
    if (ws) ws.textContent = grid.children.length + ' objects';
  }

  upBtn.addEventListener('click', () => { cwd = ''; render(); });
  refreshBtn.addEventListener('click', () => render());

  // ── pane background right-click ───────────────────────────────
  pane.addEventListener('contextmenu', e => {
    if (e.target !== pane && !e.target.classList.contains('exp-grid')) return;
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, [
      { label: '💻 Open Terminal Here', action: () => openTerminal(cwd) },
      '-',
      { label: '📁 New Folder',    action: () => osPrompt('Folder name:', '', 'New Folder',    n => { if (n) { termFS.dirs.add(n.toUpperCase()); render(); } }) },
      { label: 'New Text File', action: () => osPrompt('File name:',   'untitled.txt', 'New Text File', n => { if (n) { const dir = fsGetDir(cwd); if (dir) { dir.files.set(n,''); openNotepad(n, cwd); render(); } } }) },
      '-',
      { label: '📤 Upload File…',  action: triggerUpload },
      '-',
      { label: '🔄 Refresh',       action: render },
    ]);
  });

  // ── menus ────────────────────────────────────────────────────
  mb.innerHTML = '';
  [
    { label: 'File', items: () => [
      { label: 'New Folder',    action: () => osPrompt('Folder name:', '', 'New Folder',    n => { if (n) { termFS.dirs.add(n.toUpperCase()); render(); } }) },
      { label: 'New Text File', action: () => osPrompt('File name:',   'untitled.txt', 'New Text File', n => { if (n) { const dir = fsGetDir(cwd); if (dir) { dir.files.set(n,''); openNotepad(n, cwd); render(); } } }) },
      '-',
      { label: 'Open',         action: () => { if (selected) openItem(selected.name, selected.kind, selected.sysfile); } },
      { label: 'Delete',       action: deleteSelected },
      '-',
      { label: 'Upload File\u2026', action: triggerUpload },
      '-',
      { label: 'Close', action: () => closeWin('explorer') },
    ]},
    { label: 'View', items: () => [
      { label: 'Refresh', action: render },
    ]},
  ].forEach(({ label, items }) => {
    const span = document.createElement('span');
    span.className = 'menu-item'; span.textContent = label;
    span.addEventListener('click', e => { e.stopPropagation(); showDropdown(span, items()); });
    mb.appendChild(span);
  });

  render();

  // Auto-refresh when files are uploaded
  function onFsChanged() { if (wins['explorer']) render(); else document.removeEventListener('fs-changed', onFsChanged); }
  document.addEventListener('fs-changed', onFsChanged);
}

function openFiles() {
  if (!mkWin({ id:'files', title:'PROJECTS.DIR — File Manager', icon:'📁', w:580, h:400, x:120, y:70 })) return;

  const mb   = document.getElementById('mb-files');
  const body = document.getElementById('wb-files');
  const ws   = document.getElementById('ws-files');
  body.style.cssText = 'overflow:auto;border:2px solid;border-color:#808080 #fff #fff #808080;margin:4px;background:#fff;';

  let selected = null;
  let viewMode = 'icons'; // 'icons' | 'list' | 'details'

  // ── render ──────────────────────────────────────────────────
  function getSelected() { return selected; }
  function setSelected(p, itemEl, containerSel) {
    body.querySelectorAll(containerSel).forEach(f => f.classList.remove('selected'));
    itemEl.classList.add('selected');
    selected = p;
  }

  function makeItem(p, mode) {
    const item = document.createElement(mode === 'details' ? 'tr' : 'div');
    if (mode === 'icons') {
      item.className = 'file-item';
      item.innerHTML = `<div class="fi-icon">${p.emoji}</div><div class="fi-name">${p.name}</div>`;
    } else if (mode === 'list') {
      item.className = 'file-list-item';
      item.innerHTML = `<span class="fli-icon">${p.emoji}</span><span>${p.name}</span>`;
    } else {
      item.innerHTML = `<td class="fd-icon">${p.emoji}</td><td>${p.name}</td><td>HTML Application</td><td>${p.file}</td>`;
    }
    const containerSel = mode === 'icons' ? '.file-item' : mode === 'list' ? '.file-list-item' : 'tbody tr';
    let clicks = 0, clickT;
    item.addEventListener('click', e => {
      e.stopPropagation(); clicks++;
      setSelected(p, item, containerSel);
      if (ws) ws.textContent = p.name + '  —  double-click to open';
      if (clicks === 1) { clickT = setTimeout(() => { clicks = 0; }, 380); }
      else { clearTimeout(clickT); clicks = 0; window.open(p.file, '_blank'); }
    });
    item.addEventListener('touchend', e => {
      e.preventDefault(); setSelected(p, item, containerSel); window.open(p.file, '_blank');
    }, { passive: false });
    return item;
  }

  function renderView() {
    body.innerHTML = '';
    selected = null;
    if (viewMode === 'icons') {
      const grid = document.createElement('div'); grid.className = 'file-grid';
      PROJECTS.forEach(p => grid.appendChild(makeItem(p, 'icons')));
      body.appendChild(grid);
    } else if (viewMode === 'list') {
      const list = document.createElement('div'); list.className = 'file-list';
      PROJECTS.forEach(p => list.appendChild(makeItem(p, 'list')));
      body.appendChild(list);
    } else {
      const tbl = document.createElement('table'); tbl.className = 'file-details';
      tbl.innerHTML = '<thead><tr><th></th><th>Name</th><th>Type</th><th>File</th></tr></thead>';
      const tbody = document.createElement('tbody');
      PROJECTS.forEach(p => tbody.appendChild(makeItem(p, 'details')));
      tbl.appendChild(tbody); body.appendChild(tbl);
    }
    if (ws) ws.textContent = PROJECTS.length + ' objects';
  }

  // ── menus ───────────────────────────────────────────────────
  const FILE_ITEMS = [
    { label: 'Open',       action: () => { if (selected) window.open(selected.file, '_blank'); else if (ws) ws.textContent = 'No file selected.'; } },
    { label: 'Properties', action: () => {
      if (!selected) { if (ws) ws.textContent = 'No file selected.'; return; }
      osAlert(`Name:\t${selected.name}\nFile:\t${selected.file}\nType:\tHTML Application\nLocation:\tC:\\sleepOS\\PROJECTS\\`, 'Properties', '📄');
    }},
    '-',
    { label: 'Close', action: () => closeWin('files') },
  ];
  const EDIT_ITEMS = [
    { label: 'Select All', action: () => {
      const sel = viewMode === 'icons' ? '.file-item' : viewMode === 'list' ? '.file-list-item' : 'tbody tr';
      body.querySelectorAll(sel).forEach(el => el.classList.add('selected'));
      selected = PROJECTS[PROJECTS.length - 1];
      if (ws) ws.textContent = PROJECTS.length + ' objects selected';
    }},
    { label: 'Copy Name', action: () => {
      if (!selected) { if (ws) ws.textContent = 'Nothing selected.'; return; }
      navigator.clipboard.writeText(selected.name).catch(() => {});
      if (ws) ws.textContent = 'Copied: ' + selected.name;
    }},
  ];
  function VIEW_ITEMS() {
    return [
      { label: (viewMode==='icons'   ? '• ':'  ') + 'Large Icons', action: () => { viewMode='icons';   renderView(); } },
      { label: (viewMode==='list'    ? '• ':'  ') + 'List',         action: () => { viewMode='list';    renderView(); } },
      { label: (viewMode==='details' ? '• ':'  ') + 'Details',      action: () => { viewMode='details'; renderView(); } },
      '-',
      { label: '  Refresh', action: () => renderView() },
    ];
  }
  const HELP_ITEMS = [
    { label: 'Help Topics', action: () => osAlert('PROJECTS.DIR Help\n\nDouble-click any project to open it in a new tab.\nFile > Open  — opens selected project\nFile > Properties  — shows file info\nView  — switch between Large Icons, List, Details\nEdit > Select All  — selects all projects\nEdit > Copy Name  — copies selected name', 'Help Topics', '❓') },
    '-',
    { label: 'About PROJECTS.DIR', action: () => osAlert('PROJECTS.DIR — File Manager\nsleepOS v1.0\n\n' + PROJECTS.length + ' interactive projects.\nAll of them are watching.', 'About', '📁') },
  ];

  mb.innerHTML = '';
  [
    { label: 'File', items: () => FILE_ITEMS },
    { label: 'Edit', items: () => EDIT_ITEMS },
    { label: 'View', items: VIEW_ITEMS },
    { label: 'Help', items: () => HELP_ITEMS },
  ].forEach(({ label, items }) => {
    const span = document.createElement('span');
    span.className = 'menu-item'; span.textContent = label;
    span.addEventListener('click', e => { e.stopPropagation(); showDropdown(span, items()); });
    mb.appendChild(span);
  });

  renderView();
}

    cd: (args) => {
