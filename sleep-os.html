<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sleepOS v0.9β</title>
<style>
@font-face {
  font-family: 'W95font';
  src: url('https://raw.githubusercontent.com/evelyn225/emergent-toys/main/w95font.woff2') format('woff2'),
       url('https://raw.githubusercontent.com/evelyn225/emergent-toys/main/w95font.woff') format('woff');
  font-style: normal;
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'W95font';
  src: url('https://raw.githubusercontent.com/evelyn225/emergent-toys/main/w95font-bold.woff2') format('woff2'),
       url('https://raw.githubusercontent.com/evelyn225/emergent-toys/main/w95font-bold.woff') format('woff');
  font-style: normal;
  font-weight: 700;
  font-display: swap;
}
:root {
  --sleep-font: 'W95font', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--sleep-font); }

/* ── CRT overlay ──────────────────────────────────────────────── */
#crt {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 99999;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,8,0,0.10) 2px, rgba(0,8,0,0.10) 4px
  );
}
#crt::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
}

/* ── Global type ─────────────────────────────────────────────── */
body {
  overflow: hidden;
  font-family: var(--sleep-font);
  font-size: 11px;
  letter-spacing: 0.03em;
  background: #000;
}

/* ── BIOS ─────────────────────────────────────────────────────── */
#bios {
  position: fixed; inset: 0;
  background: #000; z-index: 9999;
  display: flex; align-items: flex-start; justify-content: flex-start;
  padding: 2rem 2.5rem;
  font-family: var(--sleep-font);
  font-size: 18px; color: #aaa;
  overflow: hidden;
}
#bios-text { white-space: pre; line-height: 1.45; }
@media (min-width: 900px) {
  #bios { align-items: center; justify-content: center; padding: 0; }
  #bios-text { padding: 2rem 2.5rem; }
}

/* ── Desktop ─────────────────────────────────────────────────── */
#desktop {
  position: fixed; inset: 0; bottom: 28px;
  display: none;
}
#desktop-bg {
  position: absolute; inset: 0;
  background: #008080;
}

/* ── Desktop icons ───────────────────────────────────────────── */
#icons-layer {
  position: absolute; inset: 0;
  padding: 8px 6px;
  display: flex; flex-direction: column; flex-wrap: wrap;
  align-content: flex-start; gap: 2px;
}
.desktop-icon {
  width: 90px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px; cursor: default;
  border: 1px solid transparent;
}
.desktop-icon:hover { border: 1px dotted rgba(255,255,255,0.55); background: rgba(0,0,128,0.28); }
.desktop-icon.selected { border: 1px dotted #fff; background: rgba(0,0,128,0.5); }
.di-img { font-size: 30px; line-height: 1; }
.di-name {
  font-size: 11px; color: #fff;
  text-align: center; text-shadow: 1px 1px 1px #000;
  word-break: break-word; line-height: 1.2;
}
.desktop-icon.selected .di-name { background: #000080; }

/* ── Windows layer ───────────────────────────────────────────── */
#windows-layer { position: absolute; inset: 0; pointer-events: none; }

/* ── OS Window ───────────────────────────────────────────────── */
.os-window { pointer-events: auto; }
.os-window {
  position: absolute;
  display: flex; flex-direction: column;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  box-shadow: 1px 1px 0 #000;
  min-width: 180px; min-height: 80px;
}
/* ── Resize handles ──────────────────────────────────────────── */
.win-rz { position:absolute; z-index:100; }
.win-rz-n  { top:-3px;    left:6px;  right:6px;  height:6px;  cursor:n-resize;  }
.win-rz-s  { bottom:-3px; left:6px;  right:6px;  height:6px;  cursor:s-resize;  }
.win-rz-e  { top:6px; bottom:6px; right:-3px;  width:6px;   cursor:e-resize;  }
.win-rz-w  { top:6px; bottom:6px; left:-3px;   width:6px;   cursor:w-resize;  }
.win-rz-nw { top:-3px;    left:-3px;  width:10px; height:10px; cursor:nw-resize; }
.win-rz-ne { top:-3px;    right:-3px; width:10px; height:10px; cursor:ne-resize; }
.win-rz-sw { bottom:-3px; left:-3px;  width:10px; height:10px; cursor:sw-resize; }
.win-rz-se { bottom:-3px; right:-3px; width:10px; height:10px; cursor:se-resize; }
.os-window.inactive .win-titlebar { background: #808080; }
.win-titlebar {
  background: linear-gradient(to right, #000080, #1084d0);
  color: #fff; padding: 2px 2px 2px 4px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: default; user-select: none;
  height: 18px; flex-shrink: 0; gap: 4px;
}
.win-title-text {
  display: flex; align-items: center; gap: 4px;
  overflow: hidden; white-space: nowrap; flex: 1;
  font-size: 11px; font-weight: bold;
}
.win-icon { font-size: 12px; }
.win-controls { display: flex; gap: 1px; flex-shrink: 0; }
.win-btn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 9px; color: #000;
  display: flex; align-items: center; justify-content: center;
  cursor: default; padding: 0; line-height: 1; flex-shrink: 0;
}
.win-btn:active { border-color: #808080 #fff #fff #808080; }
.win-menubar {
  background: #c0c0c0; padding: 1px 2px;
  display: flex; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.menu-item { padding: 1px 5px; cursor: default; font-size: 11px; }
.menu-item:hover { background: #000080; color: #fff; }
.win-body { flex: 1; overflow: hidden; position: relative; background: #c0c0c0; }
.win-statusbar {
  height: 18px; background: #c0c0c0;
  border-top: 1px solid #808080;
  display: flex; align-items: center; padding: 0 4px;
  font-size: 11px; flex-shrink: 0;
}
.statusbar-panel {
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  padding: 0 4px; height: 14px; display: flex; align-items: center; margin-right: 2px;
}

/* ── Taskbar ─────────────────────────────────────────────────── */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  background: #c0c0c0; border-top: 2px solid; border-color: #fff #808080 #808080 #fff;
  display: none; align-items: center; padding: 2px; z-index: 9000; gap: 2px;
}
#start-btn {
  height: 22px; padding: 0 8px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-weight: bold; font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0;
}
#start-btn:active, #start-btn.pressed { border-color: #808080 #fff #fff #808080; }
.tb-divider {
  width: 2px; height: 22px; flex-shrink: 0;
  border-left: 1px solid #808080; border-right: 1px solid #fff; margin: 0 2px;
}
#taskbar-programs { flex: 1; display: flex; align-items: center; gap: 2px; overflow: hidden; }
.taskbar-btn {
  height: 22px; padding: 0 6px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; max-width: 150px;
}
.taskbar-btn.focused { border-color: #808080 #fff #fff #808080; background: #b4b4b4; }
.taskbar-btn span:last-child { overflow: hidden; text-overflow: ellipsis; }
#system-tray {
  height: 22px;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  display: flex; align-items: center; padding: 0 6px; gap: 6px;
  font-size: 11px; flex-shrink: 0;
}

/* ── Start Menu ──────────────────────────────────────────────── */
#start-menu {
  position: fixed; bottom: 28px; left: 0;
  width: 200px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 9001; display: none; flex-direction: row;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}
#sm-sidebar {
  width: 22px;
  background: linear-gradient(to top, #808080, #c0c0c0);
  display: flex; align-items: flex-end; padding-bottom: 4px;
}
#sm-sidebar span {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
}
#sm-items { flex: 1; padding: 2px 0; }
.sm-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px 4px 4px; cursor: default; font-size: 11px;
}
.sm-item:hover { background: #000080; color: #fff; }
.sm-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1; flex-shrink: 0; }
.sm-icon img { width: 16px; height: 16px; display: block; }
.sm-sep { height: 1px; margin: 2px 4px; background: linear-gradient(to right, #808080, #fff); }

/* ── Dropdown menus ──────────────────────────────────────────── */
.menu-dropdown {
  position: fixed; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 99999; min-width: 130px; padding: 2px 0;
  box-shadow: 2px 2px 0 #000;
}
.menu-dd-item {
  padding: 2px 4px 2px 20px; font-size: 11px;
  cursor: default; white-space: nowrap; user-select: none;
}
.menu-dd-item:hover { background: #000080; color: #fff; }
.menu-dd-item.disabled { color: #808080; pointer-events: none; }
.menu-dd-sep { border: none; border-top: 1px solid #808080; margin: 2px 0; }

/* ── File manager ────────────────────────────────────────────── */
.file-grid {
  display: flex; flex-wrap: wrap; gap: 0; padding: 4px;
  align-content: flex-start;
}
.file-item {
  width: 72px; display: flex; flex-direction: column;
  align-items: center; gap: 2px; padding: 4px 2px;
  cursor: default; border: 1px solid transparent; text-align: center;
}
.file-item:hover { border-color: #000080; background: rgba(0,0,128,0.1); }
.file-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fi-icon { font-size: 24px; }
.fi-name { font-size: 10px; word-break: break-word; line-height: 1.2; }
/* list view */
.file-list { padding: 4px; }
.file-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 1px 4px; cursor: default; font-size: 11px;
  border: 1px solid transparent;
}
.file-list-item:hover { background: rgba(0,0,128,0.1); border-color: #000080; }
.file-list-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fli-icon { font-size: 14px; flex-shrink: 0; }
/* details view */
.file-details { width: 100%; border-collapse: collapse; font-size: 11px; }
.file-details thead th {
  background: #c0c0c0; border-bottom: 1px solid #808080;
  padding: 2px 8px; text-align: left; position: sticky; top: 0;
  border-right: 1px solid #808080; cursor: default; user-select: none;
}
.file-details tbody tr { cursor: default; }
.file-details tbody tr:hover { background: rgba(0,0,128,0.1); }
.file-details tbody tr.selected td { background: #000080; color: #fff; }
.file-details td { padding: 1px 8px; border-right: 1px solid #d0d0d0; }
.fd-icon { font-size: 12px; width: 24px; }

/* ── Terminal ─────────────────────────────────────────────────── */
.term-wrap {
  background: #000; color: #00cc00;
  font-family: var(--sleep-font); font-size: 15px;
  padding: 4px; height: 100%;
  display: flex; flex-direction: column;
}
.term-out { flex: 1; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.term-in-line { display: flex; align-items: center; }
.term-prompt { color: #00cc00; white-space: nowrap; }
.term-input {
  flex: 1; background: transparent; border: none;
  color: #00cc00; font-family: var(--sleep-font); font-size: inherit;
  outline: none; caret-color: #00cc00;
}

/* ── Sysmon ───────────────────────────────────────────────────── */
.sm-row {
  display: flex; align-items: center; padding: 2px 4px;
  font-size: 11px; border-bottom: 1px solid #d0d0d0;
}
.sm-row:nth-child(even) { background: #e8e8e8; }
.sm-lbl { width: 120px; color: #333; }
.sm-track {
  flex: 1; height: 10px; background: #fff;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  position: relative; overflow: hidden;
}
.sm-fill { height: 100%; background: #000080; position: absolute; left: 0; top: 0; transition: width 1.2s ease; }
.sm-val { width: 38px; text-align: right; font-size: 10px; color: #444; }

/* ── Browser ─────────────────────────────────────────────────── */
.browser-toolbar {
  display: flex; align-items: center; gap: 2px; padding: 2px 4px;
  background: #c0c0c0; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.br-btn {
  min-width: 22px; height: 22px; padding: 0 4px; cursor: default;
  background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; font-family: var(--sleep-font);
}
.br-btn:active { border-color: #808080 #fff #fff #808080; }
.br-btn:disabled { color: #808080; }
.br-vsep { width: 1px; background: #808080; height: 20px; margin: 0 2px; flex-shrink: 0; }
.br-addr-label { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.br-addr {
  flex: 1; height: 18px; font-size: 11px; padding: 0 2px;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  background: #fff; font-family: var(--sleep-font);
}

/* ── Dialog ───────────────────────────────────────────────────── */
.dlg-body { padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
.dlg-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
.dlg-text { font-size: 11px; line-height: 1.6; flex: 1; }
.dlg-btns { padding: 8px; display: flex; justify-content: center; gap: 8px; border-top: 1px solid #d0d0d0; }
.dlg-btn {
  min-width: 75px; height: 23px; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; justify-content: center; padding: 0 8px;
}
.dlg-btn:active { border-color: #808080 #fff #fff #808080; }
.dlg-btn.primary { border-width: 2px; box-shadow: inset 0 0 0 1px #000; }

/* ── Glitch overlay ──────────────────────────────────────────── */
#glitch { position: fixed; inset: 0; z-index: 99998; pointer-events: none; display: none; }
@keyframes void-blink { 50% { opacity: 0; } }
/* ── Wallpaper swatches ──────────────────────────────────────── */
.wp-swatch .wp-thumb { border: 2px solid #808080; }
.wp-swatch.wp-selected > div:first-child { border-color: #000080; outline: 1px solid #fff; }
.wp-swatch:hover > div:first-child { border-color: #000080; }
.wp-swatch .wp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
@keyframes eb-battle { 0% { background-position: 0 0; } 100% { background-position: 153px 153px; } }
@keyframes eb-cave {
  0%   { filter: hue-rotate(0deg)   brightness(1);   }
  50%  { filter: hue-rotate(40deg)  brightness(1.35); }
  100% { filter: hue-rotate(-25deg) brightness(0.75); }
}
@keyframes eb-magicant {
  0%,100% { filter: hue-rotate(0deg)  brightness(1);   }
  50%     { filter: hue-rotate(15deg) brightness(1.1); }
}
@keyframes glitch-shift {
  0%   { transform: translate(0,0); filter: none; }
  15%  { transform: translate(-3px,0); filter: hue-rotate(90deg) saturate(3); }
  30%  { transform: translate(3px,-1px); filter: hue-rotate(-60deg); }
  50%  { transform: translate(-2px,2px); filter: none; }
  70%  { transform: translate(2px,0); filter: saturate(0.2); }
  100% { transform: translate(0,0); filter: none; }
}
.glitching { animation: glitch-shift 0.18s steps(1) 3; }

/* ── File Explorer ───────────────────────────────────────────── */
.exp-toolbar {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-bottom: 1px solid #808080;
  background: #d4d0c8;
}
.exp-toolbar button {
  font-family: var(--sleep-font); font-size: 11px; padding: 2px 8px;
  background: #d4d0c8; border: 2px solid;
  border-color: #fff #808080 #808080 #fff; cursor: pointer;
}
.exp-toolbar button:active { border-color: #808080 #fff #fff #808080; }
.exp-addr {
  flex: 1; font-family: var(--sleep-font); font-size: 11px;
  padding: 1px 4px; border: 2px solid; border-color: #808080 #fff #fff #808080;
  background: #fff;
}
.exp-body {
  flex: 1; overflow: auto; background: #fff;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  margin: 4px; padding: 6px;
}
.exp-grid { display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
/* Explorer list view */
.exp-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 1px 4px; cursor: pointer; border: 1px solid transparent;
  font-family: var(--sleep-font); font-size: 11px;
  white-space: nowrap; overflow: hidden;
}
.exp-list-item:hover { background: rgba(0,0,128,0.1); border-color: #000080; }
.exp-list-item.selected { background: #000080; color: #fff; border-color: #000080; }
/* Explorer details view */
.exp-det-tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.exp-det-tbl thead th {
  background: #c0c0c0; border-bottom: 1px solid #808080;
  padding: 2px 6px; text-align: left; position: sticky; top: 0;
  border-right: 1px solid #808080; cursor: default; user-select: none;
}
.exp-det-item { cursor: pointer; }
.exp-det-item:hover td { background: rgba(0,0,128,0.1); }
.exp-det-item.selected td { background: #000080; color: #fff; }
.exp-det-item td { padding: 1px 6px; border-right: 1px solid #e0e0e0; }
.exp-item {
  display: flex; flex-direction: column; align-items: center;
  width: 72px; padding: 4px; cursor: pointer; border: 1px solid transparent;
  font-family: var(--sleep-font); font-size: 10px; text-align: center;
  word-break: break-all;
}
.exp-item:hover { background: #000080; color: #fff; border-color: #000080; }
.exp-item.selected { background: #000080; color: #fff; border-color: #000080; }
.exp-item .exp-icon { font-size: 28px; margin-bottom: 2px; pointer-events: none; }
.exp-item span { pointer-events: none; }
.exp-sysfile {  }

/* ── Drop zone overlay ───────────────────────────────────────── */
#drop-overlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,128,0.55); border: 4px dashed #fff;
  align-items: center; justify-content: center;
  color: #fff; font-family: var(--sleep-font); font-size: 22px;
  pointer-events: none;
}
#drop-overlay.active { display: flex; }

/* ── Image viewer / Video player ─────────────────────────────── */
.media-body {
  width: 100%; height: 100%; background: #111;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.media-body img { max-width: 100%; max-height: 100%; object-fit: contain; }
.media-body video { width: 100%; height: 100%; background: #000; }

/* ── Video Player ────────────────────────────────────────────── */
.vp-shell {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  box-sizing: border-box; gap: 8px; padding: 8px;
  background: #c0c0c0;
  user-select: none;
}
.vp-screen {
  flex: 1; position: relative; overflow: hidden; background: #9f9f9f;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf;
}
.vp-screen video { width: 100%; height: 100%; display: block; object-fit: contain; background: #9f9f9f; }
.vp-dither {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
  background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.38) 0.9px, transparent 1px);
  background-size: 4px 4px;
}
.vp-screen-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 38px; pointer-events: none; transition: opacity 0.18s;
  color: rgba(0,0,128,0.75); text-shadow: 1px 1px 0 #fff;
}
.vp-bar {
  flex-shrink: 0; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  padding: 6px 8px; display: flex; flex-direction: column; gap: 6px;
}
.vp-seek-row { display: flex; align-items: center; gap: 8px; }
.vp-time {
  font-size: 10px; color: #222; white-space: nowrap;
  min-width: 32px; font-variant-numeric: tabular-nums;
}
.vp-time.vp-dur { text-align: right; color: #222; }
.vp-seek {
  flex: 1; -webkit-appearance: none; height: 12px; border-radius: 0;
  border: 1px solid #7a7a7a;
  background: linear-gradient(to right, #000080 var(--pct,0%), #f5f5f5 var(--pct,0%));
  box-shadow: inset 1px 1px 0 #fff;
  outline: none; cursor: pointer;
}
.vp-seek::-webkit-slider-thumb {
  -webkit-appearance: none; width: 11px; height: 17px; border-radius: 0;
  border: 1px solid #000; background: #c0c0c0;
  box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  cursor: pointer;
}
.vp-btn-row { display: flex; align-items: center; gap: 4px; }
.vp-btn {
  min-width: 26px; height: 24px; box-sizing: border-box; padding: 0 8px;

  -webkit-appearance: none; height: 12px; width: 68px; border-radius: 0;

}
.vp-vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 9px; height: 15px; border-radius: 0;

  font-size: 10px; color: #4a4a4a;

.vp-spacer { flex: 1; }

/* Video player */
.st-panel { padding: 10px 12px; display: flex; flex-direction: column; gap: 0; }
.st-section { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #808080; margin: 10px 0 4px; border-bottom: 1px solid #d0d0d0; padding-bottom: 2px; }
.st-section:first-child { margin-top: 0; }
.st-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px; }
.st-label { font-size: 11px; color: #000; }
.st-toggle {
  min-width: 44px; height: 19px; padding: 0 6px;
  background: #c0c0c0; cursor: default; font-size: 11px; font-family: inherit;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;

.st-toggle:active { border-color: #808080 #fff #fff #808080; }
.st-toggle.on { background: #000080; color: #fff; border-color: #808080 #fff #fff #808080; }
.st-footer { display: flex; gap: 6px; padding: 8px 2px 0; border-top: 1px solid #d0d0d0; margin-top: 6px; }

/* ── Welcome text window ─────────────────────────────────────── */
.note-body {

}
.note-textarea {
  display: block; width: 100%; height: 100%; box-sizing: border-box;
  background: #fff; padding: 8px;
  font-family: var(--sleep-font); font-size: 11px; line-height: 1.7;
  border: none; outline: none; resize: none; overflow: auto;

/* ── Syntax-highlighting editor (notepad) ─────────────────────── */
.editor-wrap {
  position: relative; flex: 1; min-height: 0; overflow: hidden;
}
.editor-wrap .note-textarea {
  position: absolute; inset: 0; height: auto;

.editor-highlight {
  position: absolute; inset: 0;

const DESKTOP_SHORTCUTS_KEY = 'sleepOS-desktop-shortcuts';
const customDesktopIcons = [];
function normalizeShortcutPath(path) {
  return String(path || '')
    .trim()
    .replace(/^C:\\sleepOS\\?/i, '')
    .replace(/\//g, '\\')
    .replace(/^\\+|\\+$/g, '');
}
function normalizeDesktopShortcut(entry) {
  if (!entry || typeof entry !== 'object') return null;
  const target = entry.target && typeof entry.target === 'object' ? entry.target : null;
  if (!target) return null;
  const kind = target.kind === 'dir' ? 'dir' : 'file';
  const path = normalizeShortcutPath(target.path);
  const name = String(entry.name || target.name || path.split('\\').pop() || '').trim();
  const emoji = String(entry.emoji || '').trim();
  if (!name || !emoji) return null;
  if (!path && !target.sysfile) return null;
  return {
    name,
    emoji,
    custom: true,
    target: {
      name,
      path,
      kind,
      sysfile: !!target.sysfile,
    },
  };
}
function saveDesktopShortcuts() {
  try {
    localStorage.setItem(DESKTOP_SHORTCUTS_KEY, JSON.stringify(customDesktopIcons.map(({ name, emoji, target }) => ({
      name,
      emoji,
      target,
    }))));
  } catch (e) {}
}
function loadDesktopShortcuts() {
  customDesktopIcons.length = 0;
  try {
    const raw = JSON.parse(localStorage.getItem(DESKTOP_SHORTCUTS_KEY) || '[]');
    raw.map(normalizeDesktopShortcut).filter(Boolean).forEach(icon => customDesktopIcons.push(icon));
  } catch (e) {}
}
loadDesktopShortcuts();
function openSystemFile(name) {
  const SYS = {
    'WELCOME.README': openWelcome,
    'TERMINAL.exe': openTerminal,
    'SYSMON.exe': openSysmon,
    'NOTEPAD.exe': openNotepad,
    'BROWSER.exe': openBrowser,
    'DEFRAG.exe': openDefrag,
    'void.tmp': openVoid,
    'daemon.core': openDaemon,
    '?????.exe': openUnknown,
  };
  if (!SYS[name]) return false;
  SYS[name]();
  return true;
}
function openDesktopShortcutTarget(target) {
  if (!target || typeof target !== 'object') return;
  const path = normalizeShortcutPath(target.path);
  const name = String(target.name || path.split('\\').pop() || '').trim();
  if (target.sysfile) {
    if (!openSystemFile(name || path)) {
      osAlert('Shortcut target not found:\n' + (name || path || 'Unknown target'), 'Missing Shortcut', 'X');
    }
    return;
  }
  if (target.kind === 'dir') {
    openExplorer(path);
    return;
  }
  const entry = fsGetEntry(path);
  if (!entry) {
    osAlert('Shortcut target not found:\n' + (path || name || 'Unknown target'), 'Missing Shortcut', 'X');
    return;
  }
  if (entry.kind === 'blob') openMediaFile(entry.fileName, entry.dirName);

}
const DEFAULT_BROWSER_FAVORITES = [

function normalizeFavoriteEntry(entry) {
  if (!entry || typeof entry !== 'object') return null;
  const url = String(entry.url || '').trim();
  if (!url) return null;
  const title = String(entry.title || url).trim() || url;
  return { title, url };
}
function dedupeFavorites(list) {
  const seen = new Set();
  return (Array.isArray(list) ? list : [])
    .map(normalizeFavoriteEntry)
    .filter(entry => {
      if (!entry) return false;
      const key = entry.url.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

const WALLPAPER_FILE_PREFIX = 'FILE:';
let currentWallpaper = 'default';

function isWallpaperFileId(id) {
  return typeof id === 'string' && id.startsWith(WALLPAPER_FILE_PREFIX);
}

function wallpaperFileId(path, fallbackDir) {
  const { dirName, fileName } = fsSplitPath(path, fallbackDir);
  return fileName ? WALLPAPER_FILE_PREFIX + blobRelativePath(dirName, fileName) : '';
}

function wallpaperFilePath(id) {
  return isWallpaperFileId(id) ? id.slice(WALLPAPER_FILE_PREFIX.length) : '';
}

function getUploadedWallpaperChoices() {
  const items = [];
  function walk(dir, dirPath) {
    if (!dir) return;
    dir.blobs?.forEach((blob, fileName) => {
      if (blob.kind !== 'image') return;
      const relPath = blobRelativePath(dirPath, fileName);
      items.push({
        id: WALLPAPER_FILE_PREFIX + relPath,
        name: fileName,
        path: relPath,
        url: blob.url,
      });
    });
    if (!dir.subdirs) return;
    [...dir.subdirs.entries()]
      .sort((a, b) => a[0].localeCompare(b[0]))
      .forEach(([subName, subdir]) => walk(subdir, dirPath ? dirPath + '\\' + subName : subName));
  }
  walk(termFS, '');
  return items.sort((a, b) => a.path.localeCompare(b.path));
}

function renderWallpaperSwatch(grid, choice) {
  const item = document.createElement('div');
  item.dataset.id = choice.id;
  item.className = 'wp-swatch' + (choice.id === currentWallpaper ? ' wp-selected' : '');

  item.style.cssText = 'cursor:default;display:flex;flex-direction:column;align-items:center;gap:3px;';

  const thumb = document.createElement('div');
  thumb.className = 'wp-thumb';
  thumb.style.cssText = 'width:72px;height:50px;box-sizing:border-box;overflow:hidden;flex-shrink:0;background:#c0c0c0;';

  if (choice.url) {
    const img = document.createElement('img');
    img.src = choice.url;
    img.alt = choice.name;
    img.draggable = false;
    thumb.appendChild(img);
  } else {
    const fill = document.createElement('div');
    fill.style.cssText = `width:100%;height:100%;${choice.bg}`;
    thumb.appendChild(fill);
  }

  const label = document.createElement('div');
  label.style.cssText = 'font-size:10px;text-align:center;line-height:1.25;max-width:84px;word-break:break-word;';
  label.textContent = choice.path ? choice.name.replace(/\.[^.]+$/, '') : choice.name;
  item.appendChild(thumb);
  item.appendChild(label);

  if (choice.path && choice.path !== choice.name) {
    const meta = document.createElement('div');
    meta.textContent = choice.path.replace(/\\[^\\]+$/, '') || 'Root';
    meta.style.cssText = 'font-size:9px;color:#555;text-align:center;line-height:1.1;max-width:84px;word-break:break-word;';

function applyWallpaper(id, options = {}) {
  const { deferMissing = false } = options;
  const bg = document.getElementById('desktop-bg');
  if (!bg) return false;

  const wp = WALLPAPERS.find(w => w.id === id);
  if (wp) {
    currentWallpaper = id;
    bg.style.cssText = wp.bg;
    localStorage.setItem(WP_KEY, id);
    document.querySelectorAll('.wp-swatch').forEach(s => {
      s.classList.toggle('wp-selected', s.dataset.id === id);
    });
    return true;
  }

  if (isWallpaperFileId(id)) {
    const entry = fsGetEntry(wallpaperFilePath(id));
    const blob = entry && entry.kind === 'blob' ? entry.value : null;
    if (blob?.kind === 'image') {
      currentWallpaper = id;
      bg.style.cssText = `background-color:#c0c0c0;background-image:url("${blob.url}");background-position:center;background-size:cover;background-repeat:no-repeat;`;
      localStorage.setItem(WP_KEY, id);
      document.querySelectorAll('.wp-swatch').forEach(s => {
        s.classList.toggle('wp-selected', s.dataset.id === id);
      });
      return true;
    }
    if (deferMissing) return false;
  }

  if (id !== 'default') return applyWallpaper('default');
  document.querySelectorAll('.wp-swatch').forEach(s => {
    s.classList.toggle('wp-selected', s.dataset.id === id);
  });
  return false;
}

function handleWallpaperFileRename(dirPath, oldName, newName) {
  const oldId = WALLPAPER_FILE_PREFIX + blobRelativePath(dirPath, oldName);

  if (currentWallpaper === oldId || savedId === oldId) {
    applyWallpaper(WALLPAPER_FILE_PREFIX + blobRelativePath(dirPath, newName));
  } else {
    refreshAppearanceWindow();

}

function handleWallpaperFileDelete(dirPath, name) {
  const id = WALLPAPER_FILE_PREFIX + blobRelativePath(dirPath, name);
  const savedId = localStorage.getItem(WP_KEY);
  if (currentWallpaper === id || savedId === id) {
    applyWallpaper('default');

  }
}

// Helper: get a directory object by name ('' = root)
function fsGetDir(path) {
  if (!path) return termFS;
  const parts = String(path).toUpperCase().replace(/\//g,'\\').split('\\').filter(Boolean);
  let node = termFS;
  for (const part of parts) {
    if (!node.subdirs) node.subdirs = new Map();
    if (!node.subdirs.has(part)) {
      if (node.dirs.has(part)) node.subdirs.set(part, { dirs: new Set(), files: new Map(), blobs: new Map(), subdirs: new Map() });
      else return null;
    }
    node = node.subdirs.get(part);
  }
  return node;
}

function fsNormalizeDir(name) {
  return String(name || '')
    .trim()
    .replace(/^C:\\sleepOS\\?/i, '')
    .replace(/\//g, '\\')
    .replace(/^\\+|\\+$/g, '')
    .toUpperCase();
}

function fsSplitPath(path, fallbackDir) {
  const cleaned = String(path || '')
    .trim()
    .replace(/^C:\\sleepOS\\?/i, '')
    .replace(/\//g, '\\')
    .replace(/^\\+|\\+$/g, '');
  if (!cleaned) return { dirName: fsNormalizeDir(fallbackDir), fileName: '' };
  const parts = cleaned.split('\\').filter(Boolean);
  if (parts.length === 1) return { dirName: fsNormalizeDir(fallbackDir), fileName: parts[0] };
  return {
    dirName: fsNormalizeDir(parts.slice(0, -1).join('\\')),
    fileName: parts[parts.length - 1],
  };
}

function fsGetEntry(path, fallbackDir) {
  const { dirName, fileName } = fsSplitPath(path, fallbackDir);
  const dir = fsGetDir(dirName);
  if (!dir || !fileName) return null;
  if (dir.files.has(fileName)) return { dir, dirName, fileName, kind: 'text', value: dir.files.get(fileName) };
  if (dir.blobs.has(fileName)) return { dir, dirName, fileName, kind: 'blob', value: dir.blobs.get(fileName) };
  return null;
}

function fsWriteTextFile(path, value, fallbackDir) {
  const { dirName, fileName } = fsSplitPath(path, fallbackDir);
  const dir = fsGetDir(dirName);
  if (!dir || !fileName) return null;
  dir.files.set(fileName, value);
  schedSave();
  return { dir, dirName, fileName };
}

// ── Filesystem persistence ────────────────────────────────────────
const FS_KEY = 'sleepOS-fs';
let _fsSaveTimer = null;

function _serDir(d) {
  const out = { dirs: [...d.dirs], files: {}, subdirs: {} };
  d.files.forEach((v, k) => { out.files[k] = v; });
  if (d.subdirs) d.subdirs.forEach((v, k) => { out.subdirs[k] = _serDir(v); });
  return out;
}

function _desDir(o) {
  const d = { dirs: new Set(o.dirs || []), files: new Map(), blobs: new Map(), subdirs: new Map() };
  Object.entries(o.files || {}).forEach(([k, v]) => d.files.set(k, v));
  Object.entries(o.subdirs || {}).forEach(([k, v]) => d.subdirs.set(k, _desDir(v)));
  return d;
}

function saveFS() {
  try {
    const data = { dirs: [...termFS.dirs], files: {}, subdirs: {} };
    termFS.files.forEach((v, k) => { data.files[k] = v; });
    termFS.subdirs.forEach((v, k) => { data.subdirs[k] = _serDir(v); });
    localStorage.setItem(FS_KEY, JSON.stringify(data));
  } catch(e) { /* quota exceeded — silently ignore */ }
}

function schedSave() {
  clearTimeout(_fsSaveTimer);
  _fsSaveTimer = setTimeout(saveFS, 400);
}

function loadFS() {
  const raw = localStorage.getItem(FS_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (data.dirs) data.dirs.forEach(d => termFS.dirs.add(d));
    if (data.files) Object.entries(data.files).forEach(([k, v]) => termFS.files.set(k, v));
    if (data.subdirs) Object.entries(data.subdirs).forEach(([k, v]) => termFS.subdirs.set(k, _desDir(v)));
  } catch(e) { /* corrupted save — ignore */ }
}

// ── Blob persistence (base64 per-file, separate localStorage keys) ─
const BLOB_PREFIX = 'sleepOS-blob:';
const BLOB_SIZE_LIMIT = 3 * 1024 * 1024; // skip files > 3 MB uncompressed
const MEDIA_DB_NAME = 'sleepOS-media';
const MEDIA_DB_VERSION = 1;
const MEDIA_DB_STORE = 'blobs';
let _mediaDbPromise = null;

function blobRelativePath(dirPath, name) {
  return (dirPath ? dirPath + '\\' : '') + name;
}

function blobStorageKey(dirPath, name) {
  return BLOB_PREFIX + blobRelativePath(dirPath, name);
}

function splitBlobRelativePath(path) {
  const clean = String(path || '').replace(/\//g, '\\').replace(/^\\+|\\+$/g, '');
  const lastSlash = clean.lastIndexOf('\\');
  return {
    dirPath: lastSlash === -1 ? '' : clean.slice(0, lastSlash),
    fileName: lastSlash === -1 ? clean : clean.slice(lastSlash + 1),
  };
}

function _ab2b64(ab) {
  const bytes = new Uint8Array(ab);
  let out = '';
  for (let i = 0; i < bytes.length; i += 8192)
    out += String.fromCharCode(...bytes.subarray(i, Math.min(i + 8192, bytes.length)));
  return btoa(out);
}

function openMediaDb() {
  if (!window.indexedDB) return Promise.resolve(null);
  if (_mediaDbPromise) return _mediaDbPromise;
  _mediaDbPromise = new Promise(resolve => {
    try {
      const req = indexedDB.open(MEDIA_DB_NAME, MEDIA_DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(MEDIA_DB_STORE)) {
          db.createObjectStore(MEDIA_DB_STORE, { keyPath: 'path' });
        }
      };
      req.onsuccess = () => {
        const db = req.result;
        db.onversionchange = () => db.close();
        resolve(db);
      };
      req.onerror = req.onblocked = () => resolve(null);
    } catch (e) {
      resolve(null);
    }
  });
  return _mediaDbPromise;
}

async function storeBlobEntryInDb(dirPath, name, kind, size, mime, arrayBuffer) {
  const db = await openMediaDb();
  if (!db) return false;
  return new Promise(resolve => {
    try {
      const tx = db.transaction(MEDIA_DB_STORE, 'readwrite');
      tx.objectStore(MEDIA_DB_STORE).put({
        path: blobRelativePath(dirPath, name),
        kind,
        size,
        mime,
        blob: new Blob([arrayBuffer], { type: mime || 'application/octet-stream' }),
      });
      tx.oncomplete = () => resolve(true);
      tx.onerror = tx.onabort = () => resolve(false);
    } catch (e) {
      resolve(false);
    }
  });
}

async function removeBlobEntryFromDb(dirPath, name) {
  const db = await openMediaDb();
  if (!db) return false;
  return new Promise(resolve => {
    try {
      const tx = db.transaction(MEDIA_DB_STORE, 'readwrite');
      tx.objectStore(MEDIA_DB_STORE).delete(blobRelativePath(dirPath, name));
      tx.oncomplete = () => resolve(true);
      tx.onerror = tx.onabort = () => resolve(false);
    } catch (e) {
      resolve(false);
    }
  });
}

async function renameBlobEntryInDb(dirPath, oldName, newName) {
  const db = await openMediaDb();
  if (!db) return false;
  const oldPath = blobRelativePath(dirPath, oldName);
  const newPath = blobRelativePath(dirPath, newName);
  return new Promise(resolve => {
    try {
      const tx = db.transaction(MEDIA_DB_STORE, 'readwrite');
      const store = tx.objectStore(MEDIA_DB_STORE);
      const getReq = store.get(oldPath);
      getReq.onsuccess = () => {
        const data = getReq.result;
        if (!data) return;
        data.path = newPath;
        store.put(data);
        store.delete(oldPath);
      };
      tx.oncomplete = () => resolve(true);
      tx.onerror = tx.onabort = () => resolve(false);
    } catch (e) {
      resolve(false);
    }
  });
}

function restoreBlobIntoFs(dirPath, fileName, kind, size, mime, rawBlob) {
  if (!fileName) return;
  const dir = fsGetDir(dirPath);
  if (!dir) return;
  const prev = dir.blobs.get(fileName);
  if (prev?.url) URL.revokeObjectURL(prev.url);
  const blob = rawBlob instanceof Blob ? rawBlob : new Blob([rawBlob], { type: mime || 'application/octet-stream' });
  dir.blobs.set(fileName, { url: URL.createObjectURL(blob), kind, size, mime });
}

// Save a single blob entry immediately (called at upload time when we have the raw File)
function saveBlobEntry(dirPath, name, kind, size, mime, arrayBuffer) {
  void storeBlobEntryInDb(dirPath, name, kind, size, mime, arrayBuffer);
  if (size > BLOB_SIZE_LIMIT) return;
  try { localStorage.setItem(blobStorageKey(dirPath, name),
    JSON.stringify({ kind, size, mime, b64: _ab2b64(arrayBuffer) })); }
  catch(ex) { /* quota */ }
}

function removeBlobEntry(dirPath, name) {
  localStorage.removeItem(blobStorageKey(dirPath, name));
  void removeBlobEntryFromDb(dirPath, name);
}

function renameBlobEntry(dirPath, oldName, newName) {
  const oldKey = blobStorageKey(dirPath, oldName);
  const newKey = blobStorageKey(dirPath, newName);
  const data = localStorage.getItem(oldKey);
  if (data) { try { localStorage.setItem(newKey, data); } catch(ex) {} localStorage.removeItem(oldKey); }
  void renameBlobEntryInDb(dirPath, oldName, newName);
}

function loadBlobsFromStorage() {
  Object.keys(localStorage).filter(k => k.startsWith(BLOB_PREFIX)).forEach(k => {
    try {
      const { kind, size, mime, b64 } = JSON.parse(localStorage.getItem(k));
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const { dirPath, fileName } = splitBlobRelativePath(k.slice(BLOB_PREFIX.length));
      restoreBlobIntoFs(dirPath, fileName, kind, size, mime, new Blob([bytes], { type: mime }));
    } catch(e) { /* corrupted ? skip */ }
  });
  void loadBlobsFromIndexedDb();
}

async function loadBlobsFromIndexedDb() {
  const db = await openMediaDb();
  if (!db) return;
  const items = await new Promise(resolve => {
    try {
      const tx = db.transaction(MEDIA_DB_STORE, 'readonly');
      const req = tx.objectStore(MEDIA_DB_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    } catch (e) {
      resolve([]);
    }
  });
  items.forEach(item => {
    const { dirPath, fileName } = splitBlobRelativePath(item.path);
    restoreBlobIntoFs(dirPath, fileName, item.kind, item.size, item.mime, item.blob);
  });
  if (items.length) document.dispatchEvent(new CustomEvent('fs-changed'));
  const savedWp = localStorage.getItem(WP_KEY);
  if (savedWp && isWallpaperFileId(savedWp)) {
    if (!applyWallpaper(savedWp)) applyWallpaper('default');
  }
}
loadBlobsFromStorage();

function applySettings() {

// ── Script executor ──────────────────────────────────────────────
const SCRIPT_COLORS = { red:'#ff4444', green:'#44dd44', yellow:'#dddd00', cyan:'#44dddd', blue:'#6699ff', white:'#ffffff' };

function execScript(source, printFn) {
  const vars = {};
  let delay = 0;
  const lines = source.split('\n');

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#') || line.startsWith('//')) continue;

    // Pre-scan wait to compute delay offset for subsequent commands
    if (/^wait\s+\d+/i.test(line)) {
      delay += Math.min(parseInt(line.split(/\s+/)[1]) || 0, 30000);
      continue;
    }

    ((d, l) => setTimeout(() => {
      const resolved = l.replace(/\$(\w+)/g, (_, k) => vars[k] ?? '');
      const spIdx = resolved.search(/\s/);
      const cmd = (spIdx === -1 ? resolved : resolved.slice(0, spIdx)).toLowerCase();
      const arg = spIdx === -1 ? '' : resolved.slice(spIdx + 1).trim();

      switch (cmd) {
        case 'print': case 'echo': {
          const m = arg.match(/^\[(\w+)\]\s*/);
          if (m && SCRIPT_COLORS[m[1]]) printFn(arg.slice(m[0].length), SCRIPT_COLORS[m[1]]);
          else printFn(arg);
          break;
        }
        case 'set': {
          const sp = arg.indexOf(' ');
          if (sp !== -1) vars[arg.slice(0, sp)] = arg.slice(sp + 1);
          break;
        }
        case 'clear': {
          const out = document.getElementById('to');
          if (out) out.innerHTML = '';
          break;
        }
        case 'touch':
          if (arg && !termFS.files.has(arg)) { termFS.files.set(arg, ''); schedSave(); }
          break;
        case 'mkdir':
          if (arg) { termFS.dirs.add(arg.toUpperCase()); schedSave(); }
          break;
        case 'del': case 'rm':
          termFS.files.delete(arg);
          if (termFS.blobs.has(arg)) { URL.revokeObjectURL(termFS.blobs.get(arg).url); termFS.blobs.delete(arg); removeBlobEntry('', arg); }
          schedSave();
          break;
        case 'open':
          if (termFS.blobs.has(arg)) openMediaFile(arg);
          else if (termFS.files.has(arg)) openNotepad(arg);
          break;
        case 'notepad': openNotepad(arg || undefined); break;
        case 'start': {
          const p = arg.toLowerCase();
          const map = { notepad: openNotepad, terminal: openTerminal, sysmon: openSysmon,
                        browser: openBrowser, defrag: openDefrag, explorer: openExplorer,
                        welcome: openWelcome, files: openFiles };
          if (map[p]) map[p](); break;
        }
        case 'run':
          if (arg && termFS.files.has(arg)) execScript(termFS.files.get(arg), printFn);
          else printFn(`Script not found: ${arg}`, '#ff4444');
          break;
      }
    }, d))(delay, line);
  }
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

let _uploadCwd = '';
function triggerUpload(dir) {
  _uploadCwd = dir || '';
  document.getElementById('file-upload-input').click();
}

function handleFileUpload(fileList) {
  const dirPath = _uploadCwd || '';
  const target = fsGetDir(dirPath) || { files: termFS.files, blobs: termFS.blobs };
  const dirLabel = dirPath ? `C:\\sleepOS\\${dirPath}\\` : 'C:\\sleepOS';
  const added = [];
  [...fileList].forEach(file => {
    const url = URL.createObjectURL(file);
    const TEXT_EXTS = /\.(script|txt|md|csv|json|xml|html|css|js|log|ini|cfg|sh|bat)$/i;
    const isText = file.type.startsWith('text/') || TEXT_EXTS.test(file.name) || file.type === '';
    const kind = file.type.startsWith('image/') ? 'image'
               : file.type.startsWith('video/') ? 'video'
               : file.type.startsWith('audio/') ? 'audio'
               : isText ? 'text'
               : 'binary';
    if (kind === 'text') {
      const reader = new FileReader();
      reader.onload = e => { target.files.set(file.name, e.target.result); schedSave(); document.dispatchEvent(new CustomEvent('fs-changed')); };
      reader.readAsText(file);
    } else {
      target.blobs.set(file.name, { url, kind, size: file.size, mime: file.type });
      // Persist eagerly while we still have the raw File object
      const fr = new FileReader();
      fr.onload = e => saveBlobEntry(dirPath, file.name, kind, file.size, file.type, e.target.result);
      fr.readAsArrayBuffer(file);
    }
    added.push(file.name);
  });
  if (added.length) {
    showUploadConfirm(added, dirLabel);
    document.dispatchEvent(new CustomEvent('fs-changed'));
  }
}

function showUploadConfirm(names, dirLabel) {
  dirLabel = dirLabel || 'C:\\sleepOS';
  const msg = names.length === 1
    ? `"${names[0]}" uploaded to ${dirLabel}`
    : `${names.length} files uploaded to ${dirLabel}`;
  const id = 'upload-confirm-' + Date.now();
  if (!mkWin({ id, title: 'Upload Complete', icon: '📤', w: 300, h: 140, popup: true, menubar: false, statusbar: false })) return;
  const body = document.getElementById('wb-' + id);
  body.style.cssText = 'padding:14px;font-family: var(--sleep-font);font-size:12px;';
  body.innerHTML = `<div style="margin-bottom:12px;">📁 ${msg}</div>
    <div style="margin-bottom:8px;color:#555;">Use OPEN &lt;filename&gt; in terminal, or type the filename to view.</div>
    <div style="text-align:center;"><button class="dlg-btn" onclick="closeWin('${id}')">OK</button></div>`;
}

function openMediaFile(filename, dirName) {
  const entry = fsGetEntry(filename, dirName);
  const blob = entry && entry.kind === 'blob' ? entry.value : null;
  if (!blob) { return; }
  if (blob.kind === 'image') openImageViewer(entry.fileName, entry.dirName);
  else if (blob.kind === 'video') openVideoPlayer(entry.fileName, entry.dirName);
  else if (blob.kind === 'audio') openAudioPlayer(entry.fileName, entry.dirName);
  else osAlert('Cannot open binary file:\n' + entry.fileName, 'Cannot Open', 'X');
}

function openImageViewer(filename, dirName) {

  const blob = entry && entry.kind === 'blob' ? entry.value : null; if (!blob) return;
  const pathKey = (entry.dirName ? entry.dirName + '\\' : '') + entry.fileName;

    ]); });

function openVideoPlayer(filename, dirName) {
  const entry = fsGetEntry(filename, dirName);
  const blob = entry && entry.kind === 'blob' ? entry.value : null; if (!blob) return;
  const pathKey = (entry.dirName ? entry.dirName + '\\' : '') + entry.fileName;
  const id = 'vid-' + pathKey.replace(/\W/g,'_');
  if (!mkWin({ id, title: iconLabel(entry.fileName) + ' \u2014 Media Player', icon: '🎬', w: 500, h: 390 })) return;
  const body = document.getElementById('wb-' + id);
  const ws   = document.getElementById('ws-' + id);
  const mb   = document.getElementById('mb-' + id);
  body.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:column;';

  const shell  = document.createElement('div'); shell.className = 'vp-shell';

  // ── Screen ────────────────────────────────────────────────────
  const screen  = document.createElement('div'); screen.className = 'vp-screen';
  const video   = document.createElement('video'); video.src = blob.url;
  const dither  = document.createElement('div'); dither.className = 'vp-dither';
  dither.style.display = osSettings.videoDither ? '' : 'none';
  const overlay = document.createElement('div'); overlay.className = 'vp-screen-overlay';
  overlay.textContent = '▶'; overlay.style.opacity = '1';
  screen.appendChild(video); screen.appendChild(dither); screen.appendChild(overlay);
  screen.addEventListener('click', () => video.paused ? video.play() : video.pause());

  // ── Bottom bar ────────────────────────────────────────────────
  const bar = document.createElement('div'); bar.className = 'vp-bar';

  // Seek row
  const seekRow = document.createElement('div'); seekRow.className = 'vp-seek-row';
  const timeEl  = document.createElement('div'); timeEl.className = 'vp-time'; timeEl.textContent = '0:00';
  const durEl   = document.createElement('div'); durEl.className = 'vp-time vp-dur'; durEl.textContent = '0:00';
  const seek    = document.createElement('input'); seek.type = 'range'; seek.className = 'vp-seek';
  seek.min = 0; seek.max = 1000; seek.value = 0;
  seekRow.appendChild(timeEl); seekRow.appendChild(seek); seekRow.appendChild(durEl);

  // Button row
  const btnRow = document.createElement('div'); btnRow.className = 'vp-btn-row';
  const mkBtn = (txt, title, cls, fn) => {
    const b = document.createElement('div');
    b.className = 'vp-btn' + (cls ? ' ' + cls : '');
    b.textContent = txt; b.title = title;
    b.addEventListener('click', fn); return b;
  };
  const div = (cls) => { const d = document.createElement('div'); d.className = cls; return d; };

  const btnRew  = mkBtn('\u23EE', 'Back 10s',    '', () => { video.currentTime = Math.max(0, video.currentTime - 10); });
  const btnPlay = mkBtn('\u25B6', 'Play/Pause', 'vp-btn-play', () => video.paused ? video.play() : video.pause());
  const btnStop = mkBtn('\u23F9', 'Stop',        '', () => { video.pause(); video.currentTime = 0; });
  const btnFwd  = mkBtn('\u23ED', 'Forward 10s', '', () => { video.currentTime = Math.min(video.duration||0, video.currentTime + 10); });

  const muteBtn = mkBtn('\u{1F50A}', 'Mute', '', () => {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? '\u{1F507}' : '\u{1F50A}';
    renderVol();
  });

  // Unicode block volume slider (10 blocks)
  const volEl = document.createElement('div'); volEl.className = 'vp-vol-blocks'; volEl.title = 'Volume';
  const VOL_BLOCKS = 10;
  function renderVol() {
    const v = video.muted ? 0 : video.volume;
    const filled = Math.round(v * VOL_BLOCKS);
    const on = Array(filled + 1).join('&#9632;');
    const off = Array(VOL_BLOCKS - filled + 1).join('&#9643;');
    volEl.innerHTML =
      `<span style="color:#000080">${on}</span>` +
      `<span style="color:#6a6a6a">${off}</span>`;
  }
  function setVolFromX(clientX) {
    const r = volEl.getBoundingClientRect();
    video.volume = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    video.muted = false;
    muteBtn.textContent = '\u{1F50A}';
    renderVol();
  }
  let _volDrag = false;
  volEl.addEventListener('mousedown', e => { _volDrag = true; setVolFromX(e.clientX); });
  document.addEventListener('mousemove', e => { if (_volDrag) setVolFromX(e.clientX); });
  document.addEventListener('mouseup', () => { _volDrag = false; });
  renderVol();

  const metaEl = document.createElement('div'); metaEl.className = 'vp-meta';
  metaEl.textContent = iconLabel(entry.fileName) + '  \u00b7  ' + fmtSize(blob.size);

  btnRow.appendChild(btnRew); btnRow.appendChild(btnPlay); btnRow.appendChild(btnStop);
  btnRow.appendChild(btnFwd); btnRow.appendChild(div('vp-divider'));
  btnRow.appendChild(muteBtn); btnRow.appendChild(volEl);
  btnRow.appendChild(div('vp-spacer')); btnRow.appendChild(metaEl);

  bar.appendChild(seekRow); bar.appendChild(btnRow);
  shell.appendChild(screen); shell.appendChild(bar);
  body.appendChild(shell);

  // ── Helpers ───────────────────────────────────────────────────
  function fmtT(s) {
    if (!isFinite(s)) return '0:00';
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }
  function updateSeekGradient() {
    const pct = seek.max > 0 ? (seek.value / seek.max * 100).toFixed(1) + '%' : '0%';
    seek.style.setProperty('--pct', pct);
  }

  // ── Events ────────────────────────────────────────────────────
  video.addEventListener('loadedmetadata', () => { durEl.textContent = fmtT(video.duration); });
  video.addEventListener('timeupdate', () => {
    timeEl.textContent = fmtT(video.currentTime);
    if (!seek._dragging && video.duration) { seek.value = (video.currentTime / video.duration) * 1000; updateSeekGradient(); }
  });
  video.addEventListener('play',         () => { btnPlay.textContent = '\u23F8'; overlay.style.opacity = '0'; });
  video.addEventListener('pause',        () => { btnPlay.textContent = '\u25B6'; overlay.style.opacity = '0.35'; });
  video.addEventListener('ended',        () => { btnPlay.textContent = '\u25B6'; overlay.style.opacity = '1'; });
  video.addEventListener('volumechange', renderVol);

  seek.addEventListener('mousedown', () => { seek._dragging = true; });
  seek.addEventListener('input', () => { if (video.duration) { video.currentTime = (seek.value/1000)*video.duration; updateSeekGradient(); } });
  seek.addEventListener('mouseup', () => { seek._dragging = false; });

  // ── Menu bar ──────────────────────────────────────────────────
  if (ws) ws.textContent = iconLabel(entry.fileName) + '  \u2014  ' + fmtSize(blob.size);
  if (mb) {
    [
      { label: 'File', items: [{ label: 'Close', action: () => { video.pause(); closeWin(id); } }] },
      { label: 'Playback', items: [
        { label: 'Play / Pause', action: () => video.paused ? video.play() : video.pause() },
        { label: 'Stop',         action: () => { video.pause(); video.currentTime = 0; } },
        '-',
        { label: '\u21E6 Back 10s',    action: () => { video.currentTime = Math.max(0, video.currentTime - 10); } },
        { label: '\u21E8 Forward 10s', action: () => { video.currentTime = Math.min(video.duration||0, video.currentTime + 10); } },
      ]},
    ].forEach(({ label, items }) => {
      const span = document.createElement('span');
      span.className = 'menu-item'; span.textContent = label;
      span.addEventListener('click', e => { e.stopPropagation(); showDropdown(span, items); });
      mb.appendChild(span);
    });
  }
}

function mkWin({ id, title, icon = '📄', x, y, w = 500, h = 380,
                 menubar = true, statusbar = true, popup = false }) {
  if (wins[id]) { focusWin(id); unminWin(id); return null; }

  // Default position: slightly random cascade; on mobile fill viewport (except small popups)
  const count = Object.keys(wins).length;
  const isMobile = window.innerWidth <= 700 || window.matchMedia('(pointer: coarse)').matches;
  const taskbarH = isMobile ? 44 : 28;
  if (isMobile && !popup) {
    x = 0; y = 0;
    w = window.innerWidth;
    h = window.innerHeight - taskbarH;
  } else {
    if (x === undefined) x = 80 + count * 22;
    if (y === undefined) y = 44 + count * 22;
    // Center popups on mobile
    if (isMobile && popup) {
      x = Math.max(4, Math.floor((window.innerWidth - w) / 2));
      y = Math.max(4, Math.floor((window.innerHeight - taskbarH - h) / 3));
    }
  }

  const el = document.createElement('div');
  el.className = 'os-window inactive';
  el.id = 'win-' + id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  el.innerHTML = `
    <div class="win-rz win-rz-n"></div><div class="win-rz win-rz-s"></div>
    <div class="win-rz win-rz-e"></div><div class="win-rz win-rz-w"></div>
    <div class="win-rz win-rz-nw"></div><div class="win-rz win-rz-ne"></div>
    <div class="win-rz win-rz-sw"></div><div class="win-rz win-rz-se"></div>
    <div class="win-titlebar" id="tb-${id}">
      <div class="win-title-text">
        <span class="win-icon">${icon}</span>
        <span id="wtitle-${id}">${title}</span>
      </div>
      <div class="win-controls">
        <button class="win-btn" title="Minimize" onclick="minWin('${id}')">─</button>
        <button class="win-btn" title="Maximize" onclick="maxWin('${id}')">□</button>
        <button class="win-btn" title="Close"    onclick="closeWin('${id}')">✕</button>
      </div>
    </div>
    ${menubar ? `<div class="win-menubar" id="mb-${id}"></div>` : ''}
    <div class="win-body" id="wb-${id}"></div>
    ${statusbar ? `<div class="win-statusbar"><div class="statusbar-panel" id="ws-${id}">Ready</div></div>` : ''}
  `;

  document.getElementById('windows-layer').appendChild(el);
  wins[id] = { el, title, icon, minimized: false, maximized: false, origStyle: null };

  makeDraggable(el, document.getElementById('tb-' + id));
  makeResizable(el, id);
  addTbBtn(id, title, icon);
  el.addEventListener('mousedown', () => focusWin(id));
  el.addEventListener('touchstart', () => focusWin(id), { passive: true });

  focusWin(id);
  return el;
}

function focusWin(id) {
  const w = wins[id]; if (!w) return;
  w.el.style.zIndex = ++zTop;
  Object.values(wins).forEach(v => v.el.classList.add('inactive'));
  w.el.classList.remove('inactive');
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('focused'));
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.add('focused');
}

function minWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = true; w.el.style.display = 'none';
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.remove('focused');
}

function unminWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = false; w.el.style.display = 'flex'; focusWin(id);
}

function maxWin(id) {
  const w = wins[id]; if (!w) return;
  if (w.maximized) {
    w.el.style.cssText = w.origStyle;
    w.maximized = false;
  } else {
    w.origStyle = w.el.style.cssText;
    const d = document.getElementById('desktop');
    w.el.style.left   = '0';
    w.el.style.top    = '0';
    w.el.style.width  = d.offsetWidth + 'px';
    w.el.style.height = d.offsetHeight + 'px';
    w.el.style.zIndex = ++zTop;
    w.maximized = true;
  }
}

function restoreMaximizedForDrag(id, clientX, clientY) {
  const w = wins[id];
  if (!w || !w.maximized || !w.origStyle) return;
  const fullRect = w.el.getBoundingClientRect();
  const pointerRatio = fullRect.width ? Math.min(0.9, Math.max(0.1, (clientX - fullRect.left) / fullRect.width)) : 0.5;
  w.el.style.cssText = w.origStyle;
  w.maximized = false;
  w.el.style.zIndex = ++zTop;
  const desktop = document.getElementById('desktop');
  const maxLeft = Math.max(0, desktop.offsetWidth - w.el.offsetWidth);
  const maxTop = Math.max(0, desktop.offsetHeight - w.el.offsetHeight);
  w.el.style.left = Math.max(0, Math.min(maxLeft, clientX - w.el.offsetWidth * pointerRatio)) + 'px';
  w.el.style.top = Math.max(0, Math.min(maxTop, clientY - 14)) + 'px';
}

function closeWin(id) {
  const w = wins[id]; if (!w) return;
  if (w._interval) clearInterval(w._interval);
  w.el.remove(); delete wins[id];
  const btn = document.getElementById('tbtn-' + id); if (btn) btn.remove();
}

function makeDraggable(win, handle) {
  let sx, sy, sl, st;
  const id = win.id.replace('win-', '');

  function startDrag(cx, cy) {
    sx = cx; sy = cy;
    sl = win.offsetLeft; st = win.offsetTop;
  }
  function moveDrag(cx, cy) {
    const desktop = document.getElementById('desktop');
    const maxLeft = Math.max(0, desktop.offsetWidth - win.offsetWidth);
    const maxTop = Math.max(0, desktop.offsetHeight - win.offsetHeight);
    win.style.left = Math.max(0, Math.min(maxLeft, sl + cx - sx)) + 'px';
    win.style.top  = Math.max(0, Math.min(maxTop, st + cy - sy)) + 'px';
  }

  handle.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    focusWin(id);
    restoreMaximizedForDrag(id, e.clientX, e.clientY);
    startDrag(e.clientX, e.clientY);
    const onMove = (e) => moveDrag(e.clientX, e.clientY);
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  handle.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    focusWin(id);
    const t = e.touches[0];
    restoreMaximizedForDrag(id, t.clientX, t.clientY);
    startDrag(t.clientX, t.clientY);
    const onMove = (e) => { e.preventDefault(); const t = e.touches[0]; moveDrag(t.clientX, t.clientY); };
    const onEnd = () => { handle.removeEventListener('touchmove', onMove); handle.removeEventListener('touchend', onEnd); };
    handle.addEventListener('touchmove', onMove, { passive: false });
    handle.addEventListener('touchend', onEnd);
  }, { passive: false });
}

function makeResizable(win, id) {
  const MIN_W = 180, MIN_H = 80;
  win.querySelectorAll('.win-rz').forEach(handle => {
    const a = [...handle.classList].find(c => c.startsWith('win-rz-') && c !== 'win-rz').replace('win-rz-','');
    handle.addEventListener('mousedown', e => {
      const w = wins[id]; if (w && w.maximized) return; // don't resize while maximized
      e.preventDefault(); e.stopPropagation();
      focusWin(id);
      const x0 = e.clientX, y0 = e.clientY;
      const W0 = win.offsetWidth, H0 = win.offsetHeight;
      const L0 = win.offsetLeft,  T0 = win.offsetTop;
      const onMove = e => {
        const dx = e.clientX - x0, dy = e.clientY - y0;
        let W = W0, H = H0, L = L0, T = T0;
        if (a.includes('e')) W = Math.max(MIN_W, W0 + dx);
        if (a.includes('s')) H = Math.max(MIN_H, H0 + dy);
        if (a.includes('w')) { W = Math.max(MIN_W, W0 - dx); L = L0 + W0 - W; }
        if (a.includes('n')) { H = Math.max(MIN_H, H0 - dy); T = T0 + H0 - H; }
        win.style.width = W+'px'; win.style.height = H+'px';
        win.style.left  = L+'px'; win.style.top    = T+'px';
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function addTbBtn(id, title, icon) {
  const btn = document.createElement('button');
  btn.className = 'taskbar-btn focused';
  btn.id = 'tbtn-' + id;
  btn.innerHTML = `<span>${icon}</span><span>${title}</span>`;
  btn.addEventListener('click', () => {
    const w = wins[id]; if (!w) return;
    if (w.minimized) { unminWin(id); }
    else if (w.maximized) { maxWin(id); }   // restore to pre-maximize size
    else if (w.el.classList.contains('inactive')) { focusWin(id); }
    else { minWin(id); }
  });
  document.getElementById('taskbar-programs').appendChild(btn);
}

function updateClock() {
  const now = new Date();
  if (window._clockCorrupted && Math.random() < 0.75) {
    document.getElementById('clock').textContent = '??:??'; return;
  }
  let h = Math.random() < 0.004 ? Math.floor(Math.random() * 24) : now.getHours();
  const m = Math.random() < 0.004 ? Math.floor(Math.random() * 60) : now.getMinutes();
  let suffix = '';
  if (osSettings.clock12h) {
    suffix = h >= 12 ? ' PM' : ' AM';
    h = h % 12 || 12;
  }
  document.getElementById('clock').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + suffix;
}

function makeDesktopIconEl(ic) {
  const div = document.createElement('div');
  div.className = 'desktop-icon';
  div.innerHTML = '<div class="di-img">' + ic.emoji + '</div><div class="di-name">' + iconLabel(ic.name) + '</div>';
  function activate() {
    if (ic.action) window[ic.action]?.();
    else if (ic.target) openDesktopShortcutTarget(ic.target);
    else if (ic.openFn) ic.openFn();
  }
  let clicks = 0, clickT;
  div.addEventListener('pointerdown', e => {
    e.stopPropagation();
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    div.classList.add('selected');
    if (e.pointerType !== 'mouse') {
      activate();
    } else {
      clicks++;
      if (clicks === 1) {
        clickT = setTimeout(() => { clicks = 0; }, 380);
      } else {
        clearTimeout(clickT); clicks = 0;
        activate();
      }
    }
  });
  div.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
    div.classList.add('selected');
    const items = [{ label: 'Open', action: activate }];

}

function detectLang(fname) {

const LANG_LABELS = { js:'JavaScript', html:'HTML', css:'CSS', json:'JSON', md:'Markdown', py:'Python', script:'.script', txt:'Plain Text' };

// Each rule: { re (global regex), cls (CSS class) }
const LANG_RULES = {
  js: [
    { re: /\/\*[\s\S]*?\*\//g,          cls: 'tok-cmt' },

    { re: new RegExp("\"(?:[^\"\\\\]|\\\\.)*\"", "g"), cls: 'tok-str' },
    { re: new RegExp("'(?:[^'\\\\]|\\\\.)*'", "g"), cls: 'tok-str' },
    { re: /\b[a-zA-Z-]+=(?=["'])/g,     cls: 'tok-att' },

function highlight(text, lang) {
  const rules = LANG_RULES[lang] || [];
  if (!rules.length) return escHtml(text);

  // Collect all non-overlapping token intervals
  const intervals = [];
  for (let ri = 0; ri < rules.length; ri++) {
    const { re, cls } = rules[ri];
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      intervals.push({ start: m.index, end: m.index + m[0].length, cls, ri });
    }
  }
  // Sort by start; ties broken by rule order (lower ri = higher priority)
  intervals.sort((a, b) => a.start !== b.start ? a.start - b.start : a.ri - b.ri);

  // Sweep: drop intervals that overlap an already-chosen one
  const chosen = [];
  let coveredTo = 0;
  for (const iv of intervals) {
    if (iv.start >= coveredTo) { chosen.push(iv); coveredTo = iv.end; }
  }

  let result = '';
  let cur = 0;
  for (const iv of chosen) {
    if (iv.start > cur) result += escHtml(text.slice(cur, iv.start));
    result += `<span class="${iv.cls}">${escHtml(text.slice(iv.start, iv.end))}</span>`;
    cur = iv.end;
  }
  if (cur < text.length) result += escHtml(text.slice(cur));
  return result;
}
