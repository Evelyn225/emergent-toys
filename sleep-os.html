<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sleepOS v0.9β</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── CRT overlay ──────────────────────────────────────────────── */
#crt {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 99999;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,8,0,0.10) 2px, rgba(0,8,0,0.10) 4px
  );
}
#crt::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
}

/* ── Global type ─────────────────────────────────────────────── */
body {
  overflow: hidden;
  font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
  font-size: 11px;
  background: #000;
}

/* ── BIOS ─────────────────────────────────────────────────────── */
#bios {
  position: fixed; inset: 0;
  background: #000; z-index: 9999;
  display: flex; align-items: flex-start; justify-content: flex-start;
  padding: 2rem 2.5rem;
  font-family: 'VT323', monospace;
  font-size: 18px; color: #aaa;
  overflow: hidden;
}
#bios-text { white-space: pre; line-height: 1.45; }

/* ── Desktop ─────────────────────────────────────────────────── */
#desktop {
  position: fixed; inset: 0; bottom: 28px;
  display: none;
}
#desktop-bg {
  position: absolute; inset: 0;
  background: #008080;
}

/* ── Desktop icons ───────────────────────────────────────────── */
#icons-layer {
  position: absolute; inset: 0;
  padding: 8px 6px;
  display: flex; flex-direction: column; flex-wrap: wrap;
  align-content: flex-start; gap: 2px;
}
.desktop-icon {
  width: 74px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px; cursor: default;
  border: 1px solid transparent;
}
.desktop-icon:hover { border: 1px dotted rgba(255,255,255,0.55); background: rgba(0,0,128,0.28); }
.desktop-icon.selected { border: 1px dotted #fff; background: rgba(0,0,128,0.5); }
.di-img { font-size: 30px; line-height: 1; }
.di-name {
  font-size: 11px; color: #fff;
  text-align: center; text-shadow: 1px 1px 1px #000;
  word-break: break-word; line-height: 1.2;
}
.desktop-icon.selected .di-name { background: #000080; }

/* ── Windows layer ───────────────────────────────────────────── */
#windows-layer { position: absolute; inset: 0; pointer-events: none; }

/* ── OS Window ───────────────────────────────────────────────── */
.os-window { pointer-events: auto; }
.os-window {
  position: absolute;
  display: flex; flex-direction: column;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  box-shadow: 1px 1px 0 #000;
  min-width: 180px; min-height: 80px;
}
.os-window.inactive .win-titlebar { background: #808080; }
.win-titlebar {
  background: linear-gradient(to right, #000080, #1084d0);
  color: #fff; padding: 2px 2px 2px 4px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: default; user-select: none;
  height: 18px; flex-shrink: 0; gap: 4px;
}
.win-title-text {
  display: flex; align-items: center; gap: 4px;
  overflow: hidden; white-space: nowrap; flex: 1;
  font-size: 11px; font-weight: bold;
}
.win-icon { font-size: 12px; }
.win-controls { display: flex; gap: 1px; flex-shrink: 0; }
.win-btn {
  width: 16px; height: 14px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 9px; color: #000;
  display: flex; align-items: center; justify-content: center;
  cursor: default; padding: 0; line-height: 1; flex-shrink: 0;
}
.win-btn:active { border-color: #808080 #fff #fff #808080; }
.win-menubar {
  background: #c0c0c0; padding: 1px 2px;
  display: flex; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.menu-item { padding: 1px 5px; cursor: default; font-size: 11px; }
.menu-item:hover { background: #000080; color: #fff; }
.win-body { flex: 1; overflow: hidden; position: relative; background: #c0c0c0; }
.win-statusbar {
  height: 18px; background: #c0c0c0;
  border-top: 1px solid #808080;
  display: flex; align-items: center; padding: 0 4px;
  font-size: 11px; flex-shrink: 0;
}
.statusbar-panel {
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  padding: 0 4px; height: 14px; display: flex; align-items: center; margin-right: 2px;
}

/* ── Taskbar ─────────────────────────────────────────────────── */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  background: #c0c0c0; border-top: 2px solid; border-color: #fff #808080 #808080 #fff;
  display: none; align-items: center; padding: 2px; z-index: 9000; gap: 2px;
}
#start-btn {
  height: 22px; padding: 0 8px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-weight: bold; font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0;
}
#start-btn:active, #start-btn.pressed { border-color: #808080 #fff #fff #808080; }
.tb-divider {
  width: 2px; height: 22px; flex-shrink: 0;
  border-left: 1px solid #808080; border-right: 1px solid #fff; margin: 0 2px;
}
#taskbar-programs { flex: 1; display: flex; align-items: center; gap: 2px; overflow: hidden; }
.taskbar-btn {
  height: 22px; padding: 0 6px;
  background: #c0c0c0;
  border: 1px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; max-width: 150px;
}
.taskbar-btn.focused { border-color: #808080 #fff #fff #808080; background: #b4b4b4; }
.taskbar-btn span:last-child { overflow: hidden; text-overflow: ellipsis; }
#system-tray {
  height: 22px;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  display: flex; align-items: center; padding: 0 6px; gap: 6px;
  font-size: 11px; flex-shrink: 0;
}

/* ── Start Menu ──────────────────────────────────────────────── */
#start-menu {
  position: fixed; bottom: 28px; left: 0;
  width: 200px;
  background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 9001; display: none; flex-direction: row;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
}
#sm-sidebar {
  width: 22px;
  background: linear-gradient(to top, #808080, #c0c0c0);
  display: flex; align-items: flex-end; padding-bottom: 4px;
}
#sm-sidebar span {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
}
#sm-items { flex: 1; padding: 2px 0; }
.sm-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px 4px 4px; cursor: default; font-size: 11px;
}
.sm-item:hover { background: #000080; color: #fff; }
.sm-icon { font-size: 16px; flex-shrink: 0; }
.sm-sep { height: 1px; margin: 2px 4px; background: linear-gradient(to right, #808080, #fff); }

/* ── Dropdown menus ──────────────────────────────────────────── */
.menu-dropdown {
  position: fixed; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  z-index: 99999; min-width: 130px; padding: 2px 0;
  box-shadow: 2px 2px 0 #000;
}
.menu-dd-item {
  padding: 2px 4px 2px 20px; font-size: 11px;
  cursor: default; white-space: nowrap; user-select: none;
}
.menu-dd-item:hover { background: #000080; color: #fff; }
.menu-dd-item.disabled { color: #808080; pointer-events: none; }
.menu-dd-sep { border: none; border-top: 1px solid #808080; margin: 2px 0; }

/* ── File manager ────────────────────────────────────────────── */
.file-grid {
  display: flex; flex-wrap: wrap; gap: 0; padding: 4px;
  align-content: flex-start;
}
.file-item {
  width: 72px; display: flex; flex-direction: column;
  align-items: center; gap: 2px; padding: 4px 2px;
  cursor: default; border: 1px solid transparent; text-align: center;
}
.file-item:hover { border-color: #000080; background: rgba(0,0,128,0.1); }
.file-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fi-icon { font-size: 24px; }
.fi-name { font-size: 10px; word-break: break-word; line-height: 1.2; }
/* list view */
.file-list { padding: 4px; }
.file-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 1px 4px; cursor: default; font-size: 11px;
  border: 1px solid transparent;
}
.file-list-item:hover { background: rgba(0,0,128,0.1); border-color: #000080; }
.file-list-item.selected { background: #000080; color: #fff; border-color: #000080; }
.fli-icon { font-size: 14px; flex-shrink: 0; }
/* details view */
.file-details { width: 100%; border-collapse: collapse; font-size: 11px; }
.file-details thead th {
  background: #c0c0c0; border-bottom: 1px solid #808080;
  padding: 2px 8px; text-align: left; position: sticky; top: 0;
  border-right: 1px solid #808080; cursor: default; user-select: none;
}
.file-details tbody tr { cursor: default; }
.file-details tbody tr:hover { background: rgba(0,0,128,0.1); }
.file-details tbody tr.selected td { background: #000080; color: #fff; }
.file-details td { padding: 1px 8px; border-right: 1px solid #d0d0d0; }
.fd-icon { font-size: 12px; width: 24px; }

/* ── Terminal ─────────────────────────────────────────────────── */
.term-wrap {
  background: #000; color: #00cc00;
  font-family: 'VT323', 'Courier New', monospace; font-size: 15px;
  padding: 4px; height: 100%;
  display: flex; flex-direction: column;
}
.term-out { flex: 1; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.term-in-line { display: flex; align-items: center; }
.term-prompt { color: #00cc00; white-space: nowrap; }
.term-input {
  flex: 1; background: transparent; border: none;
  color: #00cc00; font-family: inherit; font-size: inherit;
  outline: none; caret-color: #00cc00;
}

/* ── Sysmon ───────────────────────────────────────────────────── */
.sm-row {
  display: flex; align-items: center; padding: 2px 4px;
  font-size: 11px; border-bottom: 1px solid #d0d0d0;
}
.sm-row:nth-child(even) { background: #e8e8e8; }
.sm-lbl { width: 120px; color: #333; }
.sm-track {
  flex: 1; height: 10px; background: #fff;
  border: 1px solid; border-color: #808080 #fff #fff #808080;
  position: relative; overflow: hidden;
}
.sm-fill { height: 100%; background: #000080; position: absolute; left: 0; top: 0; transition: width 1.2s ease; }
.sm-val { width: 38px; text-align: right; font-size: 10px; color: #444; }

/* ── Browser ─────────────────────────────────────────────────── */
.browser-toolbar {
  display: flex; align-items: center; gap: 2px; padding: 2px 4px;
  background: #c0c0c0; border-bottom: 1px solid #808080; flex-shrink: 0;
}
.br-btn {
  min-width: 22px; height: 22px; padding: 0 4px; cursor: default;
  background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; font-family: inherit;
}
.br-btn:active { border-color: #808080 #fff #fff #808080; }
.br-btn:disabled { color: #808080; }
.br-vsep { width: 1px; background: #808080; height: 20px; margin: 0 2px; flex-shrink: 0; }
.br-addr-label { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.br-addr {
  flex: 1; height: 18px; font-size: 11px; padding: 0 2px;
  border: 2px solid; border-color: #808080 #fff #fff #808080;
  background: #fff; font-family: inherit;
}

/* ── Dialog ───────────────────────────────────────────────────── */
.dlg-body { padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
.dlg-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
.dlg-text { font-size: 11px; line-height: 1.6; flex: 1; }
.dlg-btns { padding: 8px; display: flex; justify-content: center; gap: 8px; border-top: 1px solid #d0d0d0; }
.dlg-btn {
  min-width: 75px; height: 23px; background: #c0c0c0;
  border: 2px solid; border-color: #fff #808080 #808080 #fff;
  font-size: 11px; cursor: default;
  display: flex; align-items: center; justify-content: center; padding: 0 8px;
}
.dlg-btn:active { border-color: #808080 #fff #fff #808080; }
.dlg-btn.primary { border-width: 2px; box-shadow: inset 0 0 0 1px #000; }

/* ── Glitch overlay ──────────────────────────────────────────── */
#glitch { position: fixed; inset: 0; z-index: 99998; pointer-events: none; display: none; }
@keyframes void-blink { 50% { opacity: 0; } }
/* ── Wallpaper swatches ──────────────────────────────────────── */
.wp-swatch .wp-thumb { border: 2px solid #808080; }
.wp-swatch.wp-selected > div:first-child { border-color: #000080; outline: 1px solid #fff; }
.wp-swatch:hover > div:first-child { border-color: #000080; }
@keyframes eb-battle { 0% { background-position: 0 0; } 100% { background-position: 153px 153px; } }
@keyframes eb-cave {
  0%   { filter: hue-rotate(0deg)   brightness(1);   }
  50%  { filter: hue-rotate(40deg)  brightness(1.35); }
  100% { filter: hue-rotate(-25deg) brightness(0.75); }
}
@keyframes eb-magicant {
  0%,100% { filter: hue-rotate(0deg)  brightness(1);   }
  50%     { filter: hue-rotate(15deg) brightness(1.1); }
}
@keyframes glitch-shift {
  0%   { transform: translate(0,0); filter: none; }
  15%  { transform: translate(-3px,0); filter: hue-rotate(90deg) saturate(3); }
  30%  { transform: translate(3px,-1px); filter: hue-rotate(-60deg); }
  50%  { transform: translate(-2px,2px); filter: none; }
  70%  { transform: translate(2px,0); filter: saturate(0.2); }
  100% { transform: translate(0,0); filter: none; }
}
.glitching { animation: glitch-shift 0.18s steps(1) 3; }

/* ── Welcome text window ─────────────────────────────────────── */
.note-body {
  background: #fff; height: 100%; overflow: auto;
  padding: 8px; font-family: 'Courier New', monospace;
  font-size: 11px; line-height: 1.7;
}

/* ── Mobile / touch ──────────────────────────────────────────── */
@media (pointer: coarse), (max-width: 700px) {
  body { font-size: 14px; }

  #icons-layer { padding: 10px 8px; gap: 4px; }
  .desktop-icon { width: 90px; padding: 6px; gap: 4px; }
  .di-img { font-size: 40px; }
  .di-name { font-size: 13px; }

  #taskbar { height: 44px; padding: 3px; }
  #desktop { bottom: 44px; }
  #start-menu { bottom: 44px; }
  #start-btn { height: 36px; font-size: 14px; padding: 0 12px; }
  .taskbar-btn { height: 36px; font-size: 13px; padding: 0 8px; max-width: 120px; }
  .tb-divider { height: 36px; }
  #system-tray { height: 36px; font-size: 14px; padding: 0 8px; }

  .win-titlebar { height: 34px; padding: 2px 4px; }
  .win-btn { width: 30px; height: 28px; font-size: 15px; }
  .win-title-text { font-size: 13px; }
  .win-icon { font-size: 16px; }
  .win-menubar { padding: 2px 4px; }
  .menu-item { padding: 4px 10px; font-size: 13px; }
  .win-statusbar { height: 24px; font-size: 13px; }

  .file-item { width: 90px; padding: 8px 4px; }
  .fi-icon { font-size: 30px; }
  .fi-name { font-size: 12px; }

  .sm-lbl { width: 100px; font-size: 12px; }
  .sm-val { font-size: 12px; }

  .dlg-body { padding: 14px; }
  .dlg-text { font-size: 14px; line-height: 1.7; }
  .dlg-btn { min-width: 90px; height: 34px; font-size: 14px; }

  .term-wrap { font-size: 16px; }
  .note-body { font-size: 13px; }
}
</style>
</head>
<body>

<!-- CRT overlay -->
<div id="crt" aria-hidden="true"></div>
<!-- Glitch div -->
<div id="glitch"></div>

<!-- BIOS boot screen -->
<div id="bios"><div id="bios-text"></div></div>

<!-- Desktop -->
<div id="desktop">
  <div id="desktop-bg"></div>
  <div id="icons-layer"></div>
  <div id="windows-layer"></div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="start-btn" onclick="toggleStart()">🖥 Start</button>
  <div class="tb-divider"></div>
  <div id="taskbar-programs"></div>
  <div id="system-tray">
    <span title="sleepOS network active">📶</span>
    <span id="clock">--:--</span>
  </div>
</div>

<!-- Start Menu -->
<div id="start-menu">
  <div id="sm-sidebar"><span>sleepOS</span></div>
  <div id="sm-items">
    <div class="sm-item" onclick="closeStart();openWelcome()">
      <span class="sm-icon">📄</span><span>Welcome</span>
    </div>
    <div class="sm-item" onclick="closeStart();openFiles()">
      <span class="sm-icon">📁</span><span>Projects</span>
    </div>
    <div class="sm-item" onclick="closeStart();openTerminal()">
      <span class="sm-icon">💻</span><span>Terminal</span>
    </div>
    <div class="sm-item" onclick="closeStart();openSysmon()">
      <span class="sm-icon">📊</span><span>System Monitor</span>
    </div>
    <div class="sm-item" onclick="closeStart();openAppearance()">
      <span class="sm-icon">🖼️</span><span>Appearance</span>
    </div>
    <div class="sm-sep"></div>
    <div class="sm-item" onclick="window.location='index.html'">
      <span class="sm-icon">🌐</span><span>Return to Eve Net</span>
    </div>
    <div class="sm-sep"></div>
    <div class="sm-item" onclick="closeStart();doShutdown()">
      <span class="sm-icon">⏻</span><span>Shut Down...</span>
    </div>
  </div>
</div>

<script>

// ─────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────
// WALLPAPERS
// ─────────────────────────────────────────────────────────────────
const WALLPAPERS = [
  {
    id: 'default', name: 'Default', emoji: '🟦',
    bg: 'background:#008080;'
  },
  {
    id: 'magicant', name: 'Magicant', emoji: '🌸',

  {

    bg: `background:

  },

function biosFinish() {
  if (bisDone) return; bisDone = true;
  clearTimeout(biosTimer);

  biosEl.style.transition = 'opacity 0.6s';

function biosType() {
  if (bisDone) return;
  if (biosIdx >= BIOS_LINES.length) { biosTimer = setTimeout(biosFinish, 700); return; }
  const line = BIOS_LINES[biosIdx];
  if (biosChar <= line.length) {
    if (biosChar > 0) {
      // Replace last line
      const lines = biosTextEl.textContent.split('\n');
      lines[lines.length - 1] = line.slice(0, biosChar);
      biosTextEl.textContent = lines.join('\n');
    }
    biosChar++;
    biosTimer = setTimeout(biosType, line === '' ? 0 : 11);
  } else {
    biosTextEl.textContent += '\n';
    biosIdx++; biosChar = 0;
    biosTimer = setTimeout(biosType, line === '' ? 25 : 55);
  }
}

let zTop = 100;
const wins = {};

function mkWin({ id, title, icon = '📄', x, y, w = 500, h = 380,
                 menubar = true, statusbar = true, popup = false }) {
  if (wins[id]) { focusWin(id); unminWin(id); return null; }

  // Default position: slightly random cascade; on mobile fill viewport (except small popups)
  const count = Object.keys(wins).length;
  const isMobile = window.innerWidth <= 700 || window.matchMedia('(pointer: coarse)').matches;
  const taskbarH = isMobile ? 44 : 28;
  if (isMobile && !popup) {
    x = 0; y = 0;
    w = window.innerWidth;
    h = window.innerHeight - taskbarH;
  } else {
    if (x === undefined) x = 80 + count * 22;
    if (y === undefined) y = 44 + count * 22;
    // Center popups on mobile
    if (isMobile && popup) {
      x = Math.max(4, Math.floor((window.innerWidth - w) / 2));
      y = Math.max(4, Math.floor((window.innerHeight - taskbarH - h) / 3));
    }
  }

  const el = document.createElement('div');
  el.className = 'os-window inactive';
  el.id = 'win-' + id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  el.innerHTML = `
    <div class="win-titlebar" id="tb-${id}">
      <div class="win-title-text">
        <span class="win-icon">${icon}</span>
        <span id="wtitle-${id}">${title}</span>
      </div>
      <div class="win-controls">
        <button class="win-btn" title="Minimize" onclick="minWin('${id}')">─</button>
        <button class="win-btn" title="Maximize" onclick="maxWin('${id}')">□</button>
        <button class="win-btn" title="Close"    onclick="closeWin('${id}')">✕</button>
      </div>
    </div>
    ${menubar ? `<div class="win-menubar" id="mb-${id}"></div>` : ''}
    <div class="win-body" id="wb-${id}"></div>
    ${statusbar ? `<div class="win-statusbar"><div class="statusbar-panel" id="ws-${id}">Ready</div></div>` : ''}
  `;

  document.getElementById('windows-layer').appendChild(el);
  wins[id] = { el, title, icon, minimized: false, maximized: false, origStyle: null };

  makeDraggable(el, document.getElementById('tb-' + id));
  addTbBtn(id, title, icon);
  el.addEventListener('mousedown', () => focusWin(id));
  el.addEventListener('touchstart', () => focusWin(id), { passive: true });

  focusWin(id);
  return el;
}

function focusWin(id) {
  const w = wins[id]; if (!w) return;
  w.el.style.zIndex = ++zTop;
  Object.values(wins).forEach(v => v.el.classList.add('inactive'));
  w.el.classList.remove('inactive');
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('focused'));
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.add('focused');
}

function minWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = true; w.el.style.display = 'none';
  const btn = document.getElementById('tbtn-' + id);
  if (btn) btn.classList.remove('focused');
}

function unminWin(id) {
  const w = wins[id]; if (!w) return;
  w.minimized = false; w.el.style.display = 'flex'; focusWin(id);
}

function maxWin(id) {
  const w = wins[id]; if (!w) return;
  if (w.maximized) {
    w.el.style.cssText = w.origStyle; w.maximized = false;
  } else {
    w.origStyle = w.el.style.cssText;
    const d = document.getElementById('desktop');
    w.el.style.left   = '0';
    w.el.style.top    = '0';
    w.el.style.width  = d.offsetWidth + 'px';
    w.el.style.height = d.offsetHeight + 'px';
    w.el.style.zIndex = ++zTop;
    w.maximized = true;
  }
}

function closeWin(id) {
  const w = wins[id]; if (!w) return;
  if (w._interval) clearInterval(w._interval);
  w.el.remove(); delete wins[id];
  const btn = document.getElementById('tbtn-' + id); if (btn) btn.remove();
}

function makeDraggable(win, handle) {
  let sx, sy, sl, st;

  function startDrag(cx, cy) {
    sx = cx; sy = cy;
    sl = win.offsetLeft; st = win.offsetTop;
  }
  function moveDrag(cx, cy) {
    win.style.left = Math.max(0, sl + cx - sx) + 'px';
    win.style.top  = Math.max(0, st + cy - sy) + 'px';
  }

  handle.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    startDrag(e.clientX, e.clientY);
    const onMove = (e) => moveDrag(e.clientX, e.clientY);
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  handle.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
    const onMove = (e) => { e.preventDefault(); const t = e.touches[0]; moveDrag(t.clientX, t.clientY); };
    const onEnd = () => { handle.removeEventListener('touchmove', onMove); handle.removeEventListener('touchend', onEnd); };
    handle.addEventListener('touchmove', onMove, { passive: false });
    handle.addEventListener('touchend', onEnd);
  }, { passive: false });
}

function addTbBtn(id, title, icon) {
  const btn = document.createElement('button');
  btn.className = 'taskbar-btn focused';
  btn.id = 'tbtn-' + id;
  btn.innerHTML = `<span>${icon}</span><span>${title}</span>`;
  btn.addEventListener('click', () => {
    const w = wins[id]; if (!w) return;
    if (w.minimized) { unminWin(id); }
    else if (w.el.classList.contains('inactive')) { focusWin(id); }
    else { minWin(id); }
  });
  document.getElementById('taskbar-programs').appendChild(btn);
}

function updateClock() {
  const now = new Date();
  if (window._clockCorrupted && Math.random() < 0.75) {
    document.getElementById('clock').textContent = '??:??'; return;
  }
  const glitch = Math.random() < 0.004;
  const h = glitch ? Math.floor(Math.random() * 24) : now.getHours();
  const m = glitch ? Math.floor(Math.random() * 60) : now.getMinutes();
  document.getElementById('clock').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

    if (!e.target.closest('.desktop-icon') && !e.target.closest('.os-window'))
      document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));

}

      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      histIdx = Math.max(-1, histIdx - 1);
      inp.value = histIdx < 0 ? '' : cmdHistory[cmdHistory.length - 1 - histIdx];
      e.preventDefault();
    } else if (e.key === 'Enter') {
      const raw = inp.value.trim(); inp.value = ''; histIdx = -1;
      print('C:\\sleepOS> ' + raw);
      if (raw) { cmdHistory.push(raw); if (cmdHistory.length > 50) cmdHistory.shift(); }

      // Handle echo text > filename redirection
      const redirectMatch = raw.match(/^echo\s+(.*?)\s*>>\s*(.+)$/i) || raw.match(/^echo\s+(.*?)\s*>\s*(.+)$/i);
      if (redirectMatch) {
        const append = raw.match(/^echo\s+(.*?)\s*>>\s*(.+)$/i) !== null;

        print('');
        return;

      const parts = raw.split(/\s+/);

        'browser.exe':    () => { print('Starting BROWSER.EXE...'); setTimeout(openBrowser, 300); },
        'browser':        () => { print('Starting BROWSER.EXE...'); setTimeout(openBrowser, 300); },
        'defrag.exe':     () => { print('Starting DEFRAG.EXE...'); setTimeout(openDefrag, 300); },
        'defrag':         () => { print('Starting DEFRAG.EXE...'); setTimeout(openDefrag, 300); },
        'terminal.exe':   () => { print('TERMINAL.EXE is already running.'); print('You are inside it.'); },
        'daemon.core':    () => { print('Opening daemon.core...'); print('It is already open.'); print('It has always been open.'); setTimeout(openDaemon, 400); },
        'void.tmp':       () => { print('Opening void.tmp...'); setTimeout(openVoid, 300); },
        '?????.exe':      () => { print('Executing ?????.exe...'); setTimeout(openUnknown, 300); },
        '?????':          () => { print('Executing ?????.exe...'); setTimeout(openUnknown, 300); },
      };
      // Also allow running project files by name
      const project = PROJECTS.find(p =>
        p.file.toLowerCase() === cmd ||
        p.file.toLowerCase().replace('.html','') === cmd ||
        p.name.toLowerCase() === cmd ||
        p.name.toLowerCase().replace(/ /g,'-') === cmd
      );

      if (!cmd) { /* nothing */ }
      else if (CMDS[cmd]) { CMDS[cmd](args); }
      else if (EXES[cmd]) { EXES[cmd](); }
      else if (project) {
        print(`Launching ${project.name}...`);
        print('Opening in new tab.');
        setTimeout(() => window.open(project.file, '_blank'), 400);
      }
      else { print(`'${parts[0]}' is not recognized as an internal or external command.`); print(`Type HELP for a list of commands, or DIR to list executables.`); }
      print('');
    }
  });

  document.getElementById('tw').addEventListener('click', () => inp.focus());
  setTimeout(() => inp.focus(), 80);
}

function openSysmon() {
  if (!mkWin({ id:'sysmon', title:'SYSMON.EXE — System Monitor', icon:'📊', w:400, h:310, x:160, y:110 })) return;
  const mb = document.getElementById('mb-sysmon');
  mb.innerHTML = `<span class="menu-item">View</span><span class="menu-item">Options</span>`;

  const body = document.getElementById('wb-sysmon');
  body.style.cssText = 'background:#c0c0c0;overflow:hidden;';

  const METRICS = [
    { key:'cpu',       label:'CPU Usage',      val:34 },
    { key:'ram',       label:'Memory (RAM)',    val:61 },
    { key:'soul',      label:'Soul Integrity',  val:87 },
    { key:'dream',     label:'Dream Cache',     val:23 },
    { key:'entropy',   label:'Entropy Level',   val:74 },
    { key:'void',      label:'Void Pressure',   val:12 },
    { key:'daemon',    label:'Daemon Activity', val:45 },
    { key:'coherence', label:'Coherence',       val:91 },
  ];

  const inner = document.createElement('div');
  inner.style.cssText = 'border:2px solid;border-color:#808080 #fff #fff #808080;height:calc(100% - 8px);margin:4px;overflow:auto;background:#c0c0c0;';
  inner.innerHTML = METRICS.map(m => `
    <div class="sm-row">
      <div class="sm-lbl">${m.label}</div>
      <div class="sm-track"><div class="sm-fill" id="bar-${m.key}" style="width:${m.val}%"></div></div>
      <div class="sm-val" id="val-${m.key}">${m.val}%</div>
    </div>`).join('') + `
    <div style="padding:4px 4px 2px;font-size:10px;color:#444;border-top:1px solid #d0d0d0;">
      <b>Active processes:</b> 10 running, 3 unrecognized &nbsp;|&nbsp; <b>Uptime:</b> <span id="uptime">--:--:--</span>
    </div>`;

  body.appendChild(inner);

  const state = {};
  METRICS.forEach(m => { state[m.key] = m.val; });

  const interval = setInterval(() => {
    if (!wins['sysmon']) { clearInterval(interval); return; }
    METRICS.forEach(m => {
      let v = state[m.key] + (Math.random() - 0.5) * 7;
      if (m.key === 'soul')      v = Math.min(92, Math.max(60, v - 0.05));
      if (m.key === 'void' && Math.random() < 0.06) v = 75 + Math.random() * 24;
      v = Math.max(1, Math.min(99, v));
      state[m.key] = v;
      const bar = document.getElementById('bar-' + m.key);
      const val = document.getElementById('val-' + m.key);
      if (bar) { bar.style.width = v.toFixed(0) + '%'; bar.style.background = (m.key === 'void' && v > 70) ? '#cc0000' : '#000080'; }
      if (val) val.textContent = v.toFixed(0) + '%';
    });
    const sec = Math.floor(performance.now() / 1000);
    const up = document.getElementById('uptime');
    if (up) up.textContent = `${String(Math.floor(sec/3600)).padStart(2,'0')}:${String(Math.floor((sec%3600)/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
  }, 1500);

  wins['sysmon']._interval = interval;
}

  body.style.cssText = 'padding:8px;display:flex;flex-direction:column;gap:5px;font-size:11px;overflow:hidden;';

  const COLS = 40, ROWS = 16, TOTAL = COLS * ROWS;
  // States: 0=free, 1=used(blue), 2=optimized(green), 3=active(red)
  const cells = Array.from({ length: TOTAL }, () => Math.random() < 0.68 ? 1 : 0);
  const USED_TOTAL = cells.filter(c => c === 1).length;
  const COLORS = { 0:'#ffffff', 1:'#0000aa', 2:'#00aa00', 3:'#cc2200' };

  // ── Drive info ─────────────────────────────────────────────────
  const infoRow = document.createElement('div');
  infoRow.style.cssText = 'display:flex;gap:16px;align-items:center;border:2px solid;border-color:#808080 #fff #fff #808080;padding:3px 8px;background:#fff;flex-shrink:0;';
  infoRow.innerHTML = `<span>Drive: <b>C:\\</b></span><span>Capacity: 2,147 MB</span><span>Free: 683 MB</span><span id="df-pct" style="margin-left:auto;font-weight:bold;">0% optimized</span>`;
  body.appendChild(infoRow);

  // ── Canvas grid ────────────────────────────────────────────────
  const gridWrap = document.createElement('div');
  gridWrap.style.cssText = 'border:2px solid;border-color:#808080 #fff #fff #808080;background:#111;flex:1;min-height:0;overflow:hidden;';
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'display:block;';
  gridWrap.appendChild(canvas);
  body.appendChild(gridWrap);

  function drawGrid() {
    const W = gridWrap.clientWidth, H = gridWrap.clientHeight;
    if (!W || !H) return;
    const bw = Math.floor(W / COLS), bh = Math.floor(H / ROWS);
    if (!bw || !bh) return;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < TOTAL; i++) {
      ctx.fillStyle = COLORS[cells[i]];
      ctx.fillRect((i % COLS) * bw + 1, Math.floor(i / COLS) * bh + 1, bw - 2, bh - 2);
    }
  }

  // ── Progress bar ───────────────────────────────────────────────
  const pbWrap = document.createElement('div');
  pbWrap.style.cssText = 'border:2px solid;border-color:#808080 #fff #fff #808080;height:18px;background:#c0c0c0;position:relative;overflow:hidden;flex-shrink:0;';
  const pbFill = document.createElement('div');
  pbFill.style.cssText = 'position:absolute;left:0;top:0;height:100%;width:0%;background:#000080;';
  const pbLabel = document.createElement('div');
  pbLabel.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;mix-blend-mode:difference;';
  pbLabel.textContent = '0%';
  pbWrap.appendChild(pbFill); pbWrap.appendChild(pbLabel);
  body.appendChild(pbWrap);

  // ── File label ─────────────────────────────────────────────────
  const fileLabel = document.createElement('div');
  fileLabel.style.cssText = 'font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;height:13px;';
  fileLabel.textContent = 'Press Start to begin defragmentation.';
  body.appendChild(fileLabel);

  // ── Buttons ────────────────────────────────────────────────────
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;flex-shrink:0;';
  const startBtn = document.createElement('button');
  startBtn.className = 'dlg-btn primary'; startBtn.textContent = 'Start';
  const stopBtn = document.createElement('button');
  stopBtn.className = 'dlg-btn'; stopBtn.textContent = 'Stop'; stopBtn.disabled = true;
  btnRow.appendChild(startBtn); btnRow.appendChild(stopBtn);
  body.appendChild(btnRow);

  // ── Legend ─────────────────────────────────────────────────────
  const legend = document.createElement('div');
  legend.style.cssText = 'display:flex;gap:10px;font-size:10px;align-items:center;flex-shrink:0;';
  [['#ffffff','Free'],['#0000aa','Used'],['#00aa00','Optimized'],['#cc2200','Reading']].forEach(([c,l]) => {
    const wrap = document.createElement('span');
    wrap.style.cssText = 'display:flex;align-items:center;gap:3px;';
    const sq = document.createElement('span');
    sq.style.cssText = `width:12px;height:12px;background:${c};border:1px solid #808080;display:inline-block;flex-shrink:0;`;
    wrap.appendChild(sq); wrap.appendChild(document.createTextNode(l));
    legend.appendChild(wrap);
  });
  body.appendChild(legend);

  // ── Animation ──────────────────────────────────────────────────
  const FILES = [
    'C:\\WINDOWS\\SYSTEM\\kernel32.dll',    'C:\\DREAMS\\fragment_001.tmp',
    'C:\\USERS\\you\\desktop\\memory.old',  'C:\\VOID\\unresolved.dat',
    'C:\\DREAMS\\fragment_047.tmp',         'C:\\WINDOWS\\TEMP\\~DF3A2.tmp',
    'C:\\USERS\\you\\documents\\letter_unsent.txt', 'C:\\DREAMS\\fragment_112.tmp',
    'C:\\SYSTEM32\\observer.dll',           'C:\\DREAMS\\fragment_????.tmp',
    'C:\\USERS\\you\\pictures\\face.bmp',   'C:\\VOID\\pending.inf',
    'C:\\DREAMS\\core_loop.dat',            'C:\\SLEEP\\log_0000.bin',
    'C:\\USERS\\you\\desktop\\todo.txt',    'C:\\DREAMS\\fragment_[CORRUPTED]',
    'C:\\WINDOWS\\SYSTEM\\time.dll',        'C:\\VOID\\[FILE NAME UNREADABLE]',
  ];

  let running = false, timer = null, optimized = 0, fileIdx = 0;
  let leftPtr = 0, rightPtr = TOTAL - 1, activeCell = -1;

  function updateProgress() {
    const pct = Math.min(100, Math.round((optimized / USED_TOTAL) * 100));
    pbFill.style.width = pct + '%';
    pbLabel.textContent = pct + '%';
    document.getElementById('df-pct').textContent = pct + '% optimized';
    if (ws) ws.textContent = 'Defragmenting C:\\ — ' + pct + '%';
  }

  function step() {
    if (!wins['defrag']) { clearTimeout(timer); return; }

    // Resolve previous active cell → optimized
    if (activeCell >= 0) { cells[activeCell] = 2; optimized++; activeCell = -1; }

    // Advance pointers
    while (leftPtr < TOTAL && cells[leftPtr] !== 0) leftPtr++;
    while (rightPtr >= 0  && cells[rightPtr] !== 1) rightPtr--;

    if (leftPtr >= rightPtr) {
      // Finalize any remaining used-in-place blocks
      for (let i = 0; i < TOTAL; i++) if (cells[i] === 1) { cells[i] = 2; optimized++; }
      running = false; startBtn.disabled = false; stopBtn.disabled = true;
      pbFill.style.width = '100%'; pbLabel.textContent = '100%';
      document.getElementById('df-pct').textContent = '100% optimized';
      fileLabel.textContent = 'Defragmentation complete.  1 file could not be moved: C:\\VOID\\[FILE NAME UNREADABLE]';
      if (ws) ws.textContent = 'Complete — 1 file could not be moved';
      drawGrid();
      return;
    }

    // Move rightPtr block to leftPtr (show as red at destination)
    cells[rightPtr] = 0;
    cells[leftPtr]  = 3;
    activeCell = leftPtr;
    leftPtr++; rightPtr--;

    if (fileIdx % 5 === 0) fileLabel.textContent = 'Moving: ' + FILES[fileIdx % FILES.length];
    fileIdx++;

    drawGrid();
    updateProgress();
    timer = setTimeout(step, 55);
  }

  startBtn.addEventListener('click', () => {
    if (running) return;
    running = true; startBtn.disabled = true; stopBtn.disabled = false;
    fileLabel.textContent = 'Analyzing C:\\ ...';
    if (ws) ws.textContent = 'Analyzing...';
    setTimeout(step, 700);
  });
  stopBtn.addEventListener('click', () => {
    running = false; clearTimeout(timer);
    if (activeCell >= 0) { cells[activeCell] = 1; activeCell = -1; }
    startBtn.disabled = false; stopBtn.disabled = true;
    fileLabel.textContent = 'Defragmentation stopped.';
    if (ws) ws.textContent = 'Stopped';
    drawGrid();
  });

  // ── Menus ──────────────────────────────────────────────────────
  function dfDropdown(anchor, items) {
    const old = document.getElementById('active-dropdown'); if (old) old.remove();
    const rect = anchor.getBoundingClientRect();
    const dd = document.createElement('div');
    dd.className = 'menu-dropdown'; dd.id = 'active-dropdown';
    dd.style.left = rect.left + 'px'; dd.style.top = rect.bottom + 'px';
    items.forEach(item => {
      if (item === '-') { const s = document.createElement('div'); s.className = 'menu-dd-sep'; dd.appendChild(s); }
      else {
        const el = document.createElement('div'); el.className = 'menu-dd-item'; el.textContent = item.label;
        el.addEventListener('mousedown', e => { e.stopPropagation(); dd.remove(); item.action(); });
        dd.appendChild(el);
      }
    });
    document.body.appendChild(dd);
    setTimeout(() => document.addEventListener('mousedown', () => { const d = document.getElementById('active-dropdown'); if (d) d.remove(); }, { once: true }), 0);
  }

  mb.innerHTML = '';
  [
    { label: 'Drive', items: [
      { label: 'C:\\ (2,147 MB)  ✓', action: () => { if (ws) ws.textContent = 'Drive C:\\ selected'; } },
      { label: 'D:\\ — [NOT FOUND]', action: () => alert('Drive D:\\ is not available.\n\nIt may have never existed.') },
      '-',
      { label: 'Exit', action: () => closeWin('defrag') },
    ]},
    { label: 'Help', items: [
      { label: 'Help Topics', action: () => alert('DEFRAG.EXE — Help\n\nClick Start to defragment drive C:\\.\n\nDisk defragmentation rearranges fragmented\ndata so your disk works more efficiently.\n\nNote: some system files cannot be moved.') },
      '-',
      { label: 'About DEFRAG.EXE', action: () => alert('DEFRAG.EXE — Disk Defragmenter\nsleepOS v1.0\n\nConsolidates fragmented files\nand free space on your hard disk.\n\n1 file cannot be moved.\nIt has always been there.') },
    ]},
  ].forEach(({ label, items }) => {
    const span = document.createElement('span');
    span.className = 'menu-item'; span.textContent = label;
    span.addEventListener('click', e => { e.stopPropagation(); dfDropdown(span, items); });
    mb.appendChild(span);
  });

  setTimeout(drawGrid, 80);
}

function applyUnknownEffect(n) {
  triggerGlitch();
  if (n === 7) {
    // Clock corrupts
    window._clockCorrupted = true;
  } else if (n === 8) {
    // Desktop icon names become ?????
    document.querySelectorAll('.di-name').forEach(el => { el.textContent = '?????'; });
  } else if (n === 9) {
    // All open window titles and taskbar buttons become ?????.exe
    document.querySelectorAll('[id^="wtitle-"]').forEach(el => { el.textContent = '?????.exe'; });
    document.querySelectorAll('.taskbar-btn span:last-child').forEach(el => { el.textContent = '?????.exe'; });
  } else if (n >= 10) {
    // Desktop darkens further each run
    let ov = document.getElementById('unk-overlay');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'unk-overlay';
      ov.style.cssText = 'position:fixed;inset:0;background:#000;pointer-events:none;z-index:99990;opacity:0;transition:opacity 2s;';
      document.body.appendChild(ov);
    }
    ov.style.opacity = Math.min(0.88, (parseFloat(ov.style.opacity) || 0) + 0.09);
  }
}

  unknownCount++;
  const msgs = [
    'File executed.\nNothing happened.\n\n(Are you sure?)',
    'File executed again.\n\nSomething may have changed.',

    'File executed.\nFile not found.\nFile was never here.',
  ];
  const idx = Math.min(unknownCount - 1, msgs.length - 1);

  if (unknownCount === 4) renderVoid();

  // Run 6: start button label becomes "?????" for 4s
  if (unknownCount === 6) {

    if (sb) {
      const orig = sb.textContent;
      sb.textContent = '?????';
      setTimeout(() => { sb.textContent = orig; }, 4000);

  const rid = 'unk-result-' + Date.now();

}

  let lastAttemptedUrl = '';

  function navigate(url, push = true) {
    errDiv.style.display = 'none';
    if (!url || url === 'home:') {
      url = 'home:';
      document.getElementById('br-url').value = 'home:';
      iframe.removeAttribute('src');
      iframe.srcdoc = buildHome();
      if (ws) ws.textContent = 'sleepWEB Start Page';
    } else {
      if (!/^https?:\/\/|^data:|^about:/.test(url)) url = 'https://' + url;
      lastAttemptedUrl = url;
      document.getElementById('br-url').value = url;
      iframe.removeAttribute('srcdoc');
      iframe.src = url;
      if (ws) ws.textContent = 'Connecting to ' + (url.split('/')[2] || url);
    }
    if (push) { hist = hist.slice(0, histIdx + 1); hist.push(url); histIdx = hist.length - 1; }
    updateNav();
  }

  iframe.addEventListener('load', () => {
    // Sync address bar with actual iframe URL (same-origin pages only)
    try {
      const loc = iframe.contentWindow.location.href;
      if (loc && loc !== 'about:blank' && loc !== 'about:srcdoc') {
        document.getElementById('br-url').value = loc;
        if (hist[histIdx] !== loc) {
          hist = hist.slice(0, histIdx + 1); hist.push(loc); histIdx = hist.length - 1;
          updateNav();
        }
      }
    } catch(e) { /* cross-origin — leave address bar as-is */ }
    if (ws) ws.textContent = 'Done';
  });
  iframe.addEventListener('error', () => showError(lastAttemptedUrl));

  // ── handle nav messages from srcdoc home page ──────────────────
  function onBrowserMsg(e) {
    if (e.data && e.data.type === 'browser-nav') navigate(e.data.url);
  }
  window.addEventListener('message', onBrowserMsg);
  // clean up when window closes
  const winEl = document.getElementById('win-browser');
  if (winEl) new MutationObserver((_, obs) => {
    if (!document.getElementById('win-browser')) {
      window.removeEventListener('message', onBrowserMsg); obs.disconnect();
    }
  }).observe(document.getElementById('desktop'), { childList: true });

  // ── button wiring ──────────────────────────────────────────────
  document.getElementById('br-back').addEventListener('click', () => {
    if (histIdx > 0) { histIdx--; navigate(hist[histIdx], false); }
  });
  document.getElementById('br-fwd').addEventListener('click', () => {
    if (histIdx < hist.length - 1) { histIdx++; navigate(hist[histIdx], false); }
  });
  document.getElementById('br-stop').addEventListener('click', () => {
    iframe.src = 'about:blank'; if (ws) ws.textContent = 'Stopped.';
  });
  document.getElementById('br-ref').addEventListener('click', () => {
    const u = hist[histIdx]; if (u === 'home:') { iframe.srcdoc = buildHome(); } else { iframe.src = iframe.src; }
    if (ws) ws.textContent = 'Refreshing...';
  });
  document.getElementById('br-home').addEventListener('click', () => navigate('home:'));
  document.getElementById('br-go').addEventListener('click', () => navigate(document.getElementById('br-url').value.trim()));
  document.getElementById('br-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate(document.getElementById('br-url').value.trim());
  });

  // ── menu bar ───────────────────────────────────────────────────
  function brDropdown(anchor, items) {
    const old = document.getElementById('active-dropdown'); if (old) old.remove();
    const rect = anchor.getBoundingClientRect();
    const dd = document.createElement('div');
    dd.className = 'menu-dropdown'; dd.id = 'active-dropdown';
    dd.style.left = rect.left + 'px'; dd.style.top = rect.bottom + 'px';
    items.forEach(item => {
      if (item === '-') {
        const s = document.createElement('div'); s.className = 'menu-dd-sep'; dd.appendChild(s);
      } else {
        const el = document.createElement('div'); el.className = 'menu-dd-item'; el.textContent = item.label;
        el.addEventListener('mousedown', e => { e.stopPropagation(); dd.remove(); item.action(); });
        dd.appendChild(el);
      }
    });
    document.body.appendChild(dd);
    setTimeout(() => document.addEventListener('mousedown', () => { const d = document.getElementById('active-dropdown'); if (d) d.remove(); }, { once: true }), 0);
  }

  mb.innerHTML = '';
  [
    { label: 'File', items: [
      { label: 'Open Location...', action: () => { const u = prompt('Enter URL:'); if (u) navigate(u); } },
      '-',
      { label: 'Close', action: () => closeWin('browser') },
    ]},
    { label: 'View', items: [
      { label: 'Home',    action: () => navigate('home:') },
      { label: 'Refresh', action: () => document.getElementById('br-ref').click() },
      { label: 'Stop',    action: () => document.getElementById('br-stop').click() },
      '-',
      { label: 'View Source', action: () => {
        try {
          const src = iframe.contentDocument.documentElement.outerHTML;
          const w = window.open(''); w.document.write('<pre style="white-space:pre-wrap;font-size:12px;">' + src.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>');
        } catch(e) { alert('Cannot view source of cross-origin pages.'); }
      }},
    ]},
    { label: 'Help', items: [
      { label: 'About sleepWEB', action: () => alert('sleepWEB — Web Browser\nsleepOS v1.0\n\nNote: many modern sites block\nbeing loaded inside frames.') },
    ]},
  ].forEach(({ label, items }) => {
    const span = document.createElement('span');
    span.className = 'menu-item'; span.textContent = label;
    span.addEventListener('click', e => { e.stopPropagation(); brDropdown(span, items); });
    mb.appendChild(span);
  });

  navigate('home:');
}

// ─────────────────────────────────────────────────────────────────
// SYSTEM ALERTS
// ─────────────────────────────────────────────────────────────────
let alertIdx = 0;
function spawnAlert() {
  const m = SYSTEM_MSGS[alertIdx % SYSTEM_MSGS.length]; alertIdx++;
  const id = 'alert-' + Date.now();
  const dw = document.getElementById('desktop').offsetWidth;
  const dh = document.getElementById('desktop').offsetHeight;
  if (!mkWin({ id, title:m.title, icon:m.icon, w:320, h:165,
               x:60 + Math.random()*(dw-380), y:40 + Math.random()*(dh-200),
               menubar:false, statusbar:false, popup:true })) return;
  document.getElementById('wb-' + id).innerHTML = `
    <div class="dlg-body">
      <div class="dlg-icon">${m.icon}</div>
      <div class="dlg-text" style="white-space:pre-line;">${m.text}</div>
    </div>
    <div class="dlg-btns"><button class="dlg-btn primary" onclick="closeWin('${id}')">OK</button></div>`;
}

// ─────────────────────────────────────────────────────────────────
// GLITCH EFFECT
// ─────────────────────────────────────────────────────────────────
function triggerGlitch() {
  const desktop = document.getElementById('desktop');
  desktop.classList.add('glitching');
  setTimeout(() => desktop.classList.remove('glitching'), 650);

  // Brief scanline intensify
  const crt = document.getElementById('crt');
  crt.style.opacity = '2';
  setTimeout(() => { crt.style.opacity = '1'; }, 180);
}

// ─────────────────────────────────────────────────────────────────
// SHUTDOWN
// ─────────────────────────────────────────────────────────────────
function doShutdown() {
  const id = 'shutdown';
  if (!mkWin({ id, title:'Shut Down sleepOS', icon:'⏻', w:300, h:165,
               x:Math.floor(window.innerWidth/2)-150, y:Math.floor(window.innerHeight/2)-80,
               menubar:false, statusbar:false, popup:true })) return;
  document.getElementById('wb-shutdown').innerHTML = `
    <div class="dlg-body">
      <div class="dlg-icon">⏻</div>
      <div class="dlg-text">
        What do you want the computer to do?<br><br>
        <select id="shutdown-sel" style="width:180px;font-size:11px;margin-top:2px;">
          <option value="off">Shut down</option>
          <option value="restart">Restart</option>
          <option value="back">Return to Eve Net</option>
        </select>
      </div>
    </div>
    <div class="dlg-btns">
      <button class="dlg-btn primary" onclick="confirmShutdown()">OK</button>
      <button class="dlg-btn" onclick="closeWin('shutdown')">Cancel</button>
    </div>`;
}

function confirmShutdown() {
  const sel = document.getElementById('shutdown-sel');
  const val = sel ? sel.value : 'back';
  closeWin('shutdown');

  const bios = document.getElementById('bios');
  bios.style.display = 'flex'; bios.style.opacity = '0'; bios.style.transition = 'opacity 0.6s';
  bios.innerHTML = `<div id="bios-text" style="font-family:'VT323',monospace;font-size:18px;color:#888;white-space:pre;line-height:1.5;">
sleepOS — ${val === 'restart' ? 'Restarting' : 'Shutting Down'}...

Stopping soul_daemon.exe...              [OK]
Stopping dream_fragment.exe...           [OK]
Stopping unknown (PID 0333)...           [TIMEOUT]
Stopping unknown (PID 0334)...           [TIMEOUT]
Stopping unknown (PID 0335)...           [TIMEOUT]
Flushing corpus cache...                 [OK]
Unloading kernel modules...              [OK]

It is now safe to turn off your computer.
  </div>`;
  document.getElementById('desktop').style.display = 'none';
  document.getElementById('taskbar').style.display = 'none';
  setTimeout(() => { bios.style.opacity = '1'; }, 30);
  setTimeout(() => { window.location.href = val === 'back' ? 'index.html' : 'sleep-os.html'; }, 3200);
}

// ─────────────────────────────────────────────────────────────────
// STARTUP
// ─────────────────────────────────────────────────────────────────
function startDesktop() {
  document.getElementById('desktop').style.display = 'block';
  document.getElementById('taskbar').style.display = 'flex';
  setupIcons();
}
</script>
